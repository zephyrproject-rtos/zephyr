family:
- name: espressif_esp32
  series:
  - name: esp32
    socs:
    - name: esp32
      cpuclusters:
      - name: procpu
      - name: appcpu
  - name: esp32s2
    socs:
    - name: esp32s2
  - name: esp32s3
    socs:
    - name: esp32s3
      cpuclusters:
      - name: procpu
      - name: appcpu
  - name: esp32c2
    socs:
    - name: esp32c2
  - name: esp32c3
    socs:
    - name: esp32c3
  - name: esp32c5
    socs:
    - name: esp32c5
      cpuclusters:
      - name: hpcore
      - name: lpcore
  - name: esp32c6
    socs:
    - name: esp32c6
      cpuclusters:
      - name: hpcore
      - name: lpcore
  - name: esp32h2
    socs:
    - name: esp32h2
  - name: esp32p4
    socs:
    - name: esp32p4
      cpuclusters:
      - name: hpcore
      - name: lpcore
runners:
  run_once:
    '--erase':
    - runners:
      - esp32
      run: first
      groups:
      - qualifiers:
        - esp32/procpu
        - esp32/appcpu
      - qualifiers:
        - esp32s2
      - qualifiers:
        - esp32s3/procpu
        - esp32s3/appcpu
      - qualifiers:
        - esp32c2
      - qualifiers:
        - esp32c3
      - qualifiers:
        - esp32c5/hpcore
        - esp32c5/lpcore
      - qualifiers:
        - esp32c6/hpcore
        - esp32c6/lpcore
      - qualifiers:
        - esp32h2
      - qualifiers:
        - esp32p4/hpcore
        - esp32p4/lpcore
