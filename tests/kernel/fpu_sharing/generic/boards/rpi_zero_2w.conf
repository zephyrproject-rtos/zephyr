CONFIG_BOOT_DELAY=200

# prj.conf pins MP_MAX_NUM_CPUS=1 so the two FP threads thrash one
# cpu's lazy save/restore deterministically. Override to 4 here: with
# the threads free to land on any of the four cores, every migration
# of a live FPU context exercises flush_owned_fpu() ->
# arch_flush_fpu_ipi() -> the BCM2836 mailbox-0 FPU-flush IPI. That
# cross-cpu path is exactly what this board overlay exists to test.
CONFIG_MP_MAX_NUM_CPUS=4
CONFIG_SMP=y
CONFIG_PM_CPU_OPS=y
CONFIG_PM_CPU_OPS_SPINTABLE=y

# arch_cpu_start uses sys_cache_data_flush_range to publish
# arm64_cpu_boot_params to the parked secondary core; without
# CACHE_MANAGEMENT the flush is a no-op and cpu 0 hangs in wfe
# waiting for the secondary's mpid handshake.
CONFIG_CACHE_MANAGEMENT=y
