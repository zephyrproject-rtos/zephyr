# Enable MMU support for RISC-V virtual memory testing.
CONFIG_RISCV_MMU=y
CONFIG_MAX_XLAT_TABLES=128
# QEMU icount mode: jump to next timer deadline on wfi (needed for k_sleep)
CONFIG_QEMU_ICOUNT_SLEEP=y
CONFIG_USERSPACE_SWITCHING_TESTS=y
