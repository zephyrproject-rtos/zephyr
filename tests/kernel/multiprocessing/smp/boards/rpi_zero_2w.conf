CONFIG_BOOT_DELAY=200

CONFIG_MP_MAX_NUM_CPUS=4
CONFIG_PM_CPU_OPS=y
CONFIG_PM_CPU_OPS_SPINTABLE=y

# The suite assumes threads default to "runnable on any cpu" so it can
# observe migration. CONFIG_SCHED_CPU_MASK_PIN_ONLY makes the default
# cpu_mask = 1 (cpu 0 only), which traps every spawned thread on cpu 0
# and turns all the cross-cpu tests into single-core failures. Leave
# SCHED_CPU_MASK off here.

# arch_cpu_start uses sys_cache_data_flush_range to publish
# arm64_cpu_boot_params to the parked secondary core; without
# CACHE_MANAGEMENT the flush is a no-op and the secondary's voting
# loop in reset.S never sees the new mpid, so cpu 0 hangs in wfe.
# Explicit here because the ztest build has no peripheral driver
# whose Kconfig select would pull it in.
CONFIG_CACHE_MANAGEMENT=y

CONFIG_SMP_TEST_RUN_FACTOR=100
CONFIG_SMP_IPI_NUM_ITERS=20
