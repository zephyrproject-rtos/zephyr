CONFIG_ZTEST=y
CONFIG_ZTEST_FATAL_HOOK=y
CONFIG_THREAD_NAME=y
CONFIG_WORKQUEUE_WORK_TIMEOUT=y

# Aborting an essential thread trips __ASSERT() in z_thread_abort() before the
# panic this test is about, so run without assertions.
CONFIG_ASSERT=n

# The tests rely on knowing which thread an ISR interrupted.
CONFIG_MP_MAX_NUM_CPUS=1
