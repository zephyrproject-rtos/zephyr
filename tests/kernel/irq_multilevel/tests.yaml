common:
  tags:
    - kernel
    - interrupt

tests:
  kernel.irq_multilevel.configured:
    filter: CONFIG_MULTI_LEVEL_INTERRUPTS

  kernel.irq_multilevel.two_level:
    platform_allow:
      - qemu_malta/qemu_malta
      - qemu_malta/qemu_malta/be
      - qemu_leon3/leon3
    extra_configs:
      - CONFIG_MULTI_LEVEL_INTERRUPTS=y
      - CONFIG_2ND_LEVEL_INTERRUPTS=y
      - CONFIG_3RD_LEVEL_INTERRUPTS=n
      - CONFIG_1ST_LEVEL_INTERRUPT_BITS=8
      - CONFIG_2ND_LEVEL_INTERRUPT_BITS=8
      - CONFIG_MAX_IRQ_PER_AGGREGATOR=32

  kernel.irq_multilevel.three_level:
    platform_allow:
      - qemu_malta/qemu_malta
      - qemu_malta/qemu_malta/be
      - qemu_leon3/leon3
    extra_configs:
      - CONFIG_MULTI_LEVEL_INTERRUPTS=y
      - CONFIG_2ND_LEVEL_INTERRUPTS=y
      - CONFIG_3RD_LEVEL_INTERRUPTS=y
      - CONFIG_1ST_LEVEL_INTERRUPT_BITS=8
      - CONFIG_2ND_LEVEL_INTERRUPT_BITS=8
      - CONFIG_3RD_LEVEL_INTERRUPT_BITS=8
      - CONFIG_MAX_IRQ_PER_AGGREGATOR=32
