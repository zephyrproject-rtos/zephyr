tests:
  kernel.mutex.system.k_mutex:
    filter: CONFIG_ARCH_HAS_USERSPACE and CONFIG_SYS_MUTEX_IMPL_K_MUTEX
    arch_exclude:
      - posix
    tags:
      - kernel
      - userspace
      - mutex
  kernel.mutex.system.nouser:
    tags:
      - kernel
      - mutex
    extra_configs:
      - CONFIG_TEST_USERSPACE=n
