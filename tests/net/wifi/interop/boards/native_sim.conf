# The native_sim Wi-Fi driver is enabled by the "zephyr,native-sim-wifi" node in
# native_sim.overlay (which also sets the host interface name); it just needs
# the Zephyr supplicant.
CONFIG_WIFI_NM_WPA_SUPPLICANT=y

# The supplicant allocates scan results / connection state from the system
# heap; without a sufficiently large heap scans come back empty and connect
# fails with "AP not found".
CONFIG_HEAP_MEM_POOL_SIZE=65535

# The 4-way handshake and the AP/beacon timers are wall-clock driven on the
# host, so run the simulation in real time to keep them in sync.
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y

# Put the shell UART on the process stdin/stdout (instead of a separate pty) so
# the pytest twister harness can read the prompt and send commands.
CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y

# Network application options and configuration (dual stack). The Wi-Fi
# interface only comes up after "wifi connect", so disable the net_config
# "need address" waits: otherwise net_config blocks for up to
# CONFIG_NET_CONFIG_INIT_TIMEOUT (30s) at boot waiting for the interface and
# logs a spurious initialization failure.
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=n
CONFIG_NET_CONFIG_NEED_IPV6=n
CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::1"
CONFIG_NET_CONFIG_PEER_IPV6_ADDR="2001:db8::2"
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"
