common:
  build_only: true
  tags:
    - drivers
    - wifi
    - net
    - hostap
    - posix
  platform_allow:
    - native_sim
tests:
  net.wifi.build.crypto_alt:
    extra_configs: []
  net.wifi.build.crypto_none:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_CRYPTO_NONE=y
  net.wifi.build.crypto_psa:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_CRYPTO_ALT=y
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_CRYPTO_MBEDTLS_PSA=y
  net.wifi.build.crypto_enterprise:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_CRYPTO_ENTERPRISE=y
      - CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=y
      - CONFIG_EAP_TLS=y
      - CONFIG_EAP_TTLS=y
      - CONFIG_EAP_PEAP=y
      - CONFIG_EAP_MSCHAPV2=y
      - CONFIG_EAP_PSK=y
      - CONFIG_EAP_PAX=y
      - CONFIG_EAP_SAKE=y
      - CONFIG_EAP_GPSK=y
      - CONFIG_EAP_PWD=y
      - CONFIG_EAP_EKE=y
      - CONFIG_EAP_IKEV2=y
      - CONFIG_EAP_SIM=y
      - CONFIG_EAP_AKA=y
  net.wifi.build.wpa3:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_WPA3_IMPLEMENTATION_INT=y
      - CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=y
  net.wifi.build.ap:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_AP=y
  net.wifi.build.wps:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_WPS=y
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_EAPOL=y
  net.wifi.build.p2p:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_P2P=y
  net.wifi.build.hostapd_ap:
    extra_configs:
      - CONFIG_WIFI_NM_HOSTAPD_AP=y
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_INF_MON=n
  net.wifi.build.hostapd_ap_enterprise:
    extra_configs:
      - CONFIG_WIFI_NM_HOSTAPD_AP=y
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_INF_MON=n
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_CRYPTO_ENTERPRISE=y
      - CONFIG_WIFI_NM_HOSTAPD_CRYPTO_ENTERPRISE=y
  net.wifi.build.hostapd_wps:
    extra_configs:
      - CONFIG_WIFI_NM_HOSTAPD_AP=y
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_INF_MON=n
      - CONFIG_WIFI_NM_HOSTAPD_WPS=y
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_WPS=y
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_EAPOL=y
  net.wifi.build.hostapd_dpp:
    extra_configs:
      - CONFIG_WIFI_NM_HOSTAPD_AP=y
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_INF_MON=n
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_DPP=y
  net.wifi.build.roaming:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_ROAMING=y
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_SKIP_DHCP_ON_ROAMING=y
  net.wifi.build.dpp:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_DPP=y
  net.wifi.build.disable_advanced_feat:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_ADVANCED_FEATURES=n
  net.wifi.build.enterprise_runtime:
    extra_configs:
      - CONFIG_WIFI_SHELL_RUNTIME_CERTIFICATES=y
    extra_args:
      - SNIPPET="wifi-enterprise"
  wifi.build.nan:
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_NAN=y
