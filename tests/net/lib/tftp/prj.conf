CONFIG_NETWORKING=y
CONFIG_LOG=y
CONFIG_NET_IPV4=y

CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

CONFIG_TFTP_LIB=y
CONFIG_TFTPS=y
CONFIG_TFTPS_MAX_CLIENTS=6

CONFIG_ZTEST=y

# File system support (RAM disk + in-memory ext2)
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_FILE_SYSTEM_EXT2=y
