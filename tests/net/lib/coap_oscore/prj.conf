#Testing
CONFIG_TEST=y
CONFIG_ZTEST=y
CONFIG_NET_TEST=y

# Generic networking options
CONFIG_NETWORKING=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_LOOPBACK=y

# CoAP Over Sockets
CONFIG_COAP=y
CONFIG_COAP_SERVER=y
CONFIG_COAP_WELL_KNOWN_BLOCK_WISE=n
CONFIG_COAP_TEST_API_ENABLE=y

# Kernel options
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Logging
CONFIG_NET_LOG=y
CONFIG_COAP_LOG_LEVEL_DBG=y

CONFIG_ZTEST_STACK_SIZE=2048

# OSCORE support
CONFIG_COAP_OSCORE=y
CONFIG_UOSCORE=y
CONFIG_ZCBOR=y
CONFIG_ZCBOR_CANONICAL=y
# Each end-to-end test allocates a client and a server context at a time.
CONFIG_COAP_OSCORE_MAX_CONTEXTS=4

# Room for the control eventfd plus the service socket under test.
CONFIG_ZVFS_POLL_MAX=4

# OSCORE Exchange cache configuration
CONFIG_COAP_OSCORE_EXCHANGE_CACHE_SIZE=4
CONFIG_COAP_OSCORE_EXCHANGE_LIFETIME_MS=60000
