# Self-contained networking, no external driver required.
CONFIG_NET_TEST=y

CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_MAX_CONN=10

# Loopback interface for local client/server testing
CONFIG_NET_DRIVERS=y
CONFIG_NET_LOOPBACK=y
CONFIG_NET_LOOPBACK_MTU=1280
CONFIG_TEST_RANDOM_GENERATOR=y

# zperf library under test
CONFIG_NET_ZPERF=y
CONFIG_NET_ZPERF_SERVER=y

# The zperf TCP/UDP receivers register one socket service each. The socket
# service worker polls all of them at once (TCP: MAX_SESSIONS + 2 listeners,
# UDP: 2 sockets) plus an internal eventfd, so give zvfs_poll() enough slots.
CONFIG_ZVFS_POLL_MAX=16

# zperf is packet heavy, give it enough buffers for the stress test
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=96
CONFIG_NET_BUF_DATA_SIZE=256

# The UDP uploader needs a receive timeout to collect the server statistics
CONFIG_NET_CONTEXT_RCVTIMEO=y

CONFIG_HEAP_MEM_POOL_SIZE=1024

# Uncomment for debugging the test
#CONFIG_LOG=y
#CONFIG_NET_LOG=y
#CONFIG_NET_ZPERF_LOG_LEVEL_DBG=y
