# Networking config
CONFIG_NETWORKING=y
CONFIG_NET_LOG=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_ZVFS_OPEN_ADD_SIZE_NET=10
CONFIG_ZVFS_POLL_MAX=9
CONFIG_NET_IPV6_DAD=n
CONFIG_NET_IPV6_MLD=n

# Network driver config
CONFIG_NET_DRIVERS=y
CONFIG_NET_LOOPBACK=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_DRIVER=n
CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_ZTEST=y
CONFIG_NET_TEST=y
CONFIG_TEST_USERSPACE=y

CONFIG_ZTEST_STACK_SIZE=17408
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_PRIVILEGED_STACK_SIZE=8192

CONFIG_MBEDTLS_HEAP_SIZE=32768
CONFIG_MBEDTLS_ENABLE_HEAP=y

CONFIG_QUIC=y
CONFIG_QUIC_MAX_CONTEXTS=4
CONFIG_QUIC_MAX_STREAMS_BIDI=2
CONFIG_QUIC_MAX_STREAMS_UNI=2
CONFIG_QUIC_MAX_ENDPOINTS=4
CONFIG_QUIC_PKT_COUNT=10

CONFIG_NET_NAMESPACE_COMPAT_MODE=n

CONFIG_TLS_MAX_CREDENTIALS_NUMBER=8
CONFIG_MBEDTLS_PSA_KEY_SLOT_COUNT=48

# Make sure to test packet retransmission logic
CONFIG_NET_LOOPBACK_SIMULATE_PACKET_DROP=y
