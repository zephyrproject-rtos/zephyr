CONFIG_NETWORKING=y
CONFIG_NET_TEST=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV6_NBR_CACHE=y

CONFIG_NET_L2_DUMMY=y
CONFIG_NET_L2_ETHERNET=n

# The unsolicited NA feature under test, and its net-mgmt event dependencies.
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_IPV6_UNSOLICITED_NA=y

# Neighbor Discovery uses sys_rand_get(); provide a random backend so the build
# links on boards without a hardware entropy source (e.g. mps2/an385).
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_ZTEST=y
CONFIG_NET_IF_MAX_IPV6_COUNT=3
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_ZTEST_STACK_SIZE=2048
