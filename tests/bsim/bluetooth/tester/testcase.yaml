common:
  build_only: true
  tags:
    - bluetooth
  harness: bsim
  harness_config:
    bsim_exe_name: tests_bsim_bluetooth_tester_prj_conf
  extra_args:
    - CONF_FILE=${ZEPHYR_BASE}/tests/bluetooth/tester/prj.conf

tests:
  bluetooth.tester_nrf52_bsim:
    platform_allow:
      - nrf52_bsim/native
    extra_args:
      - EXTRA_CONF_FILE=${ZEPHYR_BASE}/tests/bluetooth/tester/boards/nrf52_bsim.conf
  bluetooth.tester_nrf5340bsim:
    sysbuild: true
    platform_allow:
      - nrf5340bsim/nrf5340/cpuapp
    extra_args:
      - EXTRA_CONF_FILE=${ZEPHYR_BASE}/tests/bluetooth/tester/boards/nrf5340bsim_nrf5340_cpuapp.conf
