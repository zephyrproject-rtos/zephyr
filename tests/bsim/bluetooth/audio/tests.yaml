common:
  timeout: 1500
  tags:
    - bluetooth
  depends_on: bsim
  sysbuild: true
  harness: bsim
  harness_config:
    fixture: bsim_multi_test
    bsim_exe_name: tests_bsim_bluetooth_audio_prj_conf
    tests_scripts:
      - test_scripts

tests:
  bluetooth.audio:
    platform_allow:
      - nrf52_bsim
      - nrf54l15bsim/nrf54l15/cpuapp
    extra_args:
      EXTRA_CONF_FILE=overlay-bt_ll_sw_split.conf
  bluetooth.audio.nrf5340cpuapp:
    platform_allow:
      - nrf5340bsim/nrf5340/cpuapp
