CONFIG_BT_EXT_ADV=y

# Enable chained advertising data so the peer can advertise ~1000 bytes,
# producing a long fragmented chain (~6 PDUs) at the scanner.
CONFIG_BT_CTLR_ADVANCED_FEATURES=y
CONFIG_BT_CTLR_ADV_DATA_CHAIN=y
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=1100
CONFIG_BT_CTLR_ADV_DATA_BUF_MAX=8
CONFIG_BT_CTLR_SCAN_DATA_LEN_MAX=1100
CONFIG_BT_CTLR_RX_BUFFERS=9

# Enough event buffers for the controller to format a ~6-PDU chain into HCI
# events. The host-side discardable pool (in prj.conf) is what triggers the
# chain-aware discard logic.
CONFIG_BT_BUF_EVT_RX_COUNT=16
CONFIG_BT_BUF_ACL_TX_COUNT=3
