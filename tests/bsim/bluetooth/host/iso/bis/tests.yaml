common:
  timeout: 600
  tags:
    - bluetooth
  depends_on: bsim
  harness: bsim
  harness_config:
    fixture: bsim_multi_test
    bsim_exe_name: tests_bsim_bluetooth_host_iso_bis_prj_conf

tests:
  bluetooth.host.iso.bis:
    platform_allow:
      - nrf52_bsim/native
    extra_args:
      EXTRA_CONF_FILE=controller.conf
  bluetooth.host.iso.bis_nrf5340:
    sysbuild: true
    platform_allow:
      - nrf5340bsim/nrf5340/cpuapp
    harness_config:
      fixture: bsim_multi_test
      bsim_exe_name: tests_bsim_bluetooth_host_iso_bis_prj_conf
      tests_scripts:
        - tests_scripts/bis.sh
