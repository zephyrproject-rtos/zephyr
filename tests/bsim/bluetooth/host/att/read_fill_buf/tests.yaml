tests:
  bluetooth.host.att.read_fill_buf:
    tags:
      - bluetooth
    depends_on: bsim
    build: false
    platform_allow:
      - nrf52_bsim/native
    harness: bsim
    harness_config:
      fixture: bsim_multi_test
      tests_scripts:
        - test_scripts
    required_applications:
      - application: bluetooth.host.att.read_fill_buf.client
        path: client
      - application: bluetooth.host.att.read_fill_buf.server
        path: server
