common:
  filter: CONFIG_ARCH_HAS_TIMING_FUNCTIONS
  platform_type:
    - mcu
    - native
tests:
  arch.common.timing:
    tags:
      - timing
      - arch
  arch.common.timing.smp:
    filter: CONFIG_SMP and CONFIG_MP_MAX_NUM_CPUS > 1
    tags:
      - timing
      - arch
      - smp
    extra_configs:
      - CONFIG_SCHED_SIMPLE=y
      - CONFIG_SCHED_CPU_MASK=y
