# Appended to MCUboot's own boot/zephyr/prj.conf (a sysbuild/mcuboot/ directory
# would replace it instead, dropping MCUboot's defaults).

# "bootutil_verify_sig: ED25519 key_id N" must reach the console ahead of the
# application banner.
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_MCUBOOT_LOG_LEVEL_DBG=y

CONFIG_FLASH=y
CONFIG_FLASH_SIMULATOR=y

# RAM_LOAD passes the load address to the application through retained RAM.
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETAINED_MEM_ZEPHYR_RAM=y
CONFIG_BOOT_SHARE_DATA=y
CONFIG_BOOT_SHARE_DATA_BOOTINFO=y
CONFIG_BOOT_SHARE_BACKEND_RETENTION=y

# The pytest harness loads MCUboot into QEMU from the hex.
CONFIG_BUILD_OUTPUT_HEX=y
