SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_BOOT_SIGNATURE_TYPE_ED25519=y

# A development bootloader that trusts two keys from the MCUboot repository: its
# own development key and the production key by its public half only (the
# production private key is never needed to build the bootloader). MCUboot
# embeds the public half of each and boots an image signed by either. The
# application is signed at build time with the development key (key_id 0); the
# key1 scenario re-signs it post-build with the production key (key_id 1).
#
# CAUTION: This is a test-only configuration using publicly available secrets:
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="${ZEPHYR_MCUBOOT_MODULE_DIR}/root-ed25519.pem,${ZEPHYR_MCUBOOT_MODULE_DIR}/root-ed25519-2-pub.pem"
# You must provision and manage your own keys and provide the path to them
# relative to your own application directory. For example:
#
# SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="${APP_DIR}/keys/my-private-dev-key.pem,${APP_DIR}/keys/my-public-prod-key.pem"
#
# In the example above, developers hold the internally shared private key for
# development builds, but do NOT hold the private key for production builds.
# Instead, they only hold the public half of the production key, which the
# bootloader uses to verify production-signed images.

# Test-specific configuration for QEMU.
# The image slots live in the RAM-backed flash simulator, which is not
# executable; MCUboot copies slot0 into SRAM and runs it from there.
SB_CONFIG_MCUBOOT_MODE_RAM_LOAD=y
