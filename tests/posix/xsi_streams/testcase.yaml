common:
  filter: not CONFIG_NATIVE_LIBC
  tags:
    - posix
    - xsi_streams
  # 1 tier0 platform per supported architecture
  platform_key:
    - arch
    - simulation
  integration_platforms:
    - qemu_riscv64
  min_flash: 64
  min_ram: 32
  # FVP SMP has unresolved issues
  platform_exclude:
    - fvp_base_revc_2xaem/v8a/smp
    - fvp_base_revc_2xaem/v8a/smp/ns
    - fvp_base_revc_2xaem/v9a/smp
    - fvp_base_revc_2xaem/v9a/smp/ns
tests:
  portability.posix.xsi_streams: {}
  portability.posix.xsi_streams.minimal:
    extra_configs:
      - CONFIG_MINIMAL_LIBC=y
  portability.posix.xsi_streams.newlib:
    filter: TOOLCHAIN_HAS_NEWLIB == 1
    extra_configs:
      - CONFIG_NEWLIB_LIBC=y
  portability.posix.xsi_streams.picolibc:
    tags: picolibc
    filter: CONFIG_PICOLIBC_SUPPORTED
    extra_configs:
      - CONFIG_PICOLIBC=y
