common:
  build_only: true
  tags:
    - drivers
    - wifi
    - bflb
  extra_configs:
    - CONFIG_BUILD_ONLY_NO_BLOBS=y
tests:
  drivers.wifi.bflb.sta:
    platform_allow:
      - bl618g0
      - ai_m61_32s_kit
      - ai_m62_12f_kit
      - maix_m0s_dock
      - ai_wb2_12f_kit
      - bl604e_iot_dvk
  drivers.wifi.bflb.macsw_bridge:
    platform_allow:
      - bl618g0
      - ai_m61_32s_kit
      - ai_m62_12f_kit
      - maix_m0s_dock
    extra_configs:
      - CONFIG_BFLB_WIFI_BL61X_MACSW_BRIDGE=y
  drivers.wifi.bflb.macsw_ack:
    platform_allow:
      - bl618g0
      - ai_m61_32s_kit
      - ai_m62_12f_kit
      - maix_m0s_dock
    extra_configs:
      - CONFIG_BFLB_WIFI_BL61X_MACSW_ACK=y
  drivers.wifi.bflb.macsw_coex:
    platform_allow:
      - bl618g0
      - ai_m61_32s_kit
      - ai_m62_12f_kit
      - maix_m0s_dock
    extra_configs:
      - CONFIG_BFLB_WIFI_BL61X_MACSW_COEX=y
  drivers.wifi.bflb.ap:
    platform_allow:
      - bl618g0
      - ai_m61_32s_kit
      - ai_m62_12f_kit
      - maix_m0s_dock
    extra_configs:
      - CONFIG_WIFI_NM_WPA_SUPPLICANT_AP=y
  drivers.wifi.bflb.stats:
    platform_allow:
      - bl618g0
      - ai_m61_32s_kit
      - ai_m62_12f_kit
      - maix_m0s_dock
    extra_configs:
      - CONFIG_NET_STATISTICS=y
      - CONFIG_NET_STATISTICS_WIFI=y
