common:
  build_only: true
  tags:
    - drivers
    - wifi
    - net
    - nrf_wifi
  platform_allow:
    - nrf7002dk/nrf5340/cpuapp
tests:
  drivers.net.wifi.build.sta:
    extra_configs: []
  drivers.net.wifi.build.radio_test:
    extra_configs:
      - CONFIG_NRF70_RADIO_TEST=y
      - CONFIG_NETWORKING=n
  drivers.net.wifi.build.scan_only:
    extra_configs:
      - CONFIG_WIFI_USAGE_MODE_SCAN_ONLY=y
  drivers.net.wifi.build.raw_scan_results:
    extra_configs:
      - CONFIG_WIFI_USAGE_MODE_SCAN_ONLY=y
      - CONFIG_WIFI_MGMT_RAW_SCAN_RESULTS=y
  drivers.net.wifi.build.raw_tx:
    extra_configs:
      - CONFIG_NRF70_RAW_DATA_TX=y
  drivers.net.wifi.build.raw_rx:
    extra_configs:
      - CONFIG_NRF70_RAW_DATA_RX=y
  drivers.net.wifi.build.promiscuous:
    extra_configs:
      - CONFIG_NRF70_PROMISC_DATA_RX=y
  drivers.net.wifi.build.offloaded_raw_tx:
    extra_configs:
      - CONFIG_NRF70_OFFLOADED_RAW_TX=y
      - CONFIG_NETWORKING=n
  drivers.net.wifi.build.softap:
    extra_configs:
      - CONFIG_WIFI_USAGE_MODE_STA_AP=y
  drivers.net.wifi.build.p2p:
    extra_configs:
      - CONFIG_NRF70_P2P_MODE=y
  drivers.net.wifi.build.tx_align:
    extra_configs:
      - CONFIG_NET_PKT_BUF_TX_DATA_ALLOC_ALIGN_LEN=4
      - CONFIG_NET_BUF_VARIABLE_DATA_SIZE=y
  drivers.net.wifi.build.ethernet_stats:
    extra_configs:
      - CONFIG_NET_STATISTICS_ETHERNET=y
      - CONFIG_NET_STATISTICS_ETHERNET_VENDOR=y
  drivers.net.wifi.build.sr_coex:
    extra_configs:
      - CONFIG_NRF70_SR_COEX=y
    extra_args: SHIELD=nrf7002ek
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
    platform_exclude:
      - nrf7002dk/nrf5340/cpuapp
