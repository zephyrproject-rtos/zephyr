CONFIG_ZTEST=y
CONFIG_WIFI=y
CONFIG_WIFI_HWSIM=y
CONFIG_WIFI_HWSIM_NUM_RADIOS=2
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_INTERFACE_NAME=y
CONFIG_NET_IPV4=y
CONFIG_NET_ARP=y
CONFIG_NETWORKING=y
# All hwsim radios share a single IP stack, so each radio's address is a
# local address. Disable the "destination is my own address" short-circuit
# so inter-radio data frames are sent over the simulated medium instead of
# being looped back internally.
CONFIG_NET_IP_ADDR_CHECK=n
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_IF_MAX_IPV6_COUNT=3
CONFIG_NET_IF_MAX_IPV4_COUNT=5
CONFIG_WIFI_HWSIM_SHELL=n
CONFIG_WIFI_HWSIM_CONNECT_TIMEOUT_SEC=15
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_AP=y
# Real supplicant crypto (mbedTLS) so WPA2-PSK and WPA3-SAE run their real
# key management; CRYPTO_NONE would disable the 4-way handshake and SAE.
CONFIG_WIFI_NM_WPA_SUPPLICANT_CRYPTO_ALT=y
CONFIG_WIFI_NM_MAX_MANAGED_INTERFACES=4
# EAPOL (4-way handshake) frames travel as 0x888E data frames over the medium
# via AF_PACKET/DGRAM sockets; the supplicant needs packet-socket support.
CONFIG_NET_SOCKETS_PACKET=y
CONFIG_NET_SOCKETS_PACKET_DGRAM=y
CONFIG_NET_ETHERNET_FORWARD_UNRECOGNISED_ETHERTYPE=y
# A STA radio and an AP radio run concurrently in one process, both driven by
# the supplicant with real crypto (hostapd beacon buffers, WPA2/WPA3 key mgmt).
# Give the kernel heap generous headroom (hostapd/mbedTLS allocate from it).
CONFIG_HEAP_MEM_POOL_SIZE=131072
