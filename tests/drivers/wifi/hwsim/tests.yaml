tests:
  drivers.wifi.hwsim:
    platform_allow:
      - native_sim
    tags:
      - wifi
      - hwsim
      - networking
      - drivers
    timeout: 120
    harness: ztest
    harness_config:
      type: one_line
      regex:
        - "PROJECT EXECUTION SUCCESSFUL"
