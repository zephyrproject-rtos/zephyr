# TIMER1 (capture, 16-bit) at 76.8 MHz EM01GRPACLK overflows after ~853 us.
# Use 800 us period so the capture value fits in the 16-bit counter.
CONFIG_TEST_PWM_PERIOD_NSEC=800000
CONFIG_TEST_PWM_PULSE_NSEC=400000
CONFIG_TEST_PWM_PERIOD_USEC=800
CONFIG_TEST_PWM_PULSE_USEC=400
