common:
  tags:
    - dac
    - drivers
  depends_on:
    - dac
    - adc
  harness: ztest
  harness_config:
    fixture: dac_adc_loopback
tests:
  drivers.dac.loopback:
    filter: dt_node_has_prop("/zephyr,user", "io-channels")
  drivers.dac.loopback.xg2x:
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="xg2x.overlay"
    platform_allow:
      - xg23_rb4210a
      - xg24_dk2601b
      - xg24_ek2703a
      - xg24_rb4187c
  drivers.dac.loopback.dac1_chan1_adc1_chan0:
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="dac1-channel1-adc1-channel0.overlay"
    platform_allow:
      - nucleo_f207zg
      - nucleo_f429zi
      - nucleo_f746zg
      - nucleo_g071rb
      - nucleo_l073rz
    integration_platforms:
      - nucleo_f207zg
  drivers.dac.loopback.nxp_dac0_adc23_internal:
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="nxp-dac0-adc23-internal.overlay"
    extra_configs:
      - CONFIG_DAC_MCUX_DAC32_TESTOUT=y
    platform_allow:
      - frdm_k22f
      - frdm_k64f
      - twr_ke18f
  drivers.dac.loopback.blxxx_dvk:
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="blxxx_dvk.overlay"
    platform_allow:
      - bl652_dvk
      - bl653_dvk
      - bl654_dvk
      - bl5340_dvk/nrf5340/cpuapp
