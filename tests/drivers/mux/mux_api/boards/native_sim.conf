# The gpio-mux fixture in native_sim.overlay drives the emulated GPIO
# controller, so the GPIO subsystem must be enabled. CONFIG_MUX_GPIO is
# "default y" but depends on GPIO, so without this the driver is not built
# and the mux0 controller device is left undefined (link error).
CONFIG_GPIO=y
