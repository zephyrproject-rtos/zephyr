description: |
  Test fixture binding for the clock_monitor API test suite.

  Each child node names one clock_monitor instance to exercise and
  carries optional per-instance expectations, e.g.:

    / {
        clock-monitor-test {
            compatible = "test-clock-monitor";

            fm {
                monitor = <&cmu_1>;
                measure-expected-hz = <48000000>;
            };
        };
    };

compatible: "test-clock-monitor"

child-binding:
  description: One clock_monitor instance under test.

  properties:
    monitor:
      type: phandle
      required: true
      description: The clock_monitor device to exercise.

    measure-expected-hz:
      type: int
      default: 0
      description: |
        Nominal frequency (Hz) of the clock measured by this instance.
        When non-zero, the suite asserts that the measured value lies
        within measure-tolerance-ppm of this value. 0 skips the
        accuracy check (e.g. for WINDOW-only instances).

    measure-tolerance-ppm:
      type: int
      default: 50000
      description: |
        Accepted plus/minus deviation of the measured frequency from
        measure-expected-hz, in parts-per-million.

    switch-reference:
      type: int
      default: 0
      description: |
        Alternate reference-clock cookie (opaque, back-end specific) for the
        set_source() test. When non-zero, the suite switches the reference to
        this source, reconfigures, and asserts the same target still measures
        within tolerance of measure-expected-hz.

    switch-target:
      type: int
      default: 0
      description: |
        Alternate target-clock cookie for the set_source() test. When non-zero,
        the suite switches the target to this source, reconfigures, and
        re-measures - the measured value becomes this target's frequency.

    switch-target-expected-hz:
      type: int
      default: 0
      description: |
        Expected measured frequency (Hz) after switching the target to
        switch-target. When non-zero, the measured value must lie within
        measure-tolerance-ppm of it. 0 only logs the measured value.
