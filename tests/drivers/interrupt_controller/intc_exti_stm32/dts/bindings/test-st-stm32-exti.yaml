description: |
    This binding provides resources required to build and run the
    tests/drivers/interrupt_controller/intc_exti_stm32 test in Zephyr.

compatible: "test-st-stm32-exti"

properties:

  exti-line-nr:
    type: int
    required: true
    description: |
      The EXTI line number to be used for the test.

  exti-line-irq-nr:
    type: int
    required: true
    description: |
      The EXTI line IRQ number to be used for the test.

  exti-line-irq-prio:
    type: int
    required: true
    description: |
      The EXTI line IRQ priority to be used for the test.
