  drivers.modem.hl78xx.compile.hl7812.default:
    extra_args:
      - DTC_OVERLAY_FILE=boards/native_sim_hl7812.overlay

  drivers.modem.hl78xx.compile.hl7812.stay_in_boot_mode_for_roaming:
