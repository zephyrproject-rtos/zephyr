common:
  tags:
    - drivers
    - can
  depends_on: can
  filter: dt_chosen_enabled("zephyr,canbus")
  harness: pytest
  extra_configs:
    - arch:posix:CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y
  extra_args:
    - arch:posix:SNIPPET=socketcan-native-sim
tests:
  drivers.can.host:
    # The CAN bus between host and DUT is provided by the user: a physical CAN
    # adapter, or a manually created virtual interface (see the README).
    harness_config:
      pytest_dut_scope: session
      fixture: can
    integration_platforms:
      - native_sim
      - native_sim/native/64
  drivers.can.host.sidecar:
    # The "can" sidecar creates and removes the host CAN bus itself and reports
    # the interface it made to the test, so neither the `can` fixture nor any
    # manual setup is needed. Limited to the simulated targets whose CAN driver
    # attaches to a host SocketCAN interface.
    sidecar: can
    harness_config:
      pytest_dut_scope: session
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim
