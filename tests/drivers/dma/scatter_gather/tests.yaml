tests:
  drivers.dma.scatter_gather:
    depends_on: dma
    tags:
      - drivers
      - dma
    platform_allow:
      - intel_adsp/cavs25
      - frdm_k64f
      - frdm_mcxe247
      - frdm_mcxe31b
      - mimxrt1010_evk
      - mimxrt685_evk/mimxrt685s/cm33
      - mimxrt1060_evk/mimxrt1062/qspi
      - lpcxpresso55s36
      - native_sim
      - native_sim/native/64
      - xmc45_relax_kit
      - xmc47_relax_kit
      - siwx917_rb4338a
      - siwx917_rb4342a
      - siwx917_dk2605a
      - adp_xc7k/ae350
      - adp_xc7k/ae350/clic
      - bg29_rb4420a
      - xg24_rb4187c
      - pic32cz_ca80_cult
    filter: dt_nodelabel_enabled("tst_dma0")
    integration_platforms:
      - intel_adsp/cavs25
      - native_sim
      - native_sim/native/64
  drivers.dma.ifx_axidmac.scatter_gather:
    depends_on: dma
    tags:
      - drivers
      - dma
    filter: dt_nodelabel_enabled("tst_dma0") and CONFIG_DMA_INFINEON_MDMA
    extra_args: DTC_OVERLAY_FILE="boards/pse8x_axi.overlay"
    extra_configs:
      - CONFIG_NOCACHE_MEMORY=y
      - CONFIG_DMA_INFINEON_MDMA_DESCRIPTOR_COUNT=4
    platform_allow:
      - kit_pse84_ai/pse846gps2dbzc4a/m33
      - kit_pse84_ai/pse846gps2dbzc4a/m55
      - kit_pse84_eval/pse846gps2dbzc4a/m33
      - kit_pse84_eval/pse846gps2dbzc4a/m55
