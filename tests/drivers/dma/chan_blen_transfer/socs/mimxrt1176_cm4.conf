# On CM4, SRAM1 (0x20000000) is the default zephyr,sram (DTCM).
# The mcux-edma TCD pool also maps to SRAM1 via __nocache when
# CONFIG_NOCACHE_MEMORY=y and no zephyr,dtcm chosen node exists.
# Relocating test buffers into SRAM1 overlaps the TCD pool and
# causes data corruption. Disable relocation for all CM4 boards.
CONFIG_NOCACHE_MEMORY=y
CONFIG_MEM_ATTR_HEAP=y
