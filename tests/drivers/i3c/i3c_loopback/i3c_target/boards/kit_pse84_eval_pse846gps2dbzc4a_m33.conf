# Bench configuration for KIT_PSE84_EVAL (PSE846GPS2DBZC4A, M33 core).
#
# The Infineon DW I3C wrapper on PSE84 v1 silicon has two integration
# quirks the generic DW driver does not cover:
#   - a vendor wrapper-gate register at base+0x400 must be re-opened
#     for SOFT_RST to self-clear (the protocol clock is gated by it);
#   - the target IP requires a vendor EXT_CMD kick after RSTDAA to
#     re-arm its bus-available detector before the next ENTDAA round.
# Both behaviours are gated behind dedicated Kconfig symbols so the
# generic test code stays portable.
CONFIG_I3C_LOOPBACK_TARGET_VENDOR_WRAPPER_GATE=y
CONFIG_I3C_LOOPBACK_TARGET_WRAPPER_GATE_OFFSET=0x400
CONFIG_I3C_LOOPBACK_TARGET_WRAPPER_GATE_VALUE=0x80000000
CONFIG_I3C_LOOPBACK_TARGET_VENDOR_EXT_CMD_KICK=y

# On PSE84 v1 silicon, SOFT_RST does NOT clear DEVICE_ADDR — the stale
# dynamic address from the previous ENTDAA round survives and breaks
# re-enumeration.  Disable so the target zeros DEVICE_ADDR explicitly.
CONFIG_I3C_LOOPBACK_TARGET_SOFT_RST_CLEARS_DEVICE_ADDR=n
