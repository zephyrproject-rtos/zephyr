# Target app for the i3c_loopback two-board test pair.
# Builds with CONFIG_I3C_TARGET_ROLE_ONLY=y.

CONFIG_PRINTK_SYNC=y
CONFIG_FAULT_DUMP=2
CONFIG_LOG=y

CONFIG_I3C=y
CONFIG_I3C_TARGET_ROLE_ONLY=y
CONFIG_I3C_USE_IBI=y

CONFIG_SERIAL=y
# Sync UART must stay poll-mode — see i3c_controller/prj.conf for the
# CONFIG_UART_INTERRUPT_DRIVEN interaction with i3c_bus_init.

CONFIG_PINCTRL_KEEP_SLEEP_STATE=y
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_FIXED_RATE_CLOCK=y
