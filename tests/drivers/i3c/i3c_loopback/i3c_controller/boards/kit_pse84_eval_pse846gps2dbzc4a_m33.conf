# Bench configuration for KIT_PSE84_EVAL (PSE846GPS2DBZC4A, M33 core).
#
# The PSE84 SOM has a permanent I3C target chip wired to the same I3C0
# pads the test controller drives, with no power-enable or isolation
# jumper exposed.  It participates in every ENTDAA round, so the
# controller test fixture must declare a placeholder descriptor for it
# (PID captured live from DEV_CHAR_TABLE on this SOM).
CONFIG_I3C_LOOPBACK_BENCH_HAS_PERMANENT_TARGET=y
CONFIG_I3C_LOOPBACK_BENCH_PERMANENT_TARGET_PID_HI=0x0770
CONFIG_I3C_LOOPBACK_BENCH_PERMANENT_TARGET_PID_LO=0x10331000
CONFIG_I3C_LOOPBACK_BENCH_PERMANENT_TARGET_INIT_DA=0x09
