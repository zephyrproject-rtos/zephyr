# Controller app for the i3c_loopback two-board test pair.

CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=4096

CONFIG_PRINTK_SYNC=y
CONFIG_FAULT_DUMP=2
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=8192

# I3C: controller-only build for max coverage of the controller paths
CONFIG_I3C=y
CONFIG_I3C_CONTROLLER_ROLE_ONLY=y
CONFIG_I3C_USE_IBI=y

# Sync UART (poll-mode only — do not enable CONFIG_UART_INTERRUPT_DRIVEN;
# the PDL UART IRQ handler races poll_in/poll_out and wedges subsequent
# i3c_bus_init traffic on PSE84.  Validated against the dummy
# tests/drivers/serial/uart_sync_loopback pair.)
CONFIG_SERIAL=y

# Misc
CONFIG_PINCTRL_KEEP_SLEEP_STATE=y
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_FIXED_RATE_CLOCK=y

# Runtime PM — required by test_pm.c to exercise the controller's
# pm_resume path (and any vendor pm_resume hook, e.g. Infineon PSE84).
CONFIG_PM_DEVICE=y
