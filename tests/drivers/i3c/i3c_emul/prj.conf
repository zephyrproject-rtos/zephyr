CONFIG_ZTEST=y
CONFIG_I2C=y
CONFIG_I2C_EMUL=y
CONFIG_I3C=y
CONFIG_I3C_DUAL_ROLE=y
CONFIG_I3C_USE_IBI=y
CONFIG_I3C_IBI_WORKQUEUE=y
CONFIG_I3C_IBI_MAX_PAYLOAD_SIZE=8
CONFIG_I3C_CALLBACK=y
CONFIG_I3C_RTIO=y
CONFIG_I3C_EMUL=y
CONFIG_EMUL=y
CONFIG_RTIO=y

# Heap for k_malloc — i3c_emul's broadcast DEFTGTS handler does
# k_malloc(payload->ccc.data_len) to stash a deep copy used by the
# handoff path. Without an explicit pool the default of 0 makes
# k_malloc return NULL and DEFTGTS-dependent tests fail.
CONFIG_HEAP_MEM_POOL_SIZE=4096
