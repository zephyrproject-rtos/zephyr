# Required when paired with the DW I3C controller (no clock-stretching support):
# eagerly pre-fetch I2C target read bytes into the SCB TX FIFO so the controller
# captures real data on the first bit instead of the DEFAULT_TX (0xFF) fill.
CONFIG_I2C_INFINEON_PDL_TARGET_PREFETCH=y
