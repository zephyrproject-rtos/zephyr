tests:
  drivers.mspi.api:
    tags:
      - drivers
      - mspi
      - api
    filter: dt_compat_enabled("zephyr,mspi-emul-controller")
    harness: ztest
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
  drivers.mspi.api.ambiq:
    tags:
      - drivers
      - mspi
      - api
    filter: dt_compat_enabled("ambiq,mspi-controller")
    harness: ztest
    platform_allow:
      - apollo3p_evb
      - apollo510_evb
    extra_configs:
      - CONFIG_MSPI_AMBIQ_CONTROLLER=y
  drivers.mspi.api.stm32:
    tags:
      - drivers
      - mspi
      - api
    filter: dt_compat_enabled("st,stm32-ospi-controller")
            or dt_compat_enabled("st,stm32-xspi-controller")
    harness: ztest
    platform_allow:
      - b_u585i_iot02a
