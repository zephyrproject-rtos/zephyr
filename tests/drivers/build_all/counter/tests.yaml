common:
  build_only: true
  tags:
    - drivers
    - counter
tests:
  drivers.counter.build.xlnx:
    platform_allow: arty_a7/designstart_fpga_cortex_m1
    extra_configs:
      - CONFIG_COUNTER_XLNX_AXI_TIMER=y
  drivers.counter.build.i2c:
    extra_args: DTC_OVERLAY_FILE="i2c_devices.overlay"
    extra_configs:
      - CONFIG_I2C=y
    platform_allow:
      - native_sim
      - native_sim/native/64
  drivers.counter.build.mcux_ctimer.capture:
    extra_configs:
      - CONFIG_COUNTER_CAPTURE=y
    platform_allow:
      - frdm_mcxa153
      - frdm_mcxa577
      - frdm_mcxn236
      - frdm_mcxw23
      - frdm_rw612
      - lpcxpresso55s36
      - mimxrt595_evk/mimxrt595s/cm33
  drivers.counter.build.mcux_qtmr.capture:
    extra_args: DTC_OVERLAY_FILE="qtmr_capture.overlay"
    extra_configs:
      - CONFIG_COUNTER_CAPTURE=y
    platform_allow:
      - frdm_imxrt1186/mimxrt1186/cm33
      - frdm_imxrt1186/mimxrt1186/cm7
      - mimxrt1060_evk/mimxrt1062/qspi
      - mimxrt1060_evk@C/mimxrt1062/qspi
      - mimxrt1064_evk
      - mimxrt1180_evk/mimxrt1189/cm33
      - mimxrt1180_evk/mimxrt1189/cm7
  drivers.counter.build:
    platform_allow: sr100_rdk/sr100
