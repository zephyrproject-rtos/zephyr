common:
  build_only: true
  tags:
    - drivers
    - i3c
tests:
  drivers.i3c.build.dual_role:
    # will cover drivers without in-tree boards
    platform_allow:
      - qemu_cortex_m3
      - nucleo_u385rg_q
    tags: i3c_cdns i3c_dw
    extra_args: "CONFIG_I3C_DUAL_ROLE=y CONFIG_I3C_RTIO=y"
  drivers.i3c.build.controller_role_only:
    # will cover drivers without in-tree boards
    platform_allow:
      - qemu_cortex_m3
      - nucleo_u385rg_q
    tags: i3c_cdns i3c_dw
    extra_args: "CONFIG_I3C_CONTROLLER_ROLE_ONLY=y CONFIG_I3C_RTIO=y"
  drivers.i3c.build.target_role_only:
    # will cover drivers without in-tree boards
    platform_allow:
      - qemu_cortex_m3
      - nucleo_u385rg_q
    tags: i3c_cdns i3c_dw
    extra_args: "CONFIG_I3C_TARGET_ROLE_ONLY=y"
  drivers.i3c.build.dual_role_nibi:
    # will cover drivers without in-tree boards
    platform_allow:
      - qemu_cortex_m3
      - nucleo_u385rg_q
    tags: i3c_cdns i3c_dw
    extra_args: "CONFIG_I3C_DUAL_ROLE=y CONFIG_I3C_RTIO=y CONFIG_I3C_USE_IBI=n"
  drivers.i3c.build.controller_role_only_nibi:
    # will cover drivers without in-tree boards
    platform_allow:
      - qemu_cortex_m3
      - nucleo_u385rg_q
    tags: i3c_cdns i3c_dw
    extra_args: "CONFIG_I3C_CONTROLLER_ROLE_ONLY=y CONFIG_I3C_RTIO=y CONFIG_I3C_USE_IBI=n"
  drivers.i3c.build.target_role_only_nibi:
    # will cover drivers without in-tree boards
    platform_allow:
      - qemu_cortex_m3
      - nucleo_u385rg_q
    tags: i3c_cdns i3c_dw
    extra_args: "CONFIG_I3C_TARGET_ROLE_ONLY=y CONFIG_I3C_USE_IBI=n"
  drivers.i3c.build.stm32:
    platform_allow:
      - nucleo_c5a3zg
  drivers.i3c.build.emul:
    # Compile-coverage for the I3C emulator on native_sim. Locks in that
    # CONFIG_I3C_EMUL=y stays buildable through future I3C-subsystem
    # changes alongside the cdns / dw / stm32 driver coverage above.
    platform_allow: native_sim
    tags: i3c_emul
    extra_configs:
      - CONFIG_CLOCK_CONTROL=n
      - CONFIG_CLOCK_CONTROL_FIXED_RATE_CLOCK=n
      - CONFIG_I3C_DUAL_ROLE=y
      - CONFIG_I3C_USE_IBI=y
      - CONFIG_I3C_CALLBACK=y
      - CONFIG_I3C_RTIO=y
      - CONFIG_EMUL=y
      - CONFIG_I3C_EMUL=y
      - CONFIG_RTIO=y
