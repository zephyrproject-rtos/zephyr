tests:
  sample.drivers.lora.rylr.send:
    extra_args: SHIELD=reyax_lora
    platform_allow: cy8ckit_062s4
  sample.drivers.lora.build.uart:
    build_only: true
    extra_args: DTC_OVERLAY_FILE="uart_devices.overlay"
    extra_configs:
      - CONFIG_SERIAL=y
      - CONFIG_UART_INTERRUPT_DRIVEN=y
    platform_allow:
      - native_sim
      - native_sim/native/64
  sample.drivers.lora.build.sx1262:
    build_only: true
    extra_args: DTC_OVERLAY_FILE="sx1262.overlay"
    extra_configs:
      - CONFIG_SPI=y
    platform_allow:
      - native_sim
      - native_sim/native/64
  sample.drivers.lora.build.sx1262.native:
    build_only: true
    extra_args: DTC_OVERLAY_FILE="sx1262.overlay"
    extra_configs:
      - CONFIG_SPI=y
      - CONFIG_LORA_MODULE_BACKEND_NATIVE=y
    platform_allow:
      - native_sim
      - native_sim/native/64
  sample.drivers.lora.build.lr1121.native:
    build_only: true
    extra_args: DTC_OVERLAY_FILE="lr1121.overlay"
    extra_configs:
      - CONFIG_SPI=y
      - CONFIG_LORA_MODULE_BACKEND_NATIVE=y
    platform_allow:
      - native_sim
      - native_sim/native/64
  sample.drivers.lora.build.sx1272:
    build_only: true
    extra_args: DTC_OVERLAY_FILE="sx1272.overlay"
    extra_configs:
      - CONFIG_SPI=y
    platform_allow:
      - native_sim
      - native_sim/native/64
  sample.drivers.lora.build.stm32wl.native:
    tags:
      - lora
      - drivers
    build_only: true
    extra_configs:
      - CONFIG_LORA_MODULE_BACKEND_NATIVE=y
    platform_allow:
      - nucleo_wl55jc
