common:
  tags:
    - drivers
    - rtc
    - api
  depends_on: rtc
  timeout: 100

tests:
  drivers.rtc.rtc_api:
    filter: dt_alias_exists("rtc") and not dt_compat_enabled("zephyr,rtc-counter")
            and not dt_compat_enabled("st,stm32-rtc")
    platform_exclude:
      - qemu_x86_64

  drivers.rtc.rtc_api.stm32:
    filter: dt_alias_exists("rtc") and not dt_compat_enabled("zephyr,rtc-counter")
            and dt_compat_enabled("st,stm32-rtc")
    required_snippets:
      - st-rtc-alarm

  drivers.rtc.rtc_api.rtc_counter:
    filter: dt_alias_exists("rtc") and dt_compat_enabled("zephyr,rtc-counter")
    extra_configs:
      - CONFIG_RTC_ALARM=y
      - CONFIG_RTC_INIT_PRIORITY=70
      - CONFIG_TEST_RTC_ALARM_TIME_MASK=255
