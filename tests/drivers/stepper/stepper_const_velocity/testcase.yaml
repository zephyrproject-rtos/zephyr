common:
  tags:
    - drivers
    - stepper
    - api
tests:
  drivers.stepper.stepper_const_velocity.allegro_a4979.counter:
    tags:
      - stepper_step_dir
      - stepper_const_velocity
      - stepper_step_dir_timing_counter
      - stepper_allegro_a4979
    extra_args:
      - platform:nucleo_f767zi/stm32f767xx:DTC_OVERLAY_FILE="boards/nucleo_f767zi/allegro_a4979.overlay"
      - platform:mimxrt1060_evk@B/mimxrt1062/qspi:DTC_OVERLAY_FILE="boards/mimxrt1060_evk_mimxrt1062_qspi_B/allegro_a4979.overlay"
    extra_configs:
      - CONFIG_GPIO=y
      - CONFIG_COUNTER=y
      - CONFIG_STEPPER_STEP_DIR_GENERATE_ISR_SAFE_EVENTS=y
      - CONFIG_USTEPS_PER_SECOND=50
    platform_allow:
      - nucleo_f767zi/stm32f767xx
      - mimxrt1060_evk@B/mimxrt1062/qspi
