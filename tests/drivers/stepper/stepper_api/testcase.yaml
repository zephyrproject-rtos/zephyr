  drivers.stepper.stepper_api.zephyr_gpio_stepper:
    tags:
      - stepper_const_velocity
      - stepper_gpio_stepper
    extra_args:
      - platform:native_sim/native/64:DTC_OVERLAY_FILE="boards/native_sim/zephyr_gpio_stepper.overlay"
      - platform:nucleo_f767zi/stm32f767xx:DTC_OVERLAY_FILE="boards/nucleo_f767zi/zephyr_gpio_stepper.overlay"
      - platform:nucleo_g071rb/stm32g071xx:DTC_OVERLAY_FILE="boards/nucleo_g071rb/zephyr_gpio_stepper.overlay"
      - platform:mimxrt1060_evk@B/mimxrt1062/qspi:DTC_OVERLAY_FILE="boards/mimxrt1060_evk_mimxrt1062_qspi_B/zephyr_gpio_stepper.overlay"
      - platform:qemu_x86_64/atom:DTC_OVERLAY_FILE="boards/qemu_x86_64/zephyr_gpio_stepper.overlay"
    extra_configs:
