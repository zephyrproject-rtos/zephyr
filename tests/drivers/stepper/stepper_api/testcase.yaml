# For some test cases native_sim and qemu have been marked as excluded platforms until the
# corresponding stepper drivers have been fixed.

common:
  tags:
    - drivers
    - stepper
    - api
tests:
  drivers.stepper.stepper_api.allegro_a4979.counter:
    tags:
      - stepper_step_dir
      - stepper_const_velocity
      - stepper_step_dir_timing_counter
      - stepper_allegro_a4979
    extra_args:
      - platform:native_sim/native/64:DTC_OVERLAY_FILE="boards/native_sim/allegro_a4979.overlay"
      - platform:nucleo_f767zi/stm32f767xx:DTC_OVERLAY_FILE="boards/nucleo_f767zi/allegro_a4979.overlay"
      - platform:mimxrt1060_evk@B/mimxrt1062/qspi:DTC_OVERLAY_FILE="boards/mimxrt1060_evk_mimxrt1062_qspi_B/allegro_a4979.overlay"
    extra_configs:
      - CONFIG_GPIO=y
      - CONFIG_COUNTER=y
      - CONFIG_STEPPER_STEP_DIR_GENERATE_ISR_SAFE_EVENTS=y
      - CONFIG_TEST_MS_RESOLUTION=4
      - CONFIG_USTEPS_PER_SECOND=50
    platform_allow:
      - native_sim/native/64
      - nucleo_f767zi/stm32f767xx
      - mimxrt1060_evk@B/mimxrt1062/qspi
  drivers.stepper.stepper_api.adi_tmc2209.counter:
    tags:
      - stepper_step_dir
      - stepper_const_velocity
      - stepper_step_dir_timing_counter
      - stepper_adi_tmc2209
    extra_args:
      - platform:native_sim/native/64:DTC_OVERLAY_FILE="boards/native_sim/adi_tmc2209.overlay"
      - platform:nucleo_f767zi/stm32f767xx:DTC_OVERLAY_FILE="boards/nucleo_f767zi/adi_tmc2209.overlay"
      - platform:mimxrt1060_evk@B/mimxrt1062/qspi:DTC_OVERLAY_FILE="boards/mimxrt1060_evk_mimxrt1062_qspi_B/adi_tmc2209.overlay"
    extra_configs:
      - CONFIG_GPIO=y
      - CONFIG_COUNTER=y
      - CONFIG_STEPPER_STEP_DIR_GENERATE_ISR_SAFE_EVENTS=y
      - CONFIG_TEST_MS_RESOLUTION=16
      - CONFIG_USTEPS_PER_SECOND=50
    platform_allow:
      - nucleo_f767zi/stm32f767xx
      - mimxrt1060_evk@B/mimxrt1062/qspi
    platform_exclude:
      - native_sim/native/64
  drivers.stepper.stepper_api.adi_tmc2209.work:
    tags:
      - stepper_step_dir
      - stepper_const_velocity
      - stepper_step_dir_timing_work
      - stepper_adi_tmc2209
    extra_args:
      - platform:native_sim/native/64:DTC_OVERLAY_FILE="boards/native_sim/adi_tmc2209_workqueue.overlay"
      - platform:nucleo_f767zi/stm32f767xx:DTC_OVERLAY_FILE="boards/nucleo_f767zi/adi_tmc2209_workqueue.overlay"
      - platform:mimxrt1060_evk@B/mimxrt1062/qspi:DTC_OVERLAY_FILE="boards/mimxrt1060_evk_mimxrt1062_qspi_B/adi_tmc2209_workqueue.overlay"
    extra_configs:
      - CONFIG_GPIO=y
      - CONFIG_STEPPER_STEP_DIR_GENERATE_ISR_SAFE_EVENTS=y
      - CONFIG_TEST_MS_RESOLUTION=16
      - CONFIG_USTEPS_PER_SECOND=50
    platform_allow:
      - nucleo_f767zi/stm32f767xx
      - mimxrt1060_evk@B/mimxrt1062/qspi
    platform_exclude:
      - native_sim/native/64
  drivers.stepper.stepper_api.ti_drv8424.counter:
    tags:
      - stepper_step_dir
      - stepper_const_velocity
      - stepper_step_dir_timing_counter
      - stepper_ti_drv8424
    extra_args:
      - platform:native_sim/native/64:DTC_OVERLAY_FILE="boards/native_sim/ti_drv8424.overlay"
      - platform:nucleo_f767zi/stm32f767xx:DTC_OVERLAY_FILE="boards/nucleo_f767zi/ti_drv8424.overlay"
