      - platform:mimxrt1060_evk@B/mimxrt1062/qspi:DTC_OVERLAY_FILE="boards/mimxrt1060_evk_mimxrt1062_qspi_B/ti_drv8424_workqueue.overlay"
    extra_configs:
      - CONFIG_GPIO=y
