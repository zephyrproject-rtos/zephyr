      - CONFIG_COUNTER=y
      - CONFIG_I2C=y
      - CONFIG_STEPPER_STEP_DIR_GENERATE_ISR_SAFE_EVENTS=y
      - CONFIG_TEST_MS_RESOLUTION=4
