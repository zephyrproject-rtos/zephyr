CONFIG_BT_TESTING=y
CONFIG_BT_GATT_CACHING=y

CONFIG_PSA_CRYPTO=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_CMAC=y
CONFIG_PSA_WANT_ALG_ECB_NO_PADDING=y

CONFIG_MBEDTLS_PSA_CRYPTO_C=y

# Make sure that we can hit PSA_ERROR_INSUFFICIENT_MEMORY quickly by using static slots.
# More readable and easy to iterate than heap option.
CONFIG_MBEDTLS_PSA_STATIC_KEY_SLOTS=y
CONFIG_MBEDTLS_PSA_KEY_SLOT_COUNT=2
