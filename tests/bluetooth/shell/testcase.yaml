      - CONFIG_BT_VCP_VOL_REND_VOCS_INSTANCE_COUNT=0
      - CONFIG_BT_AICS_MAX_INSTANCE_COUNT=0
      - CONFIG_BT_VCP_VOL_REND_AICS_INSTANCE_COUNT=0
