    tags: bluetooth

  bluetooth.shell.main.pytest_demo:
    platform_allow:
      - nrf52840dk/nrf52840
    platform_exclude:
      - native_sim
    integration_platforms:
      - nrf52840dk/nrf52840
    harness: pytest
    harness_config:
      pytest_root:
        - "pytest/test_demo.py"
      required_devices:
        # second device required, with the same platform and application
        - {}
