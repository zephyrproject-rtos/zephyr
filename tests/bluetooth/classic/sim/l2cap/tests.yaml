        - tests_scripts/eret.sh
  bluetooth.classic.sim.l2cap.enhanced_retransmission.mode_optional:
    timeout: 120
    extra_configs:
      - CONFIG_TEST_L2CAP_SERVER_TX_DATA_POOL_COUNT=6
      - CONFIG_TEST_L2CAP_CLIENT_TX_DATA_POOL_COUNT=6
    extra_args:
      - EXTRA_CONF_FILE="prj_eret.conf"
    harness_config:
      tests_scripts:
        - tests_scripts/eret_mode_optional.sh

  bluetooth.classic.sim.l2cap.flow_control:
    timeout: 120
    extra_configs:
      - CONFIG_TEST_L2CAP_SERVER_TX_DATA_POOL_COUNT=6
      - CONFIG_TEST_L2CAP_CLIENT_TX_DATA_POOL_COUNT=6
    extra_args:
      - EXTRA_CONF_FILE="prj_fc.conf"
    harness_config:
      tests_scripts:
        - tests_scripts/fc.sh
  bluetooth.classic.sim.l2cap.flow_control.mode_optional:
