common:
  tags:
    - ring_buffer
    - circular_buffer
  timeout: 150

tests:
  libraries.ring_buffer:
    platform_allow:
      - qemu_x86
    integration_platforms:
      - qemu_x86

  libraries.ring_buffer.large:
    platform_allow:
      - qemu_x86
    integration_platforms:
      - qemu_x86
    extra_configs:
      - CONFIG_RING_BUFFER_LARGE=y

  libraries.ring_buffer.concurrent:
    platform_allow: qemu_x86
    integration_platforms:
      - qemu_x86
    extra_configs:
      - CONFIG_SYS_CLOCK_TICKS_PER_SEC=100000

  libraries.ring_buffer.benchmark:
    platform_allow: qemu_x86
    integration_platforms:
      - qemu_x86
    extra_configs:
      - CONFIG_ZTEST_BENCHMARK=y

  libraries.ring_buffer.benchmark.large:
    platform_allow: qemu_x86
    integration_platforms:
      - qemu_x86
    extra_configs:
      - CONFIG_ZTEST_BENCHMARK=y
      - CONFIG_RING_BUFFER_LARGE=y
