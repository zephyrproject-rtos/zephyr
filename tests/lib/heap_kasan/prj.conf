CONFIG_ZTEST=y

CONFIG_SYS_HEAP_KASAN=y
# CONFIG_SYS_HEAP_KASAN_GRANULE_1=y
CONFIG_SYS_HEAP_KASAN_GRANULE_4=y
# Auto-track z_malloc_heap so malloc()/free() are monitored.
CONFIG_SYS_HEAP_KASAN_MALLOC=y
# Auto-track _system_heap so k_malloc()/k_free() are monitored.
CONFIG_SYS_HEAP_KASAN_SYSTEM=y

CONFIG_COMMON_LIBC_MALLOC=y
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=4096

CONFIG_HEAP_MEM_POOL_SIZE=4096

# CONFIG_THREAD_LOCAL_STORAGE=y
