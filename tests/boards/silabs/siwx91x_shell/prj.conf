CONFIG_WIFI=y
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_TCP=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_BUF_RX_COUNT=80
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_CONNECT_TIMEOUT=30000
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256=y
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
CONFIG_PSA_WANT_ALG_SHA_384=y

CONFIG_SIWX91X_FIRMWARE_UPGRADE=y

CONFIG_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_SIWX91X_VERSION_SHELL=y
CONFIG_SIWX91X_FIRMWARE_UPGRADE_SHELL=y
CONFIG_SHELL_STACK_SIZE=3072
