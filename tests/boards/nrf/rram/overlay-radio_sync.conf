#
# Force the BLE LL software-split controller, which selects
# SOC_FLASH_NRF_RADIO_SYNC_TICKER and routes every flash write/erase through
# write_op(). Used to validate the defensive nrf_rramc_config_set() added
# at the start of every radio time slot.

CONFIG_BT=y
CONFIG_BT_LL_SW_SPLIT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF54L15 RRAM"

# A few prj.conf-style tweaks needed to fit BLE on top of the test:
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Use the production-realistic WRITE_BUFFER_SIZE that MCUboot already pins
# for nrf54l15 (boot/zephyr/boards/nrf54l15dk_nrf54l15_cpuapp.conf). The
# Kconfig default of 1 (selected automatically when not RADIO_SYNC_NONE)
# triggers a pre-existing latent bug in soc_flash_nrf_ticker.c: with
# FLASH_SLOT_WRITE = 500 us < FLASH_SYNC_SWITCHING_TIME = 1700 us,
# `interval = duration - FLASH_SYNC_SWITCHING_TIME` underflows uint32_t and
# the next periodic slot is scheduled ~71 minutes out. Any flash_write that
# does not fit in a single 16-byte slot then times out after 24 s
# (FLASH_TIMEOUT_MS).
CONFIG_NRF_RRAM_WRITE_BUFFER_SIZE=32
