#
# Combine the BLE radio-sync overlay with CONFIG_NRF_RRAM_FILL_SKIP_IF_FILLED:
# every flash operation is dispatched through write_op() AND the
# skip-if-filled fast path in nrf_rram_fill_impl() is exercised end-to-end.

CONFIG_BT=y
CONFIG_BT_LL_SW_SPLIT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF54L15 RRAM"

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096

CONFIG_NRF_RRAM_WRITE_BUFFER_SIZE=32

CONFIG_NRF_RRAM_FILL_SKIP_IF_FILLED=y
