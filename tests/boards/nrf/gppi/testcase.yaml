common:
  tags: drivers
  harness: ztest
tests:
  boards.nrf.gppi:
    platform_allow:
      - nrf52840dk/nrf52840
      - nrf5340dk/nrf5340/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54h20dk/nrf54h20/cpurad
      - nrf54l15dk/nrf54l15/cpuapp
    integration_platforms:
      - nrf52840dk/nrf52840
      - nrf5340dk/nrf5340/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54h20dk/nrf54h20/cpurad
      - nrf54l15dk/nrf54l15/cpuapp
  boards.nrf.gppi.flpr:
    sysbuild: true
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuflpr
      - nrf54lm20dk/nrf54lm20a/cpuflpr
      - nrf54lm20dk/nrf54lm20b/cpuflpr
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuflpr
      - nrf54lm20dk/nrf54lm20a/cpuflpr
    extra_configs:
      - CONFIG_IPC_SERVICE=y
      - CONFIG_MBOX=y
      - CONFIG_GPPI_EXT_ALLOCATOR_CLI=y
  boards.nrf.gppi.flpr.54h:
    sysbuild: true
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuflpr
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuflpr
    extra_args:
      - vpr_launcher_SNIPPET=nordic-log-stm
      - vpr_launcher_CONFIG_BOOT_BANNER=n
      - SNIPPET=nordic-log-stm
    extra_configs:
      - CONFIG_IPC_SERVICE=y
      - CONFIG_MBOX=y
      - CONFIG_GPPI_EXT_ALLOCATOR_CLI=y
  boards.nrf.gppi.ppr.54h:
    sysbuild: true
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuppr
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuppr
    extra_configs:
      - CONFIG_IPC_SERVICE=y
      - CONFIG_MBOX=y
      - CONFIG_GPPI_EXT_ALLOCATOR_CLI=y
