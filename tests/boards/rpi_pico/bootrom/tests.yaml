common:
  tags:
    - bootrom
    - userspace
tests:
  boards.rpi_pico.bootrom.basic:
    platform_allow:
      - rpi_pico/rp2040
      - rpi_pico2/rp2350a/m33
      - rpi_pico2/rp2350a/hazard3
  boards.rpi_pico.bootrom.basic.mcuboot:
    platform_allow:
      - rpi_pico/rp2040/mcuboot
      - rpi_pico2/rp2350a/m33/mcuboot
    sysbuild: true
  boards.rpi_pico.bootrom.mpu:
    platform_allow:
      - rpi_pico/rp2040
      - rpi_pico2/rp2350a/m33
    extra_configs:
      - CONFIG_ARM_MPU=y
      - CONFIG_HW_STACK_PROTECTION=y
      # Currently excluded from ARCH_HAS_STACK_PROTECTION. See PR #103413
      - platform:rpi_pico/rp2040:CONFIG_MPU_STACK_GUARD=y
  boards.rpi_pico.bootrom.mpu.mcuboot:
    platform_allow:
      - rpi_pico/rp2040/mcuboot
      - rpi_pico2/rp2350a/m33/mcuboot
    sysbuild: true
    extra_configs:
      - CONFIG_ARM_MPU=y
      - CONFIG_HW_STACK_PROTECTION=y
      - platform:rpi_pico/rp2040/mcuboot:CONFIG_MPU_STACK_GUARD=y
  boards.rpi_pico.bootrom.userspace:
    platform_allow:
      - rpi_pico/rp2040
      - rpi_pico2/rp2350a/m33
    extra_configs:
      - CONFIG_ARM_MPU=y
      - CONFIG_HW_STACK_PROTECTION=y
      - CONFIG_USERSPACE=y
      - CONFIG_TEST_USERSPACE=y
      - platform:rpi_pico/rp2040:CONFIG_MPU_STACK_GUARD=y
  boards.rpi_pico.bootrom.userspace.mcuboot:
    sysbuild: true
    platform_allow:
      - rpi_pico/rp2040/mcuboot
      - rpi_pico2/rp2350a/m33/mcuboot
    extra_configs:
      - CONFIG_ARM_MPU=y
      - CONFIG_HW_STACK_PROTECTION=y
      - CONFIG_USERSPACE=y
      - CONFIG_TEST_USERSPACE=y
      - platform:rpi_pico/rp2040/mcuboot:CONFIG_MPU_STACK_GUARD=y
