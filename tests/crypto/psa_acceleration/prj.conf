CONFIG_ZTEST_STACK_SIZE=2048
CONFIG_ZTEST=y

# That's needed because when we call "psa_crypto_init()" in TF-PSA-Crypto
# on initialization the stack being used is the "main" one.
CONFIG_MAIN_STACK_SIZE=2048

CONFIG_PSA_CRYPTO=y
CONFIG_PSA_CRYPTO_ENABLE_ALL=y
CONFIG_PSA_CRYPTO_PROVIDER_MBEDTLS=y
CONFIG_TF_PSA_CRYPTO_EXTERNAL_ACCELERATOR_INTEGRATION=y

CONFIG_MBEDTLS_PSA_KEY_SLOT_COUNT=32
