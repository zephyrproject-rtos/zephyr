CONFIG_ZTEST_STACK_SIZE=2048
CONFIG_ZTEST=y

CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_MBEDTLS_PSA_STATIC_KEY_SLOTS=y

CONFIG_PSA_WANT_ALG_SHA_1=y
CONFIG_PSA_WANT_ALG_SHA_224=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_SHA_384=y
CONFIG_PSA_WANT_ALG_SHA_512=y

CONFIG_PSA_WANT_ALG_HMAC=y
CONFIG_PSA_WANT_KEY_TYPE_HMAC=y

CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_ECB_NO_PADDING=y

# Enable MLDSA to ensure "mldsa-native" module is taken into account in the
# build. This is not tested in the code because it's an internal driver for
# now and it's not exposed through PSA API yet. Once a proper interface will
# be available a test will be added.
CONFIG_PSA_WANT_ALG_SHAKE256=y
CONFIG_TF_PSA_CRYPTO_PQCP_MLDSA_ENABLED=y
CONFIG_TF_PSA_CRYPTO_PQCP_MLDSA_87_ENABLED=y
