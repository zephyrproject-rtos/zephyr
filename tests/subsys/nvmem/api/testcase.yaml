common:
  tags:
    - nvmem
tests:
  nvmem.api.bbram:
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    extra_configs:
      - CONFIG_BBRAM=y
    extra_dtc_overlay_files:
      - bbram.overlay
  nvmem.api.eeprom:
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    extra_configs:
      - CONFIG_EEPROM=y
    extra_dtc_overlay_files:
      - eeprom.overlay
  nvmem.api.flash:
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    extra_configs:
      - CONFIG_FLASH=y
      - CONFIG_NVMEM_FLASH_WRITE=y
    extra_dtc_overlay_files:
      - flash.overlay
  nvmem.api.otp:
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    extra_configs:
      - CONFIG_OTP=y
      - CONFIG_OTP_PROGRAM=y
      - CONFIG_NVMEM_OTP_WRITE=y
    extra_dtc_overlay_files:
      - otp.overlay
  nvmem.api.mmio:
    # MMIO needs a real, dereferenceable physical address, so it runs on a
    # target with memory backed at a fixed address rather than native_sim.
    platform_allow:
      - qemu_cortex_m3
    integration_platforms:
      - qemu_cortex_m3
    extra_configs:
      - CONFIG_NVMEM_MMIO=y
    extra_dtc_overlay_files:
      - mmio.overlay
