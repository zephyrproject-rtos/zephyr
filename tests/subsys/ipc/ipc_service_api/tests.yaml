common:
  sysbuild: true
  tags:
    - ipc
  harness: ztest
  timeout: 60

tests:
  tests.ipc.ipc_service_api.icmsg:
    platform_allow:
      - nrf5340bsim/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf5340bsim/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - FILE_SUFFIX=icmsg
      - remote_FILE_SUFFIX=icmsg
      - remote_CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
    extra_configs:
      - CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
      - CONFIG_IPC_SERVICE_BACKEND_ICMSG_WQ_PRIORITY=-3
      - CONFIG_SYSTEM_WORKQUEUE_PRIORITY=-3
      - CONFIG_ZTEST_THREAD_PRIORITY=10
  tests.ipc.ipc_service_api.icbmsg:
    platform_allow:
      - nrf5340bsim/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf5340bsim/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - FILE_SUFFIX=icbmsg
      - remote_FILE_SUFFIX=icbmsg
  tests.ipc.ipc_service_api.static_vrings:
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
      - nrf5340bsim/nrf5340/cpuapp
    integration_platforms:
      - nrf5340dk/nrf5340/cpuapp
      - nrf5340bsim/nrf5340/cpuapp
    extra_args:
      - FILE_SUFFIX=static_vrings
      - remote_FILE_SUFFIX=static_vrings
  tests.ipc.ipc_service_api.icmsg.cpuppr:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - FILE_SUFFIX=icmsg_cpuppr
      - remote_FILE_SUFFIX=icmsg
      - remote_CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
      - SB_CONFIG_REMOTE_NRF54H20_CPUPPR_CORE=y
      - ipc_service_api_SNIPPET=nordic-ppr
    extra_configs:
      - CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
      - CONFIG_IPC_SERVICE_BACKEND_ICMSG_WQ_PRIORITY=-3
      - CONFIG_SYSTEM_WORKQUEUE_PRIORITY=-3
      - CONFIG_ZTEST_THREAD_PRIORITY=10
  tests.ipc.ipc_service_api.icbmsg.cpuppr:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - FILE_SUFFIX=icbmsg_cpuppr
      - remote_FILE_SUFFIX=icbmsg
      - SB_CONFIG_REMOTE_NRF54H20_CPUPPR_CORE=y
      - ipc_service_api_SNIPPET=nordic-ppr
  tests.ipc.ipc_service_api.icmsg.cpuflpr:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - FILE_SUFFIX=icmsg_cpuflpr
      - remote_FILE_SUFFIX=icmsg
      - remote_CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
      - remote_CONFIG_LOG=n
      - SB_CONFIG_REMOTE_NRF54H20_CPUFLPR_CORE=y
      - ipc_service_api_SNIPPET=nordic-flpr
    extra_configs:
      - CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
      - CONFIG_IPC_SERVICE_BACKEND_ICMSG_WQ_PRIORITY=-3
      - CONFIG_SYSTEM_WORKQUEUE_PRIORITY=-3
      - CONFIG_ZTEST_THREAD_PRIORITY=10
  tests.ipc.ipc_service_api.icbmsg.cpuflpr:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - FILE_SUFFIX=icbmsg_cpuflpr
      - remote_FILE_SUFFIX=icbmsg
      - SB_CONFIG_REMOTE_NRF54H20_CPUFLPR_CORE=y
    required_snippets:
      - nordic-log-stm
      - nordic-flpr
  tests.ipc.ipc_service_api.icmsg.no_multithreading:
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
      - nrf5340bsim/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
    integration_platforms:
      - nrf5340dk/nrf5340/cpuapp
      - nrf5340bsim/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
    extra_args:
      - FILE_SUFFIX=icmsg
      - remote_FILE_SUFFIX=icmsg
      - remote_CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
      - remote_CONFIG_MULTITHREADING=n
    extra_configs:
      - CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
      - CONFIG_MULTITHREADING=n
  tests.ipc.ipc_service_api.icbmsg.no_multithreading:
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
      - nrf5340bsim/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
    integration_platforms:
      - nrf5340dk/nrf5340/cpuapp
      - nrf5340bsim/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
    extra_args:
      - FILE_SUFFIX=icbmsg
      - remote_FILE_SUFFIX=icbmsg
      - remote_CONFIG_MULTITHREADING=n
    extra_configs:
      - CONFIG_MULTITHREADING=n
