CONFIG_LOG=y
CONFIG_ZTEST=y
CONFIG_SENSOR=y

CONFIG_CPU_FREQ=y
CONFIG_CPU_FREQ_LOG_LEVEL_DBG=y
CONFIG_CPU_FREQ_PSTATE_SET_STUB=y
CONFIG_CPU_FREQ_POLICY_ON_DEMAND=y
CONFIG_CPU_FREQ_THERMAL_CAP=y
CONFIG_CPU_FREQ_THERMAL_CAP_SENSOR_FAILURE_LIMIT=3

# Long interval so test can run without automatic frequency changes.
CONFIG_CPU_FREQ_INTERVAL_MS=1000000
