# Keep LPTMR as wake/idle timer via counter API
CONFIG_COUNTER=y
CONFIG_COUNTER_MCUX_LPTMR=y
CONFIG_COUNTER_MCUX_LPTMR_ALARM=y
CONFIG_PM_PREWAKEUP_CONV_MODE_CEIL=y
CONFIG_CORTEX_M_SYSTICK_STOP_IN_LPM=y
# Disable LPUART ISR support to prevent it
# from interfering with PM tests
CONFIG_UART_MCUX_LPUART_ISR_SUPPORT=n
CONFIG_UART_CONSOLE_INPUT_EXPIRED=n
