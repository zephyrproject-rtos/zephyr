tests:
  pm.power_residency_time:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    harness: power
    harness_config:
      pytest_dut_scope: session
      measurements:
        - name: "power residency time"
          measurement_time: 8
          num_of_transitions: 6
          rms: [56.0, 4.0, 4.0, 1.3, 1.3, 0.26, 91]

  pm.power_residency_time.pm_device:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    extra_args:
      - CONFIG_PM_DEVICE=y
    harness: power
    harness_config:
      pytest_dut_scope: session
      measurements:
        - name: "power residency time"
          measurement_time: 8
          num_of_transitions: 6
          rms: [56.0, 4.0, 4.0, 1.3, 1.3, 0.26, 91]

  pm.power_residency_time.pm_device_runtime:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    extra_args:
      - CONFIG_PM_DEVICE=y
      - CONFIG_PM_DEVICE_RUNTIME=y
    harness: power
    harness_config:
      pytest_dut_scope: session
      measurements:
        - name: "power residency time"
          measurement_time: 8
          num_of_transitions: 6
          rms: [56.0, 4.0, 4.0, 1.3, 1.3, 0.26, 91]

  pm.power_residency_time.pm_device_system_managed:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    extra_args:
      - CONFIG_PM_DEVICE=y
      - CONFIG_PM_DEVICE_SYSTEM_MANAGED=y
    harness: power
    harness_config:
      pytest_dut_scope: session
      measurements:
        - name: "power residency time"
          measurement_time: 8
          num_of_transitions: 6
          rms: [56.0, 4.0, 4.0, 1.3, 1.3, 0.26, 91]
