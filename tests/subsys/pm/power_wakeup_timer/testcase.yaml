tests:
  pm.power_wakeup_timer:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    harness: power
    harness_config:
      measurements:
        - name: "wakeup_timer"
          measurement_time: 2
          num_of_transitions: 1
          rms: [0.26, 140]

  pm.power_wakeup_timer.pm_device:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    extra_args:
      - CONFIG_PM_DEVICE=y
    harness: power
    harness_config:
      measurements:
        - name: "wakeup_timer"
          measurement_time: 2
          num_of_transitions: 1
          rms: [0.26, 140]
