tests:
  pm.power_wakeup_timer:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    harness: power
    harness_config:
      pytest_dut_scope: session
      pytest_args: [--probe=stm_powershield,
                    --probe-port=<path_to>/STMicroelectronics_PowerShield__Virtual_ComPort]

  pm.power_wakeup_timer.pm_device:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    extra_args:
      - CONFIG_PM_DEVICE=y
    harness: power
    harness_config:
      pytest_dut_scope: session
      pytest_args: [--probe=stm_powershield,
                    --probe-port=<path_to>/STMicroelectronics_PowerShield__Virtual_ComPort]
