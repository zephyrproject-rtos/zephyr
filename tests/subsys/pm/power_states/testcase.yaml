tests:
  pm.power_states:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    harness: power
    harness_config:
      pytest_dut_scope: session
      pytest_args: [--probe-port=/dev/serial/by-id/usb-STMicroelectronics_PowerShield__Virtual_ComPort_in_FS_Mode__FFFFFFFEFFFF-if00,
                    --probe=stm_powershield]
  pm.power_states.pm_device:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    extra_args:
      - CONFIG_PM_DEVICE=y
    harness: power
    harness_config:
      pytest_dut_scope: session
      pytest_args: [--probe-port=/dev/serial/by-id/usb-STMicroelectronics_PowerShield__Virtual_ComPort_in_FS_Mode__FFFFFFFEFFFF-if00,
                    --probe=stm_powershield]
  pm.power_states.pm_device_runtime:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    extra_args:
      - CONFIG_PM_DEVICE=y
      - CONFIG_PM_DEVICE_RUNTIME=y
    harness: power
    harness_config:
      pytest_dut_scope: session
      pytest_args: [--probe-port=<path_to>/STMicroelectronics_PowerShield__Virtual_ComPort,
                    --probe=stm_powershield]

  pm.power_states.pm_device_system_managed:
    platform_allow:
      - stm32l562e_dk
    tags:
      - pm
    extra_args:
      - CONFIG_PM_DEVICE=y
      - CONFIG_PM_DEVICE_SYSTEM_MANAGED=y
    harness: power
    harness_config:
      pytest_dut_scope: session
      pytest_args: [--probe-port=<path_to>/STMicroelectronics_PowerShield__Virtual_ComPort,
                    --probe=stm_powershield]
                    