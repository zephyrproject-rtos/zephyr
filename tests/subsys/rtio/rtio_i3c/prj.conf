# Features being tested
CONFIG_LOG=y
CONFIG_RTIO=y
CONFIG_I3C=y
CONFIG_I3C_DUAL_ROLE=y
CONFIG_I3C_RTIO=y
CONFIG_I3C_EMUL=y
CONFIG_EMUL=y

# I2C support pulled in by the I3C subsys for legacy-I2C-on-I3C routing.
CONFIG_I2C=y
CONFIG_I2C_RTIO=y

# Testing
CONFIG_ZTEST=y

# The number of pending requests allowed (size for the work-queue overflow test).
CONFIG_RTIO_WORKQ_POOL_ITEMS=2

# Used for debugging
CONFIG_I3C_LOG_LEVEL_DBG=y

# Language features for capturing lambdas
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
