CONFIG_BMC=y

CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_SHELL=y

CONFIG_NETWORKING=y
CONFIG_NET_TEST=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_LOOPBACK=y
CONFIG_NET_LOOPBACK_MTU=1280
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONFIG_MY_IPV4_ADDR="127.0.0.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.0.0.0"

CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_POSIX_API=y
CONFIG_EVENTFD=y

CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_ZVFS_EVENTFD_MAX=10
CONFIG_ZVFS_POLL_MAX=8
CONFIG_NET_MAX_CONTEXTS=12
CONFIG_NET_MAX_CONN=16
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_TCP_TIME_WAIT_DELAY=0
CONFIG_NET_TCP_RETRY_COUNT=3
CONFIG_NET_TCP_INIT_RETRANSMISSION_TIMEOUT=120

CONFIG_BMC_APP_HTTPS=n
CONFIG_BMC_APP_WEB=y
CONFIG_BMC_APP_WEB_TERMINAL=n
CONFIG_BMC_APP_CONSOLE_LOGGER=n
CONFIG_CONSOLE_BRIDGE=n
CONFIG_BMC_PERSISTENT_STORAGE=n
CONFIG_BMC_APP_NTP=n
CONFIG_RTC=n
CONFIG_JTAG=n

CONFIG_BMC_DEFAULT_USE_DHCP4=n
CONFIG_BMC_DEFAULT_USE_NTP=n
CONFIG_BMC_DEFAULT_IPV4_ADDRESS="127.0.0.1"
CONFIG_BMC_DEFAULT_IPV4_SUBNET_MASK="255.0.0.0"
CONFIG_BMC_DEFAULT_IPV4_GATEWAY="0.0.0.0"
CONFIG_DEFAULT_ADMIN_PASSWORD="admin"
