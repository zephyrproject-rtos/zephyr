common:
  tags:
    - coredump
  ignore_faults: true
  ignore_qemu_crash: true
  integration_platforms:
    - qemu_cortex_m3
    - qemu_riscv32
    - qemu_riscv64
    - qemu_riscv32e
tests:
  debug.coredump.threads:
    platform_exclude:
      # In S-mode ARCH_EXCEPT calls z_riscv_fatal_error() with esf=NULL;
      # arch_coredump_info_dump() returns immediately when esf is NULL so
      # the coredump output is never produced.
      - qemu_riscv64/qemu_virt_riscv64/smode
    filter: CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_THREADS and CONFIG_MP_MAX_NUM_CPUS == 1
    harness: console
    harness_config:
      type: multi_line
      # Verify core dump contains threads metadata section and several
      # memory sections, two for each thread
      regex:
        - "E: #CD:BEGIN#"
        - "E: #CD:5([aA])45([0-9a-fA-F]+)"
        - "E: #CD:41([0-9a-fA-F]+)"
        - "E: #CD:54([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:4([dD])([0-9a-fA-F]+)"
        - "E: #CD:END#"
