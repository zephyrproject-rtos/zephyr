common:
  tags: llext
  platform_exclude:
    # platforms with active issues
    - numaker_pfm_m487        # See #63167
    - s32z2xxdc2/s32z270/rtu0 # See commit 18a0660
    - s32z2xxdc2/s32z270/rtu1 # See commit 18a0660
    # platforms that are always skipped by the runtime filter
    - qemu_cortex_m0
    - qemu_xtensa/dc233c/mmu
  integration_platforms:
    - qemu_cortex_a9          # ARM Cortex-A9 (ARMv7-A ISA)
    - qemu_cortex_r5          # ARM Cortex-R5 (ARMv7-R ISA)
    - mps2/an383              # ARM Cortex-M0+ (ARMv6-M ISA)
    - mps2/an385              # ARM Cortex-M3 (ARMv7-M ISA)
    - mps2/an521/cpu0         # ARM Cortex-M33 (ARMv8-M ISA)
  extra_configs:
    - arch:arm64:CONFIG_LLEXT_HEAP_SIZE=128
    - arch:arm64:CONFIG_LLEXT_EXT_HEAP_SIZE=64
  extra_conf_files:
    - prj.conf
  min_ram: 172                # Size on arm: max: 145, min: 79
  min_flash: 172              # Size on arm: max: 140, min: 105

tests:
  # While there is in practice no value in compiling subsys/llext/*.c
  # without actually running it to load some extension, let's keep it in
  # good shape and ready to be used by additional architectures in the
  # future.
  llext.loader_build:
    build_only: true

  # Run the suite with all combinations of core Kconfig options for the LLEXT
  # subsystem (storage type, ELF type, MPU/MMU etc). To focus on LLEXT issues,
  # most tests include no_mem_protection.conf, which disables memory protection
  # hardware completely.
  llext.readonly:
    arch_allow:               # Xtensa needs writable storage
      - arm
      - riscv
      - arc
      - x86
      - openrisc
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_VENEERS=y
      - CONFIG_LLEXT_STORAGE_WRITABLE=n
      - CONFIG_LLEXT_RODATA_NO_RELOC=y
  llext.readonly.memblk:
    arch_allow:               # Xtensa needs writable storage
      - arm
      - riscv
      - arc
      - x86
      - openrisc
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_STORAGE_WRITABLE=n
      - CONFIG_LLEXT_RODATA_NO_RELOC=y
      - CONFIG_LLEXT_HEAP_MEMBLK=y
  llext.readonly_mpu:
    arch_allow:
      - arm # Xtensa needs writable storage, currently not supported on RISC-V
      - arc
    filter: CONFIG_ARCH_HAS_USERSPACE
    extra_configs:
      - CONFIG_USERSPACE=y
      - CONFIG_LLEXT_VENEERS=y
      - CONFIG_LLEXT_STORAGE_WRITABLE=n
  llext.readonly_mpu.memblk:
    arch_allow:
      - arm # Xtensa needs writable storage, currently not supported on RISC-V
      - arc
    filter: CONFIG_ARCH_HAS_USERSPACE and not CONFIG_MPU_REQUIRES_POWER_OF_TWO_ALIGNMENT
    extra_configs:
      - CONFIG_USERSPACE=y
      - CONFIG_LLEXT_STORAGE_WRITABLE=n
      - CONFIG_LLEXT_HEAP_MEMBLK=y
      - CONFIG_LLEXT_EXT_HEAP_SIZE=64
      - CONFIG_LLEXT_HEAP_MEMBLK_BLOCK_SIZE=8192
  llext.readonly_mpu.memblk.power_of_two_alignment:
    arch_allow:
      - arm # Xtensa needs writable storage, currently not supported on RISC-V
      - arc
    filter: CONFIG_ARCH_HAS_USERSPACE and CONFIG_MPU_REQUIRES_POWER_OF_TWO_ALIGNMENT
    extra_configs:
      - CONFIG_USERSPACE=y
      - CONFIG_LLEXT_STORAGE_WRITABLE=n
      - CONFIG_LLEXT_HEAP_MEMBLK=y
      - CONFIG_LLEXT_EXT_HEAP_SIZE=64
      - CONFIG_LLEXT_HEAP_MEMBLK_BLOCK_SIZE=8192
  llext.readonly_mmu:
    arch_allow:
      - arm64
      - arm
      - riscv
      - x86
    platform_exclude:
      - qemu_x86_tiny/atom       # See #105603
    filter: CONFIG_MMU or CONFIG_RISCV_PMP
    integration_platforms:
      - qemu_cortex_a53         # ARM Cortex-A53 (ARMv8-A ISA)
    extra_configs:
      - CONFIG_LLEXT_HEAP_SIZE=128 # qemu_cortex_a9 requires larger heap
      - CONFIG_LLEXT_STORAGE_WRITABLE=n
      - CONFIG_LLEXT_RODATA_NO_RELOC=y
      # On RISC-V (no MMU, no userspace) llext copies code into RAM and runs it
      # in machine mode, so the loaded text region must stay executable. DEP
      # installs a locked catch-all PMP entry that makes all RAM non-executable
      # with no way to mark the region executable. Setting an unknown symbol to
      # 'n' is a no-op, so this is safe on the MMU arches.
      - CONFIG_PMP_DATA_EXECUTION_PREVENTION=n
  llext.readonly_mmu.memblk:
    arch_allow:
      - arm64
      - arm
      - riscv
      - x86
    filter: CONFIG_MMU or CONFIG_RISCV_PMP
    integration_platforms:
      - qemu_cortex_a53         # ARM Cortex-A53 (ARMv8-A ISA)
    extra_configs:
      - CONFIG_LLEXT_STORAGE_WRITABLE=n
      - CONFIG_LLEXT_RODATA_NO_RELOC=y
      - CONFIG_LLEXT_HEAP_MEMBLK=y
      - CONFIG_LLEXT_EXT_HEAP_SIZE=64
      - CONFIG_LLEXT_HEAP_MEMBLK_BLOCK_SIZE=4096
      # See note above: RISC-V executes loaded code from RAM in machine mode,
      # which is incompatible with DEP's locked catch-all PMP entry.
      - CONFIG_PMP_DATA_EXECUTION_PREVENTION=n
  llext.writable:
    arch_allow:
      - arm
      - xtensa
      - riscv
      - arc
      - x86
      - openrisc
    integration_platforms:
      - qemu_xtensa/dc233c      # Xtensa ISA
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_STORAGE_WRITABLE=y
  llext.writable.memblk:
    arch_allow:
      - arm
      - xtensa
      - riscv
      - arc
      - x86
      - openrisc
    integration_platforms:
      - qemu_xtensa/dc233c      # Xtensa ISA
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_STORAGE_WRITABLE=y
      - CONFIG_LLEXT_HEAP_MEMBLK=y
  llext.writable_relocatable:
    arch_allow:
      - arm
      - xtensa
      - riscv
      - arc
      - x86
      - openrisc
    integration_platforms:
      - qemu_xtensa/dc233c      # Xtensa ISA
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_STORAGE_WRITABLE=y
      - CONFIG_LLEXT_TYPE_ELF_RELOCATABLE=y

  # Test the Symbol Link Identifier (SLID) linking feature on writable
  # storage to cover both ARM and Xtensa architectures on the same test.
  llext.writable_slid_linking:
    arch_allow:
      - arm
      - xtensa
      - riscv
      - arc
      - x86
      - openrisc
    integration_platforms:
      - qemu_xtensa/dc233c      # Xtensa ISA
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_STORAGE_WRITABLE=y
      - CONFIG_LLEXT_EXPORT_BUILTINS_BY_SLID=y
  llext.writable_relocatable_slid_linking:
    arch_allow:
      - arm
      - xtensa
      - riscv
      - arc
      - x86
      - openrisc
    integration_platforms:
      - qemu_xtensa/dc233c      # Xtensa ISA
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_STORAGE_WRITABLE=y
      - CONFIG_LLEXT_TYPE_ELF_RELOCATABLE=y
      - CONFIG_LLEXT_EXPORT_BUILTINS_BY_SLID=y

  # Test the export device IDs by hash feature on a single architecture in
  # both normal and SLID mode.
  llext.devices_by_hash:
    arch_allow: arm
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_STORAGE_WRITABLE=n
      - CONFIG_LLEXT_EXPORT_DEV_IDS_BY_HASH=y
  llext.devices_by_hash_slid_linking:
    arch_allow: arm
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_STORAGE_WRITABLE=n
      - CONFIG_LLEXT_EXPORT_DEV_IDS_BY_HASH=y
      - CONFIG_LLEXT_EXPORT_BUILTINS_BY_SLID=y

  # Test dynamic heap allocation
  llext.dynamic_heap:
    arch_allow:
      - arm
      - arc
    filter: not CONFIG_MPU and not CONFIG_MMU
    extra_conf_files: ['no_mem_protection.conf']
    extra_configs:
      - CONFIG_LLEXT_HEAP_DYNAMIC=y

  # Exercise AArch64 local-exec TLS relocations: an extension referencing the
  # thread-local errno (tls_ext.c). Toolchain picolibc with thread-local storage
  # gives a __thread errno, so the extension emits R_AARCH64_TLSLE_ADD_TPREL_*
  # relocations.
  llext.tls:
    # arm64-only, but expressed as a filter instead of arch_allow so the
    # arm integration platforms inherited from common are filtered at
    # build time instead of erroring the integration test plan
    filter: CONFIG_ARM64
    integration_platforms:
      - qemu_cortex_a53         # ARM Cortex-A53 (ARMv8-A ISA)
    extra_configs:
      - CONFIG_PICOLIBC=y
      - CONFIG_THREAD_LOCAL_STORAGE=y
