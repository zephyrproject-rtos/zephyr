tests:
  message_bus.zbus.multidomain.ipc_backend:
    tags: zbus
    integration_platforms:
      - native_sim
    harness: console
    harness_config:
      type: multi_line
      ordered: false
      regex:
        - ".* zbus_multidomain_ipc: ACK callback not set, dropping ACK"
        - ".* zbus_multidomain_ipc: Received empty data on IPC endpoint"
        - ".* zbus_multidomain_ipc: Failed to process received ACK: -1"
        - ".* zbus_multidomain_ipc: Unknown message type: 99"
        - ".* zbus_multidomain_ipc: No receive callback set for IPC endpoint ipc_ept_test_agent"
        - ".* zbus_multidomain_ipc: Invalid message size: expected 309, got 304"
        - ".* zbus_multidomain_ipc: Failed to process received message on IPC endpoint ipc_ept_test_agent: -1"
        - ".* zbus_multidomain_ipc: Failed to send ACK message: -1"
        - ".* zbus_multidomain_ipc: Failed to send ACK for message 3: -1"
        - ".* zbus_multidomain_ipc: Invalid parameters to set ACK callback"
        - ".* zbus_multidomain_ipc: Invalid parameters to set receive callback"
        - ".* zbus_multidomain_ipc: IPC device or endpoint configuration is NULL"
        - ".* zbus_multidomain_ipc: Invalid IPC backend configuration"
        - ".* zbus_multidomain_ipc: Failed to open IPC instance fake_ipc_device: -1"
        - ".* zbus_multidomain_ipc: Failed to register IPC endpoint ipc_ept_test_agent: -1"
        - ".* zbus_multidomain_ipc: IPC device is NULL"
        - ".* zbus_multidomain_ipc: IPC error: Test error on endpoint ipc_ept_test_agent"
        - ".* zbus_multidomain_ipc: Invalid message to send on IPC endpoint ipc_ept_test_agent"
        - ".* zbus_multidomain_ipc: Invalid IPC backend configuration for send"
        - ".* zbus_multidomain_ipc: Failed to send message on IPC endpoint ipc_ept_test_agent: -1"
