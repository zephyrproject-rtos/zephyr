CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_LOG=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_ZTEST=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_MAIN_STACK_SIZE=4096

# Select the VirtIO block disk and disable other disk drivers
# so DISK_NAME resolves to the virtio disk.
CONFIG_DISK_DRIVER_FLASH=n
CONFIG_DISK_DRIVER_VIRTIO_BLK=y

# The raw disk image is blank; format it on the first mount.
CONFIG_FS_FATFS_MOUNT_MKFS=y
