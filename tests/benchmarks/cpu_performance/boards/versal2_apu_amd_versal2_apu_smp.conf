# SMP builds require CONFIG_SCHED_CPU_MASK for CPU pinning.
# PMU registers are per-CPU; without pinning, thread migration
# between CPUs would produce invalid measurements.
CONFIG_SCHED_SIMPLE=y
CONFIG_SCHED_CPU_MASK=y
