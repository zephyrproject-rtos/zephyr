common:
  harness: console
  harness_config:
    type: one_line
    regex:
      - "Benchmark completed"
  timeout: 10
  tags: crypto
  arch_exclude:
    - posix
tests:
  benchmark.crypto.mbedtls:
    filter: CONFIG_TEST_RANDOM_GENERATOR
    integration_platforms:
      - qemu_x86
    platform_exclude:
      - imx95_var_dart/mimx9596/m7
      - imx95_var_dart/mimx9596/a55
