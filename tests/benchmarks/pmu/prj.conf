CONFIG_ZTEST=y
CONFIG_ZTEST_BENCHMARK=y

# Stack sizes (cache/branch loops + FP stats)
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_ZTEST_STACK_SIZE=4096

# irq_offload() for interrupt path benchmark
CONFIG_IRQ_OFFLOAD=y

# Random access cache test (timer-based generator if no hardware entropy)
CONFIG_TEST_RANDOM_GENERATOR=y

# Hit-rate / IPC diagnostics
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Minimize timer interrupt noise during measurement
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1
CONFIG_TIMESLICING=n

# Logging and output
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
