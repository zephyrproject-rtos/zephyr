tests:
  benchmarks.pmu_benchmarks:
    extra_args:
      - EXTRA_CONF_FILE="prj_arm64.conf"
    tags:
      - benchmark
      - kernel
      - pmu
      - arm64
    arch_allow:
      - arm64
    # QEMU does not emulate PMU counters; all benchmark tests are skipped there.
    # The QEMU platforms are listed to allow compile-time validation only.
    # Meaningful results require real hardware with PMU access enabled by the
    # bootloader/TF-A.
    platform_allow:
      - versal_apu
      - versalnet_apu
      - versalnet_apu/amd_versalnet_apu/smp
      - versal2_apu
      - versal2_apu/amd_versal2_apu/smp
    integration_platforms:
      - versalnet_apu
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "(PMU benchmark skipped: no PMU or init failed|\
           PMU counters verified: non-zero cycle and event counts)"
        - "PROJECT EXECUTION SUCCESSFUL"
