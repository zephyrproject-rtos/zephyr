CONFIG_ZTEST=y

# Stack sizes
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_ZTEST_STACK_SIZE=4096

# irq_offload() for interrupt latency test
CONFIG_IRQ_OFFLOAD=y

# Minimize timer interrupt noise during measurement
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1
CONFIG_TIMESLICING=n

# Logging and output
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
