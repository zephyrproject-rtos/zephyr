# Helper: masked register write
# Usage: mask_write <addr> <mask> <value>
proc mask_write {addr mask value} {
	set curval [mrd -force -value $addr]
	set maskedval [expr {($curval & ~$mask) | ($value & $mask)}]
	mwr -force $addr $maskedval
}

# RPU cluster configuration register
# Bit 0: 0 = lockstep, 1 = split mode
set RPU_CLUSTER_CFG 0xEB580000

# CRL write-protect register
set CRL_WPROT 0xEB5E001C

# RPU reset control
# Bits: [17] CORE1A_POR, [16] CORE0A_POR, [8] A_TOPRESET,
#       [1] CORE1A_RESET, [0] CORE0A_RESET
set RPU_RST_CTRL 0xEB5E0310

# RPU core0 configuration
set RPU_CORE0_CFG 0xEB588000
set RPU_CORE0_BASE_LO 0xEB588008

# RPU core1 configuration
set RPU_CORE1_CFG 0xEB590000
set RPU_CORE1_BASE_LO 0xEB590008

# Timestamp generator registers
set TIMESTAMP_REF_CTRL 0xEB5B0020
set TIMESTAMP_CNT_CTRL 0xEB5B0000

# ------------------------------------------------------------------
# Reset and bring up core0 only (single-core mode)
# ------------------------------------------------------------------
proc rpu_core0_rst { {mem "default"} } {
	global RPU_CLUSTER_CFG CRL_WPROT RPU_RST_CTRL
	global RPU_CORE0_CFG RPU_CORE0_BASE_LO
	global TIMESTAMP_REF_CTRL TIMESTAMP_CNT_CTRL

	targets -set -nocase -filter {name =~ "Versal Gen 2*"}

	# Disable CRL write protection
	mwr -force $CRL_WPROT 0

	# Set RPU to split mode (bit 0 = 1)
	mwr -force $RPU_CLUSTER_CFG 1

	# Set boot address
	if {$mem eq "ddr"} {
		set addr 0x100000
	} elseif {$mem eq "tcm"} {
		set addr 0
	} elseif {$mem eq "default"} {
		set addr 0xBBF20000
	}

	# Write a branch-to-self at OCM base for safe boot
	mwr -force 0xBBF20000 0xEAFFFFFE

	# Program boot address
	mwr -force $RPU_CORE0_BASE_LO $addr

	# Set TCMBOOT bit
	mask_write $RPU_CORE0_CFG 0x10 0x10

	# Take core0 out of reset:
	mask_write $RPU_RST_CTRL 0x10101 0x1
	mask_write $RPU_RST_CTRL 0x1 0

	# Configure timestamp generator for global timer
	mwr -force $TIMESTAMP_REF_CTRL 100000000
	mwr -force $TIMESTAMP_CNT_CTRL 0x1

	targets -set -nocase -filter {name =~ "*Cortex-R52 #0.0*"}
	after 300
	stop
	after 1000
	ta
}

# ------------------------------------------------------------------
# Reset and bring up BOTH cores (dual-core split mode)
# ------------------------------------------------------------------
proc rpu_dual_core_rst { {mem "default"} } {
	global RPU_CLUSTER_CFG CRL_WPROT RPU_RST_CTRL
	global RPU_CORE0_CFG RPU_CORE0_BASE_LO
	global RPU_CORE1_CFG RPU_CORE1_BASE_LO
	global TIMESTAMP_REF_CTRL TIMESTAMP_CNT_CTRL

	targets -set -nocase -filter {name =~ "Versal Gen 2*"}

	# Disable CRL write protection
	mwr -force $CRL_WPROT 0

	# Set RPU to SPLIT mode (bit 0 = 1)
	mwr -force $RPU_CLUSTER_CFG 1

	# Boot address
	if {$mem eq "ddr"} {
		set addr 0x100000
	} elseif {$mem eq "tcm"} {
		set addr 0
	} elseif {$mem eq "default"} {
		set addr 0xBBF20000
	}

	# Safe boot stubs in OCM
	mwr -force 0xBBF20000 0xEAFFFFFE
	mwr -force 0xBBF20100 0xEAFFFFFE

	# ===== Core 0 =====
	mwr -force $RPU_CORE0_BASE_LO $addr
	mask_write $RPU_CORE0_CFG 0x10 0x10
	mask_write $RPU_RST_CTRL 0x10101 0x1
	mask_write $RPU_RST_CTRL 0x1 0

	# ===== Core 1 =====
	mwr -force $RPU_CORE1_BASE_LO 0xBBF20100
	mask_write $RPU_CORE1_CFG 0x10 0x10
	mask_write $RPU_RST_CTRL 0x20202 0x2
	mask_write $RPU_RST_CTRL 0x2 0

	# Timestamp generator
	mwr -force $TIMESTAMP_REF_CTRL 100000000
	mwr -force $TIMESTAMP_CNT_CTRL 0x1

	# Stop both cores
	targets -set -nocase -filter {name =~ "*Cortex-R52 #0.0*"}
	after 300
	stop
	after 500

	targets -set -nocase -filter {name =~ "*Cortex-R52 #0.1*"}
	after 300
	stop
	after 500

	puts "Both R52 cores out of reset and stopped."
}

# ------------------------------------------------------------------
# Main entry point
#
# Single-core usage (west flash --pdi <pdi>):
#   argv = {core0.elf pdi_file}
#
# Dual-core usage (west flash --pdi <pdi> --second-elf <core1.elf>):
#   argv = {core0.elf pdi_file core1.elf}
# ------------------------------------------------------------------
proc load_image args  {
	set core0_elf [lindex $args 0]
	set pdi_file  [lindex $args 1]
	set core1_elf [lindex $args 2]

	if { [info exists ::env(HW_SERVER_URL)] } {
		connect -url $::env(HW_SERVER_URL)
	} else {
		connect
	}

	after 100
	targets -set -nocase -filter {name =~ "Versal Gen 2*"}
	after 100
	rst -system
	after 100

	device program $pdi_file

	if { [info exists ::env(HW_SERVER_URL)] } {
		set hw_server_url [split $::env(HW_SERVER_URL) ":"]
		set host [lindex $hw_server_url 0]
		set port [lindex $hw_server_url 1]
		disconnect
		after 2000
		connect -host $host -port $port
		after 3000
		ta
	}

	after 1000

	if { $core1_elf ne "" } {
		# ========== DUAL-CORE MODE ==========
		puts "Dual-core mode: loading ELFs on both R52 cores"
		rpu_dual_core_rst

		# Clear shared OCM memory
		targets -set -nocase -filter {name =~ "*Cortex-R52 #0.0*"}
		for {set i 0} {$i < 8} {incr i} {
			mwr -force [expr {0xBBF00000 + $i * 4}] 0
		}

		# Load core0 ELF
		puts "Loading Core0: $core0_elf"
		targets -set -nocase -filter {name =~ "*Cortex-R52 #0.0*"}
		dow -force $core0_elf

		# Load core1 ELF
		puts "Loading Core1: $core1_elf"
		targets -set -nocase -filter {name =~ "*Cortex-R52 #0.1*"}
		dow -force $core1_elf

		# Start core0 first
		puts "Starting Core0..."
		targets -set -nocase -filter {name =~ "*Cortex-R52 #0.0*"}
		con

		# Small delay then start core1
		after 500
		puts "Starting Core1..."
		targets -set -nocase -filter {name =~ "*Cortex-R52 #0.1*"}
		con

		puts "Both cores running."
	} else {
		# ========== SINGLE-CORE MODE ==========
		rpu_core0_rst

		after 100
		dow -force $core0_elf
		con
	}

	exit
}

load_image {*}$argv
