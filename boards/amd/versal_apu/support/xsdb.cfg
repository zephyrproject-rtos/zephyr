source [file join [file dirname [info script]] .. .. common xsdb_parse_args.tcl]

proc load_image {} {
	global args_arr
	parse_args {elf pdi bl31} {}

	if { [info exists ::env(HW_SERVER_URL)] } {
		connect -url $::env(HW_SERVER_URL)
	} else {
		connect
	}

	device program $args_arr(pdi)
	targets -set -nocase -filter {name =~ "Versal*"}
	after 100
	targets -set -nocase -filter {name =~ "*Cortex-A72 #0"}
	rst -proc
	after 100
	dow -force $args_arr(elf)
	dow -force $args_arr(bl31)
	con
	exit
}

load_image
