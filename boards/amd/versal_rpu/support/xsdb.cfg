# ============================================================
# Versal R5 RPU XSDB Flash Script
#
# Supports single-core and dual-core (split mode) loading.
#
# Register addresses (Versal):
#   RPU_GLBL_CNTL  = 0xFF9A0000  (bit3=SLSPLIT, +others)
# ============================================================

# ------------------------------------------------------------------
# Main entry point
#
# Single-core usage (west flash --pdi <pdi>):
#   argv = {core0.elf pdi_file}
#
# Dual-core usage (west flash --pdi <pdi> --second-elf <core1.elf>):
#   argv = {core0.elf pdi_file core1.elf}
# ------------------------------------------------------------------
proc load_image args  {
        set core0_elf [lindex $args 0]
        set pdi_file  [lindex $args 1]
        set core1_elf [lindex $args 2]

        if { [info exists ::env(HW_SERVER_URL)] } {
                connect -url $::env(HW_SERVER_URL)
        } else {
                connect
        }

        after 100
        targets -set -nocase -filter {name =~ "Versal*"}
        after 100
        rst -system
        after 100

        device program $pdi_file

        if { [info exists ::env(HW_SERVER_URL)] } {
                set hw_server_url [split $::env(HW_SERVER_URL) ":"]
                set host [lindex $hw_server_url 0]
                set port [lindex $hw_server_url 1]
                disconnect
                after 2000
                connect -host $host -port $port
                after 3000
                ta
        }

        after 100

        if { $core1_elf ne "" } {
                # ========== DUAL-CORE (SPLIT) MODE ==========
                puts "Dual-core mode: loading ELFs on both R5 cores"

                # Step 1: Set split mode (bit 3 of RPU_GLBL_CNTL)
                targets -set -nocase -filter {name =~ "Versal*"}
                mwr -force 0xFF9A0000 0x08
                after 200
                puts "Split mode set (RPU_GLBL_CNTL = [format 0x%08X [mrd -force -value 0xFF9A0000]])"

                # Step 2: Load and run core0
                puts "Loading Core0: $core0_elf"
                targets -set -nocase -filter {name =~ "*Cortex-R5 #0"}
                rst -proc
                after 100
                # Initialize TCM vector region
                mwr -size w 0x0 0x0 64
                after 100
                dow -force $core0_elf
                con

                # Step 3: Load and run core1
                puts "Loading Core1: $core1_elf"
                targets -set -nocase -filter {name =~ "*Cortex-R5 #1"}
                rst -proc
                #mwr -size w 0x0 0x0 64
                after 100
                dow -force $core1_elf
                con

                puts "Both cores running."
        } else {
                # ========== SINGLE-CORE MODE ==========
                targets -set -nocase -filter {name =~ "DPC"}
                after 100

                targets -set -nocase -filter {name =~ "*Cortex-R5 #0"}
                rst -proc
                after 100

                # Initialize TCM vector region (first 256 bytes) for JTAG boot
                mwr -size w 0x0 0x0 64
                after 100

                dow -force $core0_elf
                con
        }

        exit
}

load_image {*}$argv
