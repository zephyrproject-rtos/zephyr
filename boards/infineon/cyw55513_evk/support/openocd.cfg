# Target configuration for CYW55513
set _CHIPNAME cyw55513
set _CPUTAPID 0x2ba01477

adapter driver cmsis-dap

set _TARGETNAME $_CHIPNAME.cpu
jtag newtap $_CHIPNAME cpu -irlen 4 -expected-id $_CPUTAPID

target create $_TARGETNAME cortex_m -chain-position $_TARGETNAME

# Default to SWD interface
transport select swd

# Configure flash programming
set _FLASHNAME $_CHIPNAME.flash
flash bank $_FLASHNAME cfi 0x0 0 0 0 $_TARGETNAME

# Configure memory access
$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size 0x20000 -work-area-backup 0

# Configure event handlers
$_TARGETNAME configure -event reset-assert-post { }
$_TARGETNAME configure -event reset-deassert-post { }
