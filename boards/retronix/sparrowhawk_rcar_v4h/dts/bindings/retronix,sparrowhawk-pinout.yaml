title: Consumer for IO pins on Sparrow Hawk board

description: |
  Describe the pinout node label and the default hardware channels
  for each supported pin.

compatible: "retronix,sparrowhawk-pinout"

include: base.yaml

child-binding:
  properties:
    gpios:
      type: phandle-array
      description: >
        List of pin specifiers: <&gpio-controller pin flag>
    pwms:
      type: phandle-array
      description: >
        List of pin specifiers: <&pwm-controller channel period flag>
