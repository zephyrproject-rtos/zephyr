description: GPIO used to reset the ethernet phy

compatible: "emtrion,eth-phy-reset"

include: base.yaml

properties:
  status:
    required: true

  gpios:
    type: phandle-array
    required: true
    description: |
      GPIO to use as ethernet phy reset line: output.
