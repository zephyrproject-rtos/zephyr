identifier: qemu_riscv64/qemu_virt_riscv64/smp_large
name: QEMU Emulation for RISC-V 64-bit SMP (large code model)
type: qemu
simulation:
  - name: qemu
arch: riscv
toolchain:
  - zephyr
supported:
  - smp
ram: 262144
flash: 32768
testing:
  default: true
  ignore_tags:
    - net
    - bluetooth
  timeout_multiplier: 3.0
