identifier: qemu_tc4x
name: QEMU emulation for AURIX TC4Dx (TC1.8)
type: qemu
simulation:
  - name: qemu
arch: tricore
toolchain:
  - zephyr
  - cross-compile
ram: 240
supported:
  - gpio
  - uart
testing:
  default: true
  timeout_multiplier: 2
  ignore_tags:
    - bluetooth
    - cache
    - can
    - cpp
    - net
vendor: infineon
