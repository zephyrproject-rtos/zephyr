name: STM32N6570 Discovery Kit
type: mcu
arch: arm
ram: 192
flash: 512
vendor: st
supported:
  - arduino_i2c
  - arduino_serial
  - arduino_spi
  - adc
  - can
  - counter
  - crc
  - dma
  - i2c
  - gpio
  - memc
  - netif:eth
  - pwm
  - spi
  - uart
  - usb_device
  - usbd
  - video
  - watchdog
variants:
  stm32n6570_dk/stm32n657xx:
    twister: false
  stm32n6570_dk/stm32n657xx/fsbl:
    twister: false
  stm32n6570_dk/stm32n657xx/sb:
    toolchain:
      - zephyr
      - gnuarmemb
