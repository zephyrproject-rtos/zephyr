name: ST STM32H7S78 Discovery Kit
type: mcu
arch: arm
toolchain:
  - zephyr
supported:
  - adc
  - arduino_gpio
  - crc
  - dma
  - entropy
  - gpio
  - memc
  - octospi
  - rtc
  - uart
  - usb_device
  - usbd
  - watchdog
vendor: st
variants:
  stm32h7s78_dk/stm32h7s7xx:
    twister: true
    ram: 456
    flash: 64
  stm32h7s78_dk/stm32h7s7xx/ext_flash_app:
    sysbuild: true
    ram: 456
    flash: 61439  # size in kB of 1 app slot minus MCUboot header size (1KB)
    testing:
      ignore_tags:
        - arch
        - arm
        - clib
        - cpp
        - kernel
        - posix
        - cmsis-dsp
