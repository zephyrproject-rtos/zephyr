CONFIG_MEMC=y
CONFIG_DISPLAY_INIT_PRIORITY=87
CONFIG_STM32_LTDC_DISABLE_FMC_BANK1=y
CONFIG_INPUT_GT911_INTERRUPT=y
CONFIG_INPUT_GT911_MAX_TOUCH_POINTS=5
# Enable DMA to be used with dfsdm driver
CONFIG_DMA=y
# dimension of the internal buffer used when DMA is enabled
CONFIG_DMIC_STM32_DFSDM_MAX_SAMPLES=4096
