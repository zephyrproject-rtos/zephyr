
source [find interface/jlink.cfg]

transport select swd

set CHIPNAME atsame70q20b

source [find target/atsamv.cfg]

# Use the physical target reset line instead of a core-only reset fallback.
reset_config srst_only srst_push_pull
adapter srst pulse_width 100
adapter srst delay 100

# Ensure the chip boots from flash instead of the ROM/bootloader path.
$_TARGETNAME configure -event reset-init {
	atsamv gpnvm set 1
}

$_TARGETNAME configure -event gdb-attach {
	echo "Debugger attaching: initializing target"
	reset init
	gdb_breakpoint_override hard
}

$_TARGETNAME configure -event gdb-detach {
	echo "Debugger detaching: resuming execution"
	resume
}
