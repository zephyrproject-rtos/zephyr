deps:
  - "drivers/sensor/attributes.yaml"
  - "drivers/sensor/channels.yaml"
  - "drivers/sensor/triggers.yaml"
  - "drivers/sensor/units.yaml"
compatible:
  org: "avago"
  part: "apds9960"
supported-buses:
  - i2c
description: |
  APDS9960 ALS/RGB/gesture/proximity sensor
channels:
  red: []
  green: []
  blue: []
  light: []
  prox: []
attributes:
  - attribute: lower_thresh
    channel: prox
    units: distance
  - attribute: upper_thresh
    channel: prox
    units: distance
triggers:
  - threshold