deps:
  - "drivers/sensor/attributes.yaml"
  - "drivers/sensor/channels.yaml"
  - "drivers/sensor/triggers.yaml"
  - "drivers/sensor/units.yaml"
compatible:
  org: "bosch"
  part: "bmi08x"
supported-buses:
  - i2c
  - spi
description: |
  BMI08x accel/gyro
channels:
  accel_x: []
  accel_y: []
  accel_z: []
  accel_xyz: []
  gyro_x: []
  gyro_y: []
  gyro_z: []
  gyro_xyz: []
  die_temp: []
attributes:
  - attribute: full_scale
    channel: accel_xyz
    units: acceleration
  - attribute: full_scale
    channel: gyro_xyz
    units: angular_velocity
  - attribute: sampling_frequency
    channel: accel_xyz
    units: frequency
  - attribute: sampling_frequency
    channel: gyro_xyz
    units: frequency
triggers:
  - data_ready