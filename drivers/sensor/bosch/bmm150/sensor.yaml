deps:
  - "drivers/sensor/attributes.yaml"
  - "drivers/sensor/channels.yaml"
  - "drivers/sensor/triggers.yaml"
  - "drivers/sensor/units.yaml"
compatible:
  org: "bosch"
  part: "bmm150"
supported-buses:
  - i2c
  - spi
description: |
  BMM150 magnetometer
channels:
  magn_x: []
  magn_y: []
  magn_z: []
  magn_xyz: []
attributes:
  - attribute: oversampling
    channel: magn_xyz
    units: none
  - attribute: sampling_frequency
    channel: magn_xyz
    units: frequency
triggers:
  - data_ready