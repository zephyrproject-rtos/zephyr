deps:
  - "drivers/sensor/attributes.yaml"
  - "drivers/sensor/channels.yaml"
  - "drivers/sensor/triggers.yaml"
  - "drivers/sensor/units.yaml"
compatible:
  org: "adi"
  part: "adt7310"
supported-buses:
  - spi
description: |
  Details...
channels:
  ambient_temp: []
attributes:
  - attribute: "sampling_frequency"
    channel: "ambient_temp"
    units: "frequency"
  - attribute: "hysteresis"
    channel: "ambient_temp"
    units: "percent"
  - attribute: "lower_thresh"
    channel: "ambient_temp"
    units: "temperature"
  - attribute: "upper_thresh"
    channel: "ambient_temp"
    units: "temperature"
triggers:
  - threshold
