deps:
  - "drivers/sensor/attributes.yaml"
  - "drivers/sensor/channels.yaml"
  - "drivers/sensor/triggers.yaml"
  - "drivers/sensor/units.yaml"
compatible:
  org: "adi"
  part: "adxl372"
supported-buses:
  - i2c
  - spi
description: |
  ADXL372 Accelerometer
channels:
  accel_x: []
  accel_y: []
  accel_z: []
  accel_xyz: []
attributes:
  - attribute: "sampling_frequency"
    channel: "accel_xyz"
    units: "frequency"
  - attribute: "lower_thresh"
    channel: "accel_xyz"
    units: "acceleration"
  - attribute: "upper_thresh"
    channel: "accel_xyz"
    units: "acceleration"
triggers:
  - data_ready
  - fifo_full
  - fifo_watermark
  - threshold
