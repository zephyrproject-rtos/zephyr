deps:
  - "drivers/sensor/attributes.yaml"
  - "drivers/sensor/channels.yaml"
  - "drivers/sensor/triggers.yaml"
  - "drivers/sensor/units.yaml"
compatible:
  org: "avago"
  part: "apds9306"
supported-buses:
  - i2c
description: |
  APDS9306 light sensor
channels:
  light: []
attributes:
  - attribute: gain
    channel: light
    units: none
  - attribute: resolution
    channel: light
    units: bits