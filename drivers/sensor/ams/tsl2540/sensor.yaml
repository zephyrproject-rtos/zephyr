deps:
  - "drivers/sensor/attributes.yaml"
  - "drivers/sensor/channels.yaml"
  - "drivers/sensor/triggers.yaml"
  - "drivers/sensor/units.yaml"
  - "drivers/sensor/ams/tsl2540/attributes.yaml"
compatible:
  org: "ams"
  part: "tsl2540"
supported-buses:
  - i2c
description: |
  TSL2540 IR light sensor
channels:
  ir: []
  light: []
attributes:
  - attribute: gain
    channel: light
    units: none
  - attribute: int_apers
    channel: light
    units: none
  - attribute: tsl2540_integration_time
    channel: light
    units: time
  - attribute: lower_thresh
    channel: light
    units: illuminance
  - attribute: upper_thresh
    channel: light
    units: illuminance
  - attribute: tsl2540_continuous_mode
    channel: light
    units: none
  - attribute: tsl2540_continuous_no_wait_mode
    channel: light
    units: none
  - attribute: tsl2540_shutdown_mode
    channel: light
    units: none
triggers:
  - threshold