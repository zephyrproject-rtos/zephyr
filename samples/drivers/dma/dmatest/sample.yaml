sample:
  description: DMA direct mode transfer
  name: DMA driver sample
common:
  tags: drivers
  depends_on: dma
  harness: console
  harness_config:
    type: one_line
    regex:
      - "DMA transfer verified all on channels"
tests:
  sample.drivers.dma:
    integration_platforms:
      - versalnet_rpu
  sample.drivers.dma.versalnet_rpu:
    filter: dt_compat_enabled("xlnx,zynqmp-dma-1.0")
    platform_allow:
      - versalnet_rpu
  sample.drivers.dma.versal2_rpu:
    filter: dt_compat_enabled("amd,versal2-dma-1.0")
    platform_allow:
      - versal2_rpu
