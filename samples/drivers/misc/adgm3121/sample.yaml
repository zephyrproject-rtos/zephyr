sample:
  name: ADGM3121 MEMS Switch
  description: Demonstrates the ADGM3121 MEMS RF switch driver API
common:
  tags:
    - drivers
    - misc
  harness: console
  harness_config:
    type: one_line
    regex:
      - "ADGM3121 sample completed"
tests:
  sample.drivers.misc.adgm3121:
    filter: dt_compat_enabled("adi,adgm3121-gpio") or dt_compat_enabled("adi,adgm3121")
  sample.drivers.misc.adgm3121.eval_adgm3121:
    extra_args: SHIELD=eval_adgm3121
    platform_allow:
      - nucleo_f413zh
