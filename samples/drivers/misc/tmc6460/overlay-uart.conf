# UART transport variant. Layer on top of prj.conf with:
#   -DDTC_OVERLAY_FILE=uart.overlay -DEXTRA_CONF_FILE=overlay-uart.conf
# The uart.overlay places the TMC6460 on a UART bus; switch the driver
# transport from SPI to UART to match.
CONFIG_SPI=n
CONFIG_TMC6460_SPI=n
CONFIG_SERIAL=y
CONFIG_TMC6460_UART=y
