# Enable nocache memory for DMA descriptors
CONFIG_NOCACHE_MEMORY=y

# Disable PLL setting as imx95 uses SCMI for clock management
CONFIG_I2S_HAS_PLL_SETTING=n

# Raise DMA TCD Queue size, as this is required by the I2S SAI driver
CONFIG_DMA_TCD_QUEUE_SIZE=4
CONFIG_GPIO=y
CONFIG_GPIO_PCAL64XXA=y
CONFIG_GPIO_HOGS=y
