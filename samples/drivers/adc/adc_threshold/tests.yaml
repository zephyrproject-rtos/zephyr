sample:
  name: ADC driver threshold sample
common:
  tags:
    - adc
  depends_on: adc
  filter: dt_alias_exists("adc0")
  harness: console
  timeout: 10
  harness_config:
    type: multi_line
    regex:
      - "Starting asynchronous reads, waiting for threshold events"
tests:
  sample.drivers.adc.adc_threshold:
    platform_allow:
      - nrf52dk/nrf52832
      - xg24_ek2703a
    integration_platforms:
      - nrf52dk/nrf52832
