# A4114 driver can only acquire one sequence sample
CONFIG_SEQUENCE_SAMPLES=1
CONFIG_SEQUENCE_RESOLUTION=12
CONFIG_SEQUENCE_32BITS_REGISTERS=y
CONFIG_LOG=n
#CONFIG_SCHED_SIMPLE=y
#CONFIG_WAITQ_SIMPLE=y
#CONFIG_ARM_MPU=n
CONFIG_GEN_SW_ISR_TABLE=n
CONFIG_GEN_ISR_TABLES=n
CONFIG_CBPRINTF_NANO=y

# Memory constraints
CONFIG_MAIN_STACK_SIZE=512
CONFIG_IDLE_STACK_SIZE=256
CONFIG_ISR_STACK_SIZE=512
CONFIG_HEAP_MEM_POOL_SIZE=0

# ADC minimal
CONFIG_ADC_ASYNC=n
