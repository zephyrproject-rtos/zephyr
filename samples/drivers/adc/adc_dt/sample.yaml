sample:
  name: ADC devicetree driver sample
common:
  tags:
    - adc
  depends_on: adc
  filter: dt_node_has_prop("/zephyr,user","io-channels")

tests:
  sample.drivers.adc.adc_dt:
    integration_platforms:
      - cc3220sf_launchxl
      - esp32c3_devkitm
      - frdm_mcxa346
      - gd32f350r_eval
      - lpcxpresso55s36
      - mcx_n9xx_evk/mcxn947/cpu0
      - mec172xevb_assy6906
      - nrf52840dk/nrf52840
      - nucleo_l073rz
      - rd_rw612_bga
      - s32k148_evb
      - xg24_rb4187c
    harness: console
    timeout: 10
    harness_config:
      type: multi_line
      regex:
        - "ADC reading\\[\\d+\\]:"
        - "- .+, channel \\d+: -?\\d+"
