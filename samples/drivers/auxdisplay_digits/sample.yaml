sample:
  description: Demonstration of auxdisplay driver for segment displays
  name: Auxiliary (segment) display sample
tests:
  sample.drivers.auxdisplay_digits:
    tags: auxdisplay
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    build_only: true
  sample.drivers.auxdisplay_digits.frdm_mcxa366:
    tags: auxdisplay
    platform_allow:
      - frdm_mcxa366/mcxa366
    extra_args:
      - SHIELD=od_6010
