sample:
  name: MSPI Flash Sample
common:
  tags:
    - drivers
    - mspi
    - flash
  filter: dt_compat_enabled("jedec,spi-nor") or dt_compat_enabled("jedec,mspi-nor")
    or dt_compat_enabled("mspi-atxp032") or dt_compat_enabled("mspi-is25xX0xx")
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "Test 1: Flash erase"
      - "Flash erase succeeded!"
      - "Test 2: Flash write"
      - "Attempting to write 4 bytes"
      - "Data read matches data written. Good!!"
tests:
  sample.drivers.mspi.flash:
    platform_exclude:
      - hifive_unmatched/fu740/s7
      - hifive_unmatched/fu740/u74
    platform_allow:
      - apollo3p_evb
      - apollo510_evb
      - arduino_giga_r1/stm32h747xx/m7
      - b_u585i_iot02a
      - stm32h573i_dk
      - stm32h735g_disco
      - stm32l496g_disco
      - stm32l562e_dk
    integration_platforms:
      - apollo3p_evb
      - apollo510_evb
  sample.drivers.mspi.flash.memmap:
    extra_configs:
      - CONFIG_MSPI_XIP=y
    platform_allow:
      - stm32h573i_dk
