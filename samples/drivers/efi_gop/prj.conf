#
# LVGL on EFI GOP display (x86_64 UEFI boot).
# Requires CONFIG_DISPLAY_EFI_GOP and chosen zephyr,display (see boards/qemu_x86_64.overlay).
#

# EFI application output and QEMU UEFI boot (enables OVMF + graphics for run)
CONFIG_BUILD_OUTPUT_EFI=y
CONFIG_QEMU_UEFI_BOOT=y
# Use system QEMU so run target gets graphical display (-display gtk)
CONFIG_QEMU_USE_SYSTEM=y

CONFIG_SMP=n
CONFIG_X86_VERY_EARLY_CONSOLE=y

CONFIG_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_MULTITHREADING=y
CONFIG_THREAD_NAME=y

# Display: EFI GOP (zefi saves GOP at boot; driver uses it)
CONFIG_DISPLAY=y
CONFIG_DISPLAY_EFI_GOP=y

# LVGL on GOP
CONFIG_LVGL=y
CONFIG_LV_USE_LOG=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BAR=y
CONFIG_LV_USE_FLEX=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_Z_BUFFER_ALLOC_STATIC=n
CONFIG_LV_Z_MEM_POOL_SIZE=32768
CONFIG_LV_Z_AUTO_INIT=y
CONFIG_MAIN_STACK_SIZE=4096
