sample:
  name: hwspinlock sample

common:
  sysbuild: true
  tags:
    - drivers
    - hwspinlock
    - mbox

tests:
  sample.drivers.hwspinlock:
    filter: dt_compat_enabled("nxp,sema42")
    platform_allow:
      - mcx_n9xx_evk/mcxn947/cpu0
      - frdm_mcxn947/mcxn947/cpu0
      - mimxrt700_evk/mimxrt798s/cm33_cpu0
      - mimxrt1180_evk/mimxrt1189/cm33
      - frdm_imxrt1186/mimxrt1186/cm33
    integration_platforms:
      - frdm_mcxn947/mcxn947/cpu0
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "HOST: locked gate id=0, sending ping on channel"
        - "HOST: unlocked gate, waiting for pong..."
        - "HOST: received pong"
