# nothing here
CONFIG_PM_DEVICE=y

# I2C
CONFIG_I2C=y

# GPIO
CONFIG_GPIO=y

# Pinctrl
CONFIG_PINCTRL=y

# Regulator
CONFIG_REGULATOR=y

# Video (Camera)
CONFIG_VIDEO=y
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=10
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=16000000
CONFIG_VIDEO_AP1302=y

# GPIO Expanders
CONFIG_GPIO_PCAL64XXA=y
CONFIG_MFD=y
CONFIG_MFD_ADP5585=y
CONFIG_GPIO_ADP5585=y

#MIPI CSI

#ISI
CONFIG_VIDEO_MCUX_ISI=y

#Shell
CONFIG_I2C_SHELL=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_VIDEO_AP1302_BUILTIN_FIRMWARE=y

CONFIG_VIDEO_CTRL_VFLIP=y
CONFIG_VIDEO_CTRL_HFLIP=y
CONFIG_LOG_BUFFER_SIZE=102400

# this mean get image context from left 270 and 585, it will re-set into needed 540*1170 site
CONFIG_VIDEO_SOURCE_CROP_LEFT=0
CONFIG_VIDEO_SOURCE_CROP_TOP=0
CONFIG_VIDEO_SOURCE_CROP_WIDTH=540
CONFIG_VIDEO_SOURCE_CROP_HEIGHT=1170
