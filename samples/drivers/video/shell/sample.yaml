sample:
  name: Video shell
tests:
  sample.video.shell:
    tags: video
    extra_args:
      - platform:mimxrt1170_evk/mimxrt1176/cm7:SHIELD="nxp_btb44_ov5640"
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "You can now start using the video shell"
    platform_allow:
      - mimxrt1170_evk/mimxrt1176/cm7
      - native_sim
    integration_platforms:
      - mimxrt1170_evk/mimxrt1176/cm7
      - native_sim
