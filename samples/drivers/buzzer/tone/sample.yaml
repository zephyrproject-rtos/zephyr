sample:
  name: Buzzer Tone
  description: |
    Plays a short beep and a few tones through the buzzer device aliased as `buzzer0`. Suitable
    for boards that expose a passive piezo via the pwm-buzzer compatible or an active buzzer via
    gpio-buzzer.
common:
  platform_type:
    - mcu
  tags:
    - drivers
    - buzzer
  filter: dt_alias_exists("buzzer0")
tests:
  sample.drivers.buzzer.tone:
    harness: buzzer
