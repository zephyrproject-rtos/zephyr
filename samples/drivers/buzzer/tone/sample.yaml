sample:
  name: Buzzer Tone
  description: |
    Plays a short beep and a few tones through the buzzer device aliased as `buzzer`. Suitable
    for boards that expose a passive piezo via the pwm-buzzer compatible or an active buzzer via
    gpio-buzzer.
common:
  tags:
    - drivers
    - buzzer
  filter: dt_alias_exists("buzzer")
tests:
  sample.drivers.buzzer.tone:
    build_only: true
