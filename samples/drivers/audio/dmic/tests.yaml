sample:
  name: DMIC sample
tests:
  sample.drivers.audio.dmic:
    tags: dmic
    filter: dt_nodelabel_enabled("dmic_dev")
    extra_args:
      - platform:arduino_giga_r1/stm32h747xx/m7:SHIELD=arduino_giga_display_shield
    integration_platforms:
      - nrf52840dk/nrf52840
      - nrf5340dk/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - apollo510_evb
      - stm32f769i_disco
      - arduino_giga_r1/stm32h747xx/m7
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "DMIC sample"
        - "Exiting"
