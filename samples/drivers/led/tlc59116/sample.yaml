sample:
  description: Demonstration of the TLC59116 LED driver
  name: TLC59116 sample
tests:
  sample.drivers.led.tlc59116:
    platform_allow: nrf52840dk/nrf52840
    tags: led
    harness: console
    harness_config:
      fixture: fixture_led_tlc59116
      type: multi_line
      ordered: true
      regex:
        - "Found LED device"
        - "Testing 16 LEDs"
