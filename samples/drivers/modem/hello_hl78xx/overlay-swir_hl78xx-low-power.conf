CONFIG_PM_DEVICE=y
# ============================================================================
# Modem low power configuration
# ============================================================================
CONFIG_MODEM_HL78XX_LOW_POWER_MODE=y
#enable PSM
CONFIG_MODEM_HL78XX_PSM=y
#enable eDRX
CONFIG_MODEM_HL78XX_EDRX=n
