#default: MODEM_HL78XX_USE_DELAY_BASED_POWER_DOWN
# CONFIG_MODEM_HL78XX_POWER_DOWN=y
#enable active time based power down
# CONFIG_MODEM_HL78XX_USE_ACTIVE_TIME_BASED_POWER_DOWN=y
