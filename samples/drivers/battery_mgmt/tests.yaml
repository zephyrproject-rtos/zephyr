sample:
  name: Advanced Battery Management Device
  description: Sample for generic battery management with Charger, Fuel Gauge, and Regulator support
common:
  tags:
    - charger
    - fuel_gauge
    - regulator
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "Current.*uA"
      - "Charger is.*"
      - "Fuel gauge SoC"
      - ".*Output Voltage.*"
tests:
  sample.drivers.battery_mgmt:
    filter: dt_nodelabel_enabled("charger") and dt_nodelabel_enabled("fuelgauge") and
            dt_nodelabel_enabled("buck") and dt_nodelabel_enabled("buckboost")
    platform_allow:
      - nucleo_u575zi_q
