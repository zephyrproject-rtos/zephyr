sample:
  name: Clock Monitor - Frequency Meter
  description: |
    Uses a clock_monitor instance (referenced by the `clock-meter`
    devicetree alias) in MEASURE mode to measure a monitored clock
    once, logging the result in Hz. Demonstrates the start -> callback
    -> semaphore wait pattern with application-owned timeout handling.

common:
  tags:
    - drivers
    - clock_monitor
  harness: console
  harness_config:
    type: one_line
    regex:
      - "Measured frequency = \\d+ Hz"
tests:
  sample.drivers.clock_monitor.measure_freq:
    platform_allow:
      - frdm_mcxe31b

  sample.drivers.clock_monitor.measure_freq.freqme:
    platform_allow:
      - frdm_mcxa153
      - frdm_mcxa156
      - frdm_mcxa344
      - frdm_mcxa266
      - frdm_mcxa366
      - frdm_mcxa577
      - frdm_mcxn236
      - mcx_n5xx_evk/mcxn547/cpu0
      - mcx_n9xx_evk/mcxn947/cpu0
      - frdm_mcxl255/mcxl255/cpu0
      - mimxrt700_evk/mimxrt798s/cm33_cpu0
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="../clock_monitor.overlay"
