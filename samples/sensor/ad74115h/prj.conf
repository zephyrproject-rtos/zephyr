# Enable SPI and Sensor API
CONFIG_SPI=y
CONFIG_SENSOR=y

# Enable the AD74115H Driver
CONFIG_AD74115H=y

# Enable Logging for debugging
CONFIG_LOG=y
CONFIG_SENSOR_LOG_LEVEL_INF=y

# Support for floating point in printk (needed for sensor_value output)
CONFIG_CBPRINTF_FP_SUPPORT=y

# Enable GPIO for Reset and ADC_RDY pins
CONFIG_GPIO=y
