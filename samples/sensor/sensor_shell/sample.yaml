sample:
  name: Shell Sensor Module Sample
common:
  tags:
    - sensor
    - shell

tests:
  sample.sensor.shell:
    integration_platforms:
      - frdm_k64f
    # TODO Remove once #63414 is resolved
    platform_exclude: gd32l233r_eval
    filter: ( CONFIG_UART_CONSOLE and CONFIG_SERIAL_SUPPORT_INTERRUPT )
    harness: keyboard
    min_ram: 20
    min_flash: 33
  sample.sensor.shell.bma4xx.stream:
    platform_allow:
      - nrf52833dk/nrf52833
      - nrf52840dk/nrf52840
    filter: dt_compat_enabled("bosch,bma4xx")
    extra_conf_files:
      - boards/bma4xx/bma4xx_stream.conf
    extra_dtc_overlay_files:
      - boards/bma4xx/nrf52833_40_bma4xx.overlay
  sample.sensor.shell.bma4xx.temp.enabled:
    platform_allow:
      - nrf52833dk/nrf52833
      - nrf52840dk/nrf52840
    filter: dt_compat_enabled("bosch,bma4xx")
    extra_conf_files:
      - boards/bma4xx/bma4xx_temp_enabled.config
    extra_dtc_overlay_files:
      - boards/bma4xx/nrf52833_40_bma4xx.overlay
  sample.sensor.shell.bma4xx.fifo.disabled:
    platform_allow:
      - nrf52833dk/nrf52833
      - nrf52840dk/nrf52840
    filter: dt_compat_enabled("bosch,bma4xx")
    extra_conf_files:
      - boards/bma4xx/bma4xx_fifo_disabled.conf
    extra_dtc_overlay_files:
      - boards/bma4xx/nrf52833_40_bma4xx.overlay
  sample.sensor.shell.pytest:
    filter: CONFIG_SERIAL and dt_chosen_enabled("zephyr,shell-uart")
    min_ram: 40
    harness: pytest
    timeout: 180
    extra_configs:
      - arch:posix:CONFIG_NATIVE_UART_0_ON_STDINOUT=y
      - CONFIG_SAMPLES_SENSOR_SHELL_FAKE_SENSOR=y
    integration_platforms:
      - native_sim
