sample:
  name: Sample for Nooploop TOFsens Time Of Flight sensor
tests:
  sample.sensor.tofsense:
    depends_on:
      - uart
    tags:
      - sensors
    filter: dt_compat_enabled("nooploop,tofsense")
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "distance is .*"
