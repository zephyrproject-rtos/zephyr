sample:
  name: versal sysmon temperature sample

tests:
  sample.versal_sysmon_temp:
    tags:
      - sensor
      - sysmon
      - versal
    harness: console
    harness_config:
      type: one_line
      regex:
        - "Sysmon Die temperature:"
    platform_allow:
      - versal_apu
    integration_platforms:
      - versal_apu
