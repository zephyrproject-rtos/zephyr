# Baseline tracing configuration shared by every build of this sample.
#
# Out of the box this enables tracing with the Common Trace Format (CTF) and the
# RAM backend, which needs no dedicated transport or devicetree setup and so
# builds and runs on any board. The captured CTF stream lives in the
# "ram_tracing" buffer and is retrieved with a debugger (see the README).
#
# To stream the trace over a transport, or to use a different format, add one of
# the prj_*.conf overlays on top of this baseline, for example:
#
#   west build -b <board> samples/subsys/tracing -- -DEXTRA_CONF_FILE=prj_uart.conf
#
# The overlays only contain the options that differ from this baseline.

# enable to use thread names
CONFIG_THREAD_NAME=y
CONFIG_MP_MAX_NUM_CPUS=1
CONFIG_DEBUG_THREAD_INFO=y

CONFIG_TRACING=y
CONFIG_TRACING_CTF=y
CONFIG_TRACING_BUFFER_SIZE=4096
CONFIG_TRACING_BACKEND_SEMIHOST=y
CONFIG_TRACING_SYNC=y
CONFIG_DEBUG_OPTIMIZATIONS=n
CONFIG_SEMIHOST=y
