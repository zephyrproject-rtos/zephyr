# Baseline configuration for the tracing sensor-pipeline sample.
#
# Mirrors the basic tracing sample: CTF format over the semihosting backend, so
# that "west build -t run" drops a tracing.bin in the build directory that can
# be opened directly with scripts/tracing/trace_viewer.py. To use a different
# backend, layer one of the prj_*.conf overlays on top with EXTRA_CONF_FILE.

CONFIG_THREAD_NAME=y
CONFIG_MP_MAX_NUM_CPUS=1
CONFIG_DEBUG_THREAD_INFO=y

CONFIG_TRACING=y
CONFIG_TRACING_CTF=y
CONFIG_TRACING_BUFFER_SIZE=4096
CONFIG_TRACING_BACKEND_SEMIHOST=y
CONFIG_TRACING_SYNC=y
CONFIG_DEBUG_OPTIMIZATIONS=n
CONFIG_SEMIHOST=y
