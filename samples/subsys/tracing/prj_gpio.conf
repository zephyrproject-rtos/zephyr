# Overlay: "user" format focused on the GPIO tracing hooks.
# Applied on top of prj.conf with EXTRA_CONF_FILE=prj_gpio.conf. Selecting the
# user format here overrides the CTF format from the baseline. Thread tracing is
# turned off to keep the GPIO events easy to read on the console.
CONFIG_GPIO=y
CONFIG_GPIO_GET_CONFIG=y
CONFIG_TRACING_USER=y
CONFIG_TRACING_GPIO=y
CONFIG_TRACING_THREAD=n
