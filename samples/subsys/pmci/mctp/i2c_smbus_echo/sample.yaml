sample:
  name: MCTP SMBus/I2C Echo
common:
  tags:
    - pmci
    - mctp
    - i2c
tests:
  sample.pmci.mctp.i2c_smbus_echo.requester:
    platform_allow:
      - frdm_mcxn947/mcxn947/cpu0
    build_only: true
    extra_args:
      - CONF_FILE="prj.conf;prj_requester.conf"
      - EXTRA_DTC_OVERLAY_FILE=boards/frdm_mcxn947_mcxn947_cpu0_requester.overlay
  sample.pmci.mctp.i2c_smbus_echo.responder:
    platform_allow:
      - frdm_mcxn947/mcxn947/cpu0
    build_only: true
    extra_args:
      - CONF_FILE="prj.conf;prj_responder.conf"
      - EXTRA_DTC_OVERLAY_FILE=boards/frdm_mcxn947_mcxn947_cpu0_responder.overlay
