CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_VIRTIOFS=y
CONFIG_HEAP_MEM_POOL_SIZE=100000
CONFIG_MAIN_STACK_SIZE=16384
# The vhost-user-fs device is static and baked into the image here. The
# matching "-chardev socket,id=char0,path=<socket>" flag is supplied at run
# time (by twister for the virtiofs harness, or via QEMU_EXTRA_FLAGS for a
# manual "west build -t run") so the socket path can be unique per run.
CONFIG_QEMU_EXTRA_FLAGS="-device vhost-user-fs-pci,queue-size=1024,chardev=char0,tag=myfs -m 32M -object memory-backend-memfd,id=mem,size=32M,share=on -numa node,memdev=mem"
