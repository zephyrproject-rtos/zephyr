# Must be > CRC_DRIVER_INIT_PRIORITY (50) so hardware CRC is ready for ONFI probe.
CONFIG_FLASH_MCUX_FLEXSPI_NAND_INIT_PRIORITY=51

# FTL block device backend for littlefs
CONFIG_DISK_ACCESS=y
CONFIG_APP_LITTLEFS_STORAGE_BLK_FTL=y
CONFIG_FS_LITTLEFS_BLK_DEV=y
CONFIG_FS_LITTLEFS_CACHE_SIZE=2048
CONFIG_FS_LITTLEFS_LOOKAHEAD_SIZE=64

# LittleFS + Dhara + FlexSPI HAL call chain exceeds default stack size.
CONFIG_MAIN_STACK_SIZE=16384
