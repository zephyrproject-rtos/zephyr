CONFIG_RETAINED_MEM_NRF_GPREGRET=n

# With USE_SWITCH enabled, the .text grows by few bytes (~0x36c), which pushes __rodata_region_end
# slightly beyond the MPU aligned boundary but the MPU_REQUIRES_POWER_OF_TWO_ALIGNMENT pushes the
# padding_section beyond the available sram. Using a custom changes the alignment to 32byte.
CONFIG_CUSTOM_SECTION_ALIGN=y
