CONFIG_BMC=y

CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=4096

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=n

CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_POSIX_API=y
CONFIG_EVENTFD=y

CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_CONTEXT_NET_PKT_POOL=y
CONFIG_ZVFS_EVENTFD_MAX=10
CONFIG_ZVFS_POLL_MAX=32
CONFIG_NET_MAX_CONTEXTS=32
CONFIG_NET_MAX_CONN=32
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_TCP_TIME_WAIT_DELAY=0
CONFIG_NET_TCP_RETRY_COUNT=3
CONFIG_NET_TCP_INIT_RETRANSMISSION_TIMEOUT=120

CONFIG_BMC_APP_HTTPS=n
CONFIG_BMC_APP_WEB=y
CONFIG_BMC_APP_WEB_TERMINAL=y
CONFIG_BMC_APP_CONSOLE_LOGGER=y
CONFIG_CONSOLE_BRIDGE=y
CONFIG_BMC_PERSISTENT_STORAGE=n
CONFIG_BMC_APP_NTP=n
CONFIG_BMC_DEFAULT_USE_NTP=y
CONFIG_RTC=n
#CONFIG_BMC_JTAG=n

CONFIG_DEFAULT_ADMIN_PASSWORD="admin"

# Network address config
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.2.2"
CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::1"
