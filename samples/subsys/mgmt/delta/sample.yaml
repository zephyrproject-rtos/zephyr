  tags:
    - dfu
    - delta
  depends_on:
    - flash
  modules:
    - heatshrink
tests:
  sample.subsys.mgmt.delta:
    tags:
      - dfu
      - delta
    platform_allow:
      - nrf7002dk/nrf5340/cpuapp

