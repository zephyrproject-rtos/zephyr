# Route the shell to the process stdin/stdout so the sample can be driven
# interactively, and let the native backend own logging. Without this the
# shell log backend and the native backend would both reach the terminal and
# every line would be printed twice.
CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y
CONFIG_SHELL_LOG_BACKEND=n
