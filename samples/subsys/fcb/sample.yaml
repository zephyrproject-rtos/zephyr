sample:
  name: FCB Sample

tests:
  sample.fcb.basic:
    tags: fcb
    platform_exclude: qemu_x86
    integration_platforms:
      - stm32f4_disco/stm32f407xx
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "Booted 0 times"
        - "Saving boot_cnt 1 to FCB"
        - "New boot_cnt value written to flash"
        - "Rebooting in 1 second"
