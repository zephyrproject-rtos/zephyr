# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y

CONFIG_MAIN_STACK_SIZE=8192
CONFIG_REBOOT=y

# Flash / MCUboot
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_BLOCK_BUF_SIZE=512

# Delta patching library + bsdiff/heatshrink backend
CONFIG_DELTA=y
CONFIG_DELTA_BACKEND_BSDIFFHS=y
CONFIG_DELTA_LOG_LEVEL_INF=y

# heatshrink in static-allocation mode; the patch must declare a
# window_sz2 and lookahead_sz2 with these values.
CONFIG_HEATSHRINK=y
CONFIG_HEATSHRINK_STATIC_WINDOW_BITS=10
CONFIG_HEATSHRINK_STATIC_LOOKAHEAD_BITS=4
CONFIG_HEATSHRINK_STATIC_INPUT_BUFFER_SIZE=64
