# Board specific configuration for rd_rw612_bga

# Enable GPIO for LED control (optional)
CONFIG_GPIO=y

# Enable PINCTRL
CONFIG_PINCTRL=y

# Enable RW6xx SDIO device HAL
CONFIG_SD_DEV_RW6XX_SDIO=y

# Increase stack sizes if needed
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Enable more detailed logging
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_LOG_PRINTK=y

# For RW61XX OSA
CONFIG_EVENTS=y
