sample:
  name: SD Device Sample
  description: Sample application for SD device driver

common:
  tags:
    - sd_dev
    - device

tests:
  sample.subsys.sd_dev.shell:
    platform_allow:
      - frdm_rw612
      - rd_rw612_bga
    filter: CONFIG_SD_DEV
    harness: console
    harness_config:
      type: multi_line
      regex:
        - SD Device Sample Started
        - SD Device is ready
