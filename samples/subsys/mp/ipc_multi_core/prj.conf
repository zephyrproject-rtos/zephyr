CONFIG_MP=y
CONFIG_IPC_SERVICE=y
CONFIG_MP_PLUGIN_IPC=y

# IPC Service Backend Config
CONFIG_MBOX=y
CONFIG_OPENAMP=y
CONFIG_IPC_SERVICE_BACKEND_RPMSG=y
CONFIG_IPM=y
CONFIG_IPM_MHU=y

# Disable cache management for QEMU emulation to avoid arch-specific linker issues
CONFIG_CACHE_MANAGEMENT=n

# MediaPipe Subsystem Config
CONFIG_MP_THREADS_NUM=2
CONFIG_MP_NET_BUF_POOL_COUNT=8
CONFIG_MP_FAKE_SRC=y
CONFIG_MP_FAKE_SRC_BUF_SZ=128

# Logging Configuration
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_MP_LOG_LEVEL_DBG=y
CONFIG_PRINTK=y

# Heap and buffer allocations
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_NET_BUF=y