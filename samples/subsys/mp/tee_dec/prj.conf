CONFIG_LOG=y

CONFIG_MP=y
CONFIG_MP_BASE=y
CONFIG_MP_BASE_CAPSFILTER=y
CONFIG_MP_BASE_QUEUE=y
CONFIG_MP_BASE_TEE=y
CONFIG_MP_FS=y
CONFIG_MP_IMG=y
CONFIG_MP_DISP=y
CONFIG_MP_PLAYER=y

# Pipeline thread + 2 queue threads
CONFIG_MP_THREADS_NUM=3

# 2 in each queue + 1 partial + 1 in-flight = 6.
CONFIG_MP_NET_BUF_POOL_COUNT=6
CONFIG_MP_IMG_JPEG_PARSER_POOL_NUM=6

# Largest estimated size for 320x240 JPEG image
CONFIG_MP_IMG_JPEG_PARSER_MAX_FRAME_SIZE=153600

CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_MAX_LFN=255
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y

CONFIG_MAIN_STACK_SIZE=1024
CONFIG_HEAP_MEM_POOL_SIZE=10240
