CONFIG_LOG=y

CONFIG_MP=y
CONFIG_MP_BASE=y
CONFIG_MP_BASE_CAPSFILTER=y
CONFIG_MP_FS=y
CONFIG_MP_IMG=y
CONFIG_MP_DISP=y
CONFIG_MP_PLAYER=y

