sample:
  name: Audio loopback pipeline sample

tests:
  sample.mp.audio_loopback:
    tags:
      - audio
      - samples
    platform_allow:
      - mimxrt685_evk/mimxrt685s/cm33
      - mimxrt1170_evk@B/mimxrt1176/cm7
      - mimxrt595_evk/mimxrt595s/cm33
      - mcx_n5xx_evk/mcxn547/cpu0
      - native_sim/native/64
    harness: console
    harness_config:
      type: one_line
      regex:
        - "Capture started"

  # Run the pipeline headless on native_sim and compare its output against the
  # input scaled by the configured gain. Unity gain and a gain above unity are
  # both covered, the latter exercising saturation.
  sample.mp.audio_loopback.output.unity_gain:
    tags:
      - audio
      - samples
    platform_allow:
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - CONFIG_SAMPLE_AUDIO_GAIN_PERCENT=100
    harness: pytest
    harness_config:
      pytest_root:
        - "pytest/test_pipeline.py"

  sample.mp.audio_loopback.output.amplified:
    tags:
      - audio
      - samples
    platform_allow:
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - CONFIG_SAMPLE_AUDIO_GAIN_PERCENT=200
    harness: pytest
    harness_config:
      pytest_root:
        - "pytest/test_pipeline.py"

  # The same pipeline reading from an I2S receiver instead of a DMIC. Built for
  # every board here that has an i2s-codec-rx alias.
  sample.mp.audio_loopback.i2s_source:
    tags:
      - audio
      - samples
    platform_allow:
      - mimxrt685_evk/mimxrt685s/cm33
      - mimxrt595_evk/mimxrt595s/cm33
      - mcx_n5xx_evk/mcxn547/cpu0
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - CONFIG_SAMPLE_AUDIO_SOURCE_I2S=y
    harness: console
    harness_config:
      type: one_line
      regex:
        - "Capture started"

  sample.mp.audio_loopback.i2s_source.output:
    tags:
      - audio
      - samples
    platform_allow:
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - CONFIG_SAMPLE_AUDIO_SOURCE_I2S=y
      - CONFIG_SAMPLE_AUDIO_GAIN_PERCENT=200
    harness: pytest
    harness_config:
      pytest_root:
        - "pytest/test_pipeline.py"
