# Self-test configuration: uses Zephyr loopback (no TAP/root needed)
CONFIG_FLASH_SIMULATOR=y
CONFIG_DISK_DRIVER_FLASH=y

# Loopback-only networking - no TAP interface required
CONFIG_NET_LOOPBACK=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="127.0.0.1"

# Self-test client thread
CONFIG_SAMPLE_NET_STREAM_SELFTEST=y
CONFIG_SAMPLE_NET_STREAM_SELFTEST_ADDR="127.0.0.1"

# Larger heap for JPEG frame buffers
CONFIG_HEAP_MEM_POOL_SIZE=524288
CONFIG_MAIN_STACK_SIZE=8192
