sample:
  name: ESMF traffic light demo
common:
  tags:
    - smf
    - esmf
    - samples
  integration_platforms:
    - native_sim/native/64
  harness: console
  harness_config:
    type: multi_line
    ordered: false
    regex:
      - ".*ESMF Traffic Light Demo.*"
      - ".*state=RED.*"
      - ".*state=GREEN.*"
      - ".*state=YELLOW.*"
      - ".*EMERGENCY.*"
      - ".*state=FLASHING_RED.*"
tests:
  sample.smf.esmf_traffic_light: {}
