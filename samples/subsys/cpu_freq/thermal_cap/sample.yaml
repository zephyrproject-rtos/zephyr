sample:
  description: CPU frequency thermal cap sample
  name: CPU Freq Thermal Cap Sample
common:
  tags:
    - cpu_freq
    - sensors
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "^CPUFreq thermal cap sample$"
      - "^trip 0: [-]?[0-9]+\\.[0-9]{3} C -> cap .*, release at [-]?[0-9]+\\.[0-9]{3} C$"
      - "^trip 1: [-]?[0-9]+\\.[0-9]{3} C -> cap .*, release at [-]?[0-9]+\\.[0-9]{3} C$"
      - "^die temperature: [-]?[0-9]+\\.[0-9]{3} C, thermal cap: .*$"

tests:
  sample.cpu_freq.thermal_cap:
    platform_allow:
      - frdm_mcxn236
    integration_platforms:
      - frdm_mcxn236
