sample:
  description: CPU frequency side-channel defense policy sample
  name: CPU Freq Side-Channel Defense Policy
common:
  tags: cpu_freq
  harness: console
  harness_config:
    type: multi_line
    regex:
    - "^Starting timing side-channel attack\\.\\s*$"
    - "^found pos [0-9]+ try [A-Za-z0-9!@#\\$%\\^&\\*()\\-_=\\+]+ -> [0-9]+ cycles\\s*$"
    - "^Recovered so far: .+\\s*$"

tests:
  sample.cpu_freq_side_channel_defense:
    extra_args: EXTRA_CONF_FILE=defense_prj.conf
    integration_platforms:
    - frdm_mcxn236
    platform_allow:
    - frdm_mcxn236
