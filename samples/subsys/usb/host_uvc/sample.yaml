sample:
  name: USB host video sample
tests:
   sample.subsys.usb.host.uvc.camera:
    tags:
      - video
      - usb
      - shield
      - samples
    extra_args:
      - platform:rd_rw612_bga/rw612:SHIELD="usb_camera;lcd_par_s035_8080"
    extra_configs:
      - CONFIG_FPU=y
      - CONFIG_USB_HOST=y
    harness: console
    harness_config:
      fixture: fixture_camera
      type: multi_line
      ordered: true
      regex:
        - "Got frame \\d+"
        - "size: \\d+;"
        - "timestamp \\d+"
    platform_allow:
      - rd_rw612_bga/rw612
    depends_on:
      - video
      - usbh
    integration_platforms:
      - rd_rw612_bga/rw612
  sample.video.capture.shell:
    tags:
      - video
      - samples
      - shell
    extra_configs:
      - CONFIG_VIDEO_SHELL=y
      - CONFIG_FPU=y
      - CONFIG_DISPLAY=n
    extra_args:
      - platform:native_sim/native/64:SNIPPET="video-sw-generator"
    harness: console
    harness_config:
      type: one_line
      regex:
        - "Letting the user control the device with the video shell"
    platform_allow:
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
