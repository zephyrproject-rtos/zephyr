CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_USB_DEVICE_STACK_NEXT=y

CONFIG_STDOUT_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

CONFIG_USBD_FASTBOOTD=y
CONFIG_USBD_FASTBOOT_CLASS=y

CONFIG_HWINFO=y

CONFIG_SAMPLE_USBD_VID=0x2FE3
CONFIG_SAMPLE_USBD_PID=0x0009
CONFIG_SAMPLE_USBD_MANUFACTURER="Zephyr"
CONFIG_SAMPLE_USBD_PRODUCT="Zephyr Fastboot sample"
CONFIG_SAMPLE_USBD_SELF_POWERED=n
CONFIG_SAMPLE_USBD_MAX_POWER=250
