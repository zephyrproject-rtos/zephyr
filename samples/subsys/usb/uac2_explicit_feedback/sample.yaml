sample:
  name: USB Audio 2 asynchronous explicit feedback sample
tests:
  sample.subsys.usb.uac2_explicit_feedback:
    depends_on:
      - usbd
      - i2s
    tags:
      - usb
      - i2s
    extra_configs:
      - CONFIG_CLOCK_CONTROL_NRF=n
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
    harness: TBD

  sample.subsys.usb.uac2_explicit_feedback.legacy:
    depends_on:
      - usbd
      - i2s
    tags:
      - usb
      - i2s
    extra_configs:
      - CONFIG_CLOCK_CONTROL_NRF=y
      - CONFIG_DEPRECATION_TEST=y
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
    harness: TBD
