sample:
  name: USB support shell sample
tests:
  sample.usbd.shell:
    depends_on:
      - usbd
    tags:
      - usb
    extra_args:
      - FILE_SUFFIX=device
    integration_platforms:
      - nrf52840dk/nrf52840
      - nrf54h20dk/nrf54h20/cpuapp
      - frdm_k64f
      - mimxrt685_evk/mimxrt685s/cm33
      - mimxrt1060_evk/mimxrt1062/qspi
    harness: keyboard
  sample.usbh.shell:
    depends_on:
      - usbh
    tags:
      - usb
    extra_args:
      - FILE_SUFFIX=host
    platform_allow:
      - rd_rw612_bga
    build_only: true
  sample.usbh.shell.shield:
    depends_on:
      - usbd
    tags:
      - usb
      - shield
    extra_args:
      - FILE_SUFFIX=device_and_host
      - SHIELD="sparkfun_max3421e"
    platform_allow:
      - nrf52840dk/nrf52840
      - frdm_k64f
    build_only: true
  sample.usbh.shell.virtual:
    tags:
      - usb
    extra_args:
      - FILE_SUFFIX=device_and_host
      - EXTRA_DTC_OVERLAY_FILE="virtual.overlay"
    platform_allow:
      - native_sim/native/64
    build_only: true
