CONFIG_ARCH_POSIX_LIBFUZZER=y

CONFIG_NET_SOCKETS=y
# Enable network stack
CONFIG_NETWORKING=y
CONFIG_NET_LOG=y

# Enable IPv4
CONFIG_NET_IPV4=y

# Enable IPv6
CONFIG_NET_IPV6=y

# Enable TCP
CONFIG_NET_TCP=y
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_CUSTOM_TRANSPORT=y
CONFIG_MQTT_VERSION_5_0=y