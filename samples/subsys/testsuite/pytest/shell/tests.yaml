common:
  tags:
    - test_framework
    - pytest
    - shell
  platform_exclude: qemu_rx
  filter: CONFIG_SERIAL and not CONFIG_SMP and dt_chosen_enabled("zephyr,shell-uart")
  extra_configs:
    - arch:posix:CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y
    - platform:iotdk/arc_iot:CONFIG_ARC_IOT_CUSTOM_CPU_IDLE=y
  min_ram: 40
tests:
  sample.pytest.shell:
    harness: pytest
    integration_platforms:
      - native_sim
      - qemu_cortex_m3
  sample.pytest.shell.vt100_colors_off:
    harness: pytest
    integration_platforms:
      - native_sim
      - qemu_cortex_m3
    extra_configs:
      - CONFIG_SHELL_VT100_COLORS=n
  sample.harness.shell:
    harness: shell
    harness_config:
      shell_commands:
        - command: "kernel cycles"
          expected: "cycles: .* hw cycles"
        - command: "kernel version"
          expected: "Zephyr version .*"
    integration_platforms:
      - native_sim
      - qemu_cortex_m3
  sample.pytest.rtt:
    harness: pytest
    use_rtt: true
    integration_platforms:
      - nrf7002dk/nrf5340/cpuapp
    platform_allow:
      - nrf7002dk/nrf5340/cpuapp
    extra_args:
      - EXTRA_CONF_FILE=overlay-rtt-shell.conf
