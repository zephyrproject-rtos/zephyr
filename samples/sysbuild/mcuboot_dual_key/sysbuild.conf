# Sysbuild configuration for the dual-key MCUboot sample.
#
# Models a development bootloader that accepts images signed with either
# a local development key or a remote production public key. Both public
# keys are embedded into the bootloader; only the development private key
# lives on this workstation.
#
# The primary key inherits from the ED25519 Kconfig default (MCUboot's
# `root-ed25519.pem`), representing a local dev signing key. The second
# key points at a PUBLIC-ONLY PEM that ships in this sample's `keys/`
# directory. The relative path is resolved against the application
# source directory by sysbuild.

SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_MCUBOOT_MODE_OVERWRITE_ONLY=y
SB_CONFIG_BOOT_SIGNATURE_TYPE_ED25519=y
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE_2="keys/prod_pubkey.pem"
