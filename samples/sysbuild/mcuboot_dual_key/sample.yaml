sample:
  description: Sample demonstrating MCUboot with two accepted signing keys
  name: mcuboot dual key
tests:
  sample.sysbuild.mcuboot_dual_key:
    sysbuild: true
    platform_allow:
      - nrf52840dk/nrf52840
      - frdm_k64f
    integration_platforms:
      - nrf52840dk/nrf52840
    tags: mcuboot
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "Address of sample(.*)"
        - "Hello mcuboot dual key!(.*)"
