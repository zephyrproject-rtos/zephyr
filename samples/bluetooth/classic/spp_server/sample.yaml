sample:
  name: Bluetooth SPP Server
tests:
  sample.bluetooth.spp.server:
    harness: bluetooth
    platform_allow:
      - qemu_cortex_m3
      - qemu_x86
      - sf32lb52_devkit_lcd/sf32lb525uc6
    tags: bluetooth
    integration_platforms:
      - sf32lb52_devkit_lcd/sf32lb525uc6
  sample.bluetooth.spp.server.no_blobs:
    platform_allow:
      - sf32lb52_devkit_lcd/sf32lb525uc6
    tags:
      - bluetooth
    extra_args:
      - CONFIG_BUILD_ONLY_NO_BLOBS=y
    timeout: 600
    build_only: true
