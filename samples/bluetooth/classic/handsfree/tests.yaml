sample:
  name: Bluetooth Handsfree
tests:
  sample.bluetooth.handsfree:
    harness: bluetooth
    platform_allow:
      - qemu_cortex_m3
      - qemu_x86
    tags: bluetooth
    integration_platforms:
      - qemu_cortex_m3
  sample.bluetooth.handsfree.no_blobs:
    platform_allow:
      - mimxrt1170_evk@B/mimxrt1176/cm7
    tags:
      - bluetooth
      - i2s
      - codec
    extra_args:
      - CONFIG_BUILD_ONLY_NO_BLOBS=y
    build_only: true
  sample.bluetooth.a2dp.sink.nxp_m2_2el_wifi_bt.no_blobs:
    platform_allow:
      - mimxrt1060_evk@C/mimxrt1062/qspi
    tags:
      - bluetooth
      - i2s
      - codec
    extra_args:
      - CONFIG_BUILD_ONLY_NO_BLOBS=y
      - SHIELD=nxp_m2_2el_wifi_bt
    build_only: true
