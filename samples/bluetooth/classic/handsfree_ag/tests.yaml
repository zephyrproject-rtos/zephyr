sample:
  name: Bluetooth Handsfree Audio Gateway
tests:
  sample.bluetooth.handsfree.ag:
    harness: bluetooth
    platform_allow:
      - qemu_cortex_m3
      - qemu_x86
    tags: bluetooth
    integration_platforms:
      - qemu_cortex_m3
    extra_configs:
      - CONFIG_BT_HFP_AG_CALL_OUTGOING=y
  sample.bluetooth.handsfree.ag.no_blobs:
    platform_allow:
      - mimxrt1170_evk@B/mimxrt1176/cm7
    tags:
      - bluetooth
      - i2s
      - codec
    extra_args:
      - CONFIG_BUILD_ONLY_NO_BLOBS=y
    build_only: true
