CONFIG_SHELL=y
CONFIG_SHELL_REMOTE=y
CONFIG_SHELL_REMOTE_PPR=y
CONFIG_SHELL_REMOTE_FLPR=y
CONFIG_SHELL_REMOTE_RADIO=y
CONFIG_HEAP_MEM_POOL_SIZE=2048

CONFIG_LOG_RUNTIME_FILTERING=y
CONFIG_LOG_CMDS=y

CONFIG_SOC_NRF54H20_CPURAD_ENABLE=y

# kwork must start before ETR logging
CONFIG_KERNEL_INIT_PRIORITY_DEFAULT=0

# Allow receiving longer messages over IPC
CONFIG_PBUF_RX_READ_BUF_SIZE=256
