sample:
  name: Clock Skew Sample for nRF
tests:
  sample.boards.nrf.clock_skew.legacy:
    build_only: true
    platform_allow:
      - nrf52840dk/nrf52840
      - nrf52dk/nrf52832
      - nrf51dk/nrf51822
    tags: power
    integration_platforms:
      - nrf52840dk/nrf52840
    extra_configs:
      - CONFIG_CLOCK_CONTROL_NRF=y
      - CONFIG_DEPRECATION_TEST=y

  sample.boards.nrf.clock_skew:
    build_only: true
    platform_allow:
      - nrf52840dk/nrf52840
      - nrf52dk/nrf52832
      - nrf51dk/nrf51822
    tags: power
    integration_platforms:
      - nrf52840dk/nrf52840
    extra_configs:
      - CONFIG_CLOCK_CONTROL_NRF=n
