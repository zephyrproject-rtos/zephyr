description: Sample Driver

compatible: "sample_driver"

include:
  - name: base.yaml
    property-allowlist: ['reg', 'label']

properties:
    memory-region:
      type: phandle
      required: false
      description: phandle to the reserved memory child node

    linker-section:
      type: boolean
      required: false
      description: generate a section for this partition in the linker
