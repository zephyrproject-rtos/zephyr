sample:
  name: ESP32-C6 LP Core Timer Wakeup Sample
tests:
  sample.boards.espressif.ulp.lp_core.timer_wakeup:
    platform_allow:
      - esp32c6_devkitc/esp32c6/hpcore
    tags:
      - samples
    sysbuild: true
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "First boot, LP core will wake us every"
        - "HP core entering deep sleep"
        - "Woke up from LP core! Wake count:"
