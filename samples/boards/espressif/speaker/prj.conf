# ESP32-S3-BOX-3 Audio Demo Configuration

CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable shell for debugging
CONFIG_SHELL=y
CONFIG_SHELL_BACKENDS=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Audio Configuration
CONFIG_AUDIO=y
CONFIG_I2S=y
CONFIG_GPIO=y
CONFIG_I2C=y

# ES8311 Audio Codec Driver
CONFIG_AUDIO_CODEC=y
CONFIG_ES8311=y

# DMA Configuration (required for ESP32 I2S)
CONFIG_DMA=y

# Memory management for I2S and large audio data
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Math library for sine wave generation
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# Increase main stack size for audio processing
CONFIG_MAIN_STACK_SIZE=4096
