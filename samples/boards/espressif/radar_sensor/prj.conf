# AT581X Radar Sensor Sample Configuration

# Console and logging
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# I2C driver
CONFIG_I2C=y

# GPIO driver (used by sensor driver for trigger)
CONFIG_GPIO=y

# Sensor subsystem and AT581X driver
CONFIG_SENSOR=y
