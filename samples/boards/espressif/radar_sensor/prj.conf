# AT581X Radar Sensor Sample Configuration

# Console and logging
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# I2C driver
CONFIG_I2C=y

# GPIO driver for detection pin
CONFIG_GPIO=y

# Sensor subsystem and AT581X driver
CONFIG_SENSOR=y
CONFIG_AT581X=y

# Memory configuration
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096