CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_NETWORKING=y

CONFIG_IEEE802154=y
#CONFIG_NET_L2_IEEE802154=y
CONFIG_IEEE802154_RAW_MODE=y
CONFIG_NET_PKT_TIMESTAMP=y

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Default output profile (build-time selection)
#CONFIG_ESP154_SNIFFER_OUTPUT_MODE_BINARY=y
CONFIG_ESP154_SNIFFER_OUTPUT_MODE_ASCII=y

#CONFIG_NET_CAPTURE=y

# Keep buffers small but sufficient for sniffing
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_DATA_SIZE=256

# Optional: allow setting a default channel via standard net config symbols
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONFIG_IEEE802154_CHANNEL=20
