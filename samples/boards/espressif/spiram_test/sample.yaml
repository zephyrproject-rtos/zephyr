sample:
  description: Application to test memory allocation from SPIRAM
  name: spiram_test
common:
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "SPIRAM mem test pass"
      - "Internal mem test pass"
tests:
  sample.boards.espressif.spiram:
    platform_allow:
      - esp32_devkitc/esp32/procpu
      - esp32s2_devkitc
      - esp32s3_devkitc/esp32s3/procpu
      - esp32c5_devkitc/esp32c5/hpcore
      - esp32p4x_function_ev_board/esp32p4/hpcore
  sample.boards.espressif.spiram.octal_80m:
    platform_allow: esp32s3_devkitc/esp32s3/procpu
    extra_configs:
      - CONFIG_SPIRAM_SPEED_80M=y
      - CONFIG_SPIRAM_MODE_OCT=y
  sample.boards.espressif.spiram.octal_flash:
    platform_allow: esp32s3_devkitc/esp32s3/procpu
    build_only: true
    extra_configs:
      - CONFIG_SPIRAM_MODE_OCT=y
      - CONFIG_ESPTOOLPY_OCT_FLASH=y
