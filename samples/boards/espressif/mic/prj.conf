# ESP32-S3-BOX-3 Audio Demo Configuration

CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable shell for debugging
CONFIG_SHELL=y
CONFIG_SHELL_BACKENDS=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Audio subsystem
CONFIG_AUDIO=y
CONFIG_I2S=y
CONFIG_GPIO=y
CONFIG_I2C=y

# Both codec drivers
CONFIG_AUDIO_CODEC=y
CONFIG_ES8311=y
CONFIG_ES7210=y

# DMA is required for ESP32 I2S DMA transfers
CONFIG_DMA=y

# Memory pool
CONFIG_HEAP_MEM_POOL_SIZE=131072

# Math library for sine wave generation
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# Larger main stack: audio init + codec I2C sequences + LittleFS
CONFIG_MAIN_STACK_SIZE=16384

# ---------------------------------------------------------------
# LittleFS — for saving recorded audio to flash
# ---------------------------------------------------------------
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y