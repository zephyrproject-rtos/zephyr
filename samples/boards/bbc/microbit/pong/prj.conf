CONFIG_ISR_STACK_SIZE=1024
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_DEVICE_NAME="Zephyr Pong"
CONFIG_GPIO=y
CONFIG_DISPLAY=y
CONFIG_MICROBIT_DISPLAY=y
CONFIG_PWM=y

# This feature isn't needed as this sample is intended to be used
# between zephyr devices only.
CONFIG_BT_GATT_CACHING=n

# This sample only ever has a single connection and a low rate of HCI
# events, so the default number of HCI event buffers can be reduced to save
# RAM on the memory constrained micro:bit (nRF51, 16 KB RAM).
CONFIG_BT_BUF_EVT_RX_COUNT=4
