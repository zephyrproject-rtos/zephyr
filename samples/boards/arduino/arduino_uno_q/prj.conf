# SPDX-License-Identifier: Apache-2.0

# Enable LED Matrix Driver
CONFIG_LED_MATRIX=y
CONFIG_LED_MATRIX_UNO_Q=y

# Logging configuration
CONFIG_LOG=y
CONFIG_LED_MATRIX_UNO_Q_INIT_PRIORITY=90

# Kernel configuration
CONFIG_MAIN_STACK_SIZE=2048

# GPIO
CONFIG_GPIO=y
# Random number generation for sparkle test
CONFIG_TEST_RANDOM_GENERATOR=y

# Console backend — RTT (works over your existing SWD/TCP tunnel)
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y

# Optional: make logs more verbose
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_RTT=y