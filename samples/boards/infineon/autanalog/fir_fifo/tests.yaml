sample:
  name: AutAnalog ADC FIR+FIFO sample
common:
  tags:
    - adc
  filter: dt_node_has_prop("/zephyr,user","io-channels")

tests:
  sample.boards.infineon.autanalog_fir_fifo:
    platform_allow:
      - kit_pse84_eval/pse846gps2dbzc4a/m55
    integration_platforms:
      - kit_pse84_eval/pse846gps2dbzc4a/m55
    harness: console
    timeout: 10
    harness_config:
      type: multi_line
      regex:
        - "ADC reading\\[\\d+\\]:"
        - "- .+, channel \\d+: -?\\d+ = -?\\d+ mV"
        - "FIFO: watermark event \\(status=0x[0-9a-fA-F]+\\)"
        - "FIFO\\[0\\] GPIO: \\d+ words -.*"
        - "FIFO\\[1\\] MUX : \\d+ words -.*"
        - "FIFO\\[2\\] FIR0: \\d+ words -.*"
        - "FIFO\\[3\\] FIR1: \\d+ words -.*"
