CONFIG_POWEROFF=y
CONFIG_WUC=y
CONFIG_COUNTER=y
CONFIG_COUNTER_MCUX_LPTMR_ALARM=y

# The cycle counter is seeded on a cold boot and left untouched on a Deep Power
# Down wake, told apart from the CMC reset cause reported through hwinfo.
CONFIG_HWINFO=y
