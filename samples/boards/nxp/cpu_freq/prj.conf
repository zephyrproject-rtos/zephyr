CONFIG_LOG=n
CONFIG_PRINTK=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y

CONFIG_PM=y
CONFIG_GPIO=y
CONFIG_TICKLESS_KERNEL=y

# Use Cortex-M SysTick as the primary kernel timer. MCXN236 supports runtime
# system timer frequency updates when CPUFreq changes P-state, and LPTMR0 is
# used as the low-power companion counter for deeper idle states.
CONFIG_CORTEX_M_SYSTICK=y
CONFIG_SYSTEM_CLOCK_HW_CYCLES_PER_SEC_RUNTIME_UPDATE=y
CONFIG_PM_PREWAKEUP_CONV_MODE_CEIL=y
CONFIG_COUNTER=y
CONFIG_COUNTER_MCUX_LPTMR_ALARM=y

# The sample uses CPUFreq for manual P-state changes through cpu_freq_pstate_set().
# The CPUFreq subsystem currently requires a concrete policy at build time,
# so select on_demand but set its evaluation interval much longer than the sample
# run so it does not drive the experiment.
CONFIG_CPU_FREQ=y
CONFIG_CPU_FREQ_POLICY_ON_DEMAND=y
CONFIG_CPU_FREQ_INTERVAL_MS=600000
