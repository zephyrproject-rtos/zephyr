sample:
  name: NXP S32 MBOX sample
tests:
  sample.boards.nxp_s32.mbox:
    tags: mbox
    filter: dt_compat_enabled("vnd,mbox-consumer")
    platform_allow:
      - s32z2xxdc2/s32z270/rtu0
      - s32z2xxdc2/s32z270/rtu1
      - s32z2xxdc2@D/s32z270/rtu0
      - s32z2xxdc2@D/s32z270/rtu1
    harness: console
    harness_config:
      type: multi_line
      ordered: false
      regex:
        - "send .+ value: 0"
        - "received .+ value: 0"
        - "send .+ value: 1"
        - "received .+ value: 1"
        - "send .+ value: 41"
        - "received .+ value: 41"
        - "send .+ value: 42"
        - "received .+ value: 42"
        - "send .+ value: 98"
        - "received .+ value: 98"
        - "send .+ value: 99"
        - "received .+ value: 99"
