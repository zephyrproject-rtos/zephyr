CONFIG_PM=y
CONFIG_PRINTK=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y

# The deep-sleep-retention (STANDBY) entry/exit path runs on
# the idle thread stack and uses more stack than a plain WFI
# idle (context save/restore, clock reconfiguration). Enlarge
# the idle stack so it does not overflow.
CONFIG_IDLE_STACK_SIZE=2048
