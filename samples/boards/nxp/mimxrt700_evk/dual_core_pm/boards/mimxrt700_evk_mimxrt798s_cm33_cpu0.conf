CONFIG_SECOND_CORE_MCUX=y
CONFIG_SAMPLE_INCLUDE_REMOTE_DIR=y
CONFIG_COUNTER=y
CONFIG_MCUX_OS_TIMER_PM_POWERED_OFF=y

# Device PM: the app selects the IRTC wake timer as a wakeup source via
# pm_device_wakeup_enable() (the driver arms the SLEEPCON WUC only while that
# policy is enabled). System-managed device PM (default) suspends/resumes
# devices around DSR, so the LP_FLEXCOMM wrapper re-selects the LPUART and the
# console UART re-initializes on wakeup via their PM actions.
CONFIG_PM_DEVICE=y
