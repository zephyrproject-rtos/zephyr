# USB device stack (new / device_next)
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_UDC_DWC2=y

# Buffer-DMA mode. The driver defaults UDC_DWC2_DMA=y when the chip
# advertises Internal DMA in GHWCFG2.OtgArch (BCM2710 does, value=2).
# DMA mode enumerates end-to-end on this silicon with the BCM283x
# vendor quirks: the dwc2 DMA master sits behind the VideoCore bus,
# so DIEPDMA is programmed with the GPU bus address (arm_phys |
# 0xC0000000) by the .dma_addr quirk. Set =n to fall back to
# Slave/Completer mode (CPU fills the TX FIFO; also works).
CONFIG_UDC_DWC2_DMA=y

# DMA buffer cache coherency: place the UDC buffer pool in the arm64
# MMU's nocache section (MT_NORMAL_NC). DMA writes by the dwc2 AHB
# master are then immediately visible to the CPU without per-transfer
# cache invalidate / flush. Without this, SETUP packets DMA'd to a
# cached buffer read as stale (all zeros from net_buf init) and the
# host STALLs every GET_DESCRIPTOR.
CONFIG_NOCACHE_MEMORY=y
CONFIG_UDC_BUF_FORCE_NOCACHE=y

# CDC ACM class — turnkey init at SYS_INIT (no manual usbd_init/enable
# required; the class brings the stack up by itself). UART_LINE_CTRL
# exposes DTR so the sample can wait for the host to open the port.
CONFIG_SERIAL=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_UART_LINE_CTRL=y

# VideoCore mailbox + firmware property-tag interface (upstream
# rpi_fw + mbox_brcm_bcm2711). Required by the DWC2 vendor pre_enable
# hook to power on the USB analog PHY island -- without it VC leaves
# the island off and D+/D- aren't driven even though the controller's
# MMIO is accessible. RASPBERRYPI_FIRMWARE selects MBOX; MBOX_BCM2711
# is default-y once the mbox0 node is enabled (bcm2710.dtsi). The USB
# island's SET_POWER_STATE takes ~530 ms on this silicon, so raise the
# firmware transfer timeout well above rpi_fw's 100 ms default.
CONFIG_RASPBERRYPI_FIRMWARE=y
CONFIG_RASPBERRYPI_FIRMWARE_TRANSFER_TIMEOUT_MS=1000

# No HWINFO backend exists in-tree for BCM283x, so hwinfo_get_device_id()
# returns -ENOSYS. The CDC ACM turnkey serial-number string descriptor is
# gated on CONFIG_HWINFO (subsys/usb/device_next/app/cdc_acm_serial.c), so
# with HWINFO enabled the host's GET_DESCRIPTOR(STRING,3 iSerialNumber)
# would STALL EP0. Disable HWINFO so iSerialNumber=0 and the host never
# requests the serial string -- avoids a (cosmetic) EP0 STALL during
# enumeration. Add a real HWINFO_BCM2835 backend to advertise a serial.
CONFIG_HWINFO=n

# USB stack thread stacks. Upstream defaults (USBD=1024, UDC_DWC2=512)
# are tight for AArch64; the DIN-event call chain (DWC2 ISR ->
# usbd_thread -> usbd_ch9 -> CDC ACM class -> LOG_INF) blows past
# them and the resulting overflow scribbles a function-pointer-shaped
# value onto the saved LR slot, so RET dispatches into .rodata =
# PXN fault. Same family as memory reference_zephyr_net_thread_stack_
# sizes (brcmfmac TCP workq bump). 4 KiB is generous but cheap in
# our 256 MiB RAM budget.
CONFIG_USBD_THREAD_STACK_SIZE=4096
CONFIG_UDC_DWC2_STACK_SIZE=4096

# Stack sentinel: writes a magic value at the bottom of every
# thread's stack and ASSERTs if it's clobbered. Catches overflow
# at the moment of the overwrite (or shortly after, at the next
# thread switch / check point), not 30 frames later when a corrupted
# pointer dispatches into garbage. Memory:
# feedback_zephyr_stack_sentinel_for_corruption_hunts.
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y

# Console + LOG. Keep INF on the CDC class so we see "CDC ACM device
# ready" at boot. Force the UDC driver to WRN (its INF default fires
# "Prepare RX" several times per SETUP during enumeration -- not
# useful in steady state). Enable DBG locally if regressing.
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_USBD_CDC_ACM_LOG_LEVEL_INF=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y
