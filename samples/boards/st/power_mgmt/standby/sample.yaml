sample:
  name: STM32 GPIO Standby Power Management
tests:
  sample.boards.stm32.power_mgmt.standby:
    platform_allow:
      - nucleo_l476rg
      - disco_l475_iot1
    tags:
      - power
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "Reset cause: Reset pin"
        - "Device ready: .*"
        - "Press and hold the user button to enter Standby Mode"
    filter: dt_compat_enabled("zephyr,power-state")
    extra_args: "CONFIG_DEBUG=y"
