sample:
  name: UART driver sample
tests:
  sample.boards.stm32.uart.zero_latency_interrupt:
    integration_platforms:
      - stm32f3_disco
    tags:
      - serial
      - uart
    filter: dt_nodelabel_prop_enabled("usart2", "zephyr,zli") and CONFIG_SOC_FAMILY_STM32
    harness: console
    harness_config:
      type: one_line
      regex:
        - "ZLI enabled"