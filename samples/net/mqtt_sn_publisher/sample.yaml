sample:
  description: MQTT-SN publisher sample application
  name: MQTT-SN publisher
common:
  harness: net
  tags:
    - net
    - mqtt
tests:
  sample.net.mqtt_publisher.sn:
    platform_allow:
      - frdm_k64f
      - qemu_x86
      - pinnacle_100_dvk
      - mg100
      - native_sim/native/64
    integration_platforms:
      - qemu_x86
  sample.net.mqtt_publisher.sn.wifi.nrf70dk:
    extra_args:
      - SNIPPET=wifi-ipv4
      - CONFIG_BUILD_ONLY_NO_BLOBS=y
    platform_allow:
      - nrf7002dk/nrf5340/cpuapp
