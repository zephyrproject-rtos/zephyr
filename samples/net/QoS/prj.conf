# Networking config
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
# CONFIG_NET_TCP=y
# CONFIG_NET_SOCKETS=y
# CONFIG_NET_IPV4_MAPPING_TO_IPV6=y
# CONFIG_NET_MAX_CONN=5
# CONFIG_NET_SOCKETS_SERVICE=y

# Network driver config
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_ENTROPY_GENERATOR=y

# # # Network address config
# # CONFIG_NET_CONFIG_SETTINGS=y
# # CONFIG_NET_CONFIG_NEED_IPV4=y
# # CONFIG_NET_CONFIG_NEED_IPV6=y
# # CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
# # CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"
# # CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::1"
# # CONFIG_NET_CONFIG_PEER_IPV6_ADDR="2001:db8::2"

# Network buffers
# CONFIG_NET_PKT_RX_COUNT=10
# CONFIG_NET_BUF_RX_COUNT=20
# CONFIG_NET_PKT_RX_COUNT=20
# CONFIG_NET_BUF_RX_COUNT=320
CONFIG_NET_PKT_RX_COUNT=40
CONFIG_NET_BUF_RX_COUNT=640
CONFIG_NET_PKT_TX_COUNT=9
CONFIG_NET_BUF_TX_COUNT=160
CONFIG_NET_TC_RX_SKIP_FOR_HIGH_PRIO=y
CONFIG_NET_TC_TX_SKIP_FOR_HIGH_PRIO=y
CONFIG_NET_RX_DEFAULT_PRIORITY=7
# CONFIG_NET_CONTEXT_NET_PKT_POOL=y

# CONFIG_NET_L2_DUMMY=y
# CONFIG_NET_L2_ETHERNET=n
# CONFIG_NET_LOOPBACK=y
# CONFIG_NET_DRIVERS=y

CONFIG_NET_TEST=y
CONFIG_NET_ARP=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_BUF=y
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=3
CONFIG_NET_IF_MAX_IPV4_COUNT=2

CONFIG_LOG=y
CONFIG_NET_LOG=y
# CONFIG_NET_CORE_LOG_LEVEL_DBG=y
# CONFIG_NET_PKT_LOG_LEVEL_DBG=y
# CONFIG_NET_L2_ETHERNET_LOG_LEVEL_DBG=y
CONFIG_LOG_THREAD_ID_PREFIX=y
CONFIG_NET_TC_THREAD_PRIO_CUSTOM=y
CONFIG_NET_TC_TX_THREAD_BASE_PRIO=15
CONFIG_NET_TC_RX_THREAD_BASE_PRIO=14
# CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y

CONFIG_NET_TC_THREAD_PREEMPTIVE=y
CONFIG_NET_TC_RX_COUNT=8
CONFIG_NET_TC_TX_COUNT=8
CONFIG_THREAD_NAME=y
# CONFIG_NO_OPTIMIZATIONS=y
CONFIG_NET_PKT_LOG_LEVEL_OFF=y
CONFIG_NET_TC_LOG_LEVEL_DBG=y
