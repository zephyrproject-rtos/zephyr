# RSA-2048 key generation runs on the shell thread and needs significant stack
CONFIG_SHELL_STACK_SIZE=8192

# STM32F767 has 256KB flash sectors in single-bank mode which exceed
# NVS's UINT16_MAX sector size limit. Use ZMS instead.
CONFIG_SETTINGS_NVS=n
CONFIG_NVS=n
CONFIG_NVS_INIT_BAD_MEMORY_REGION=n
CONFIG_ZMS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_SETTINGS_ZMS_FORCE_MOUNT=y
