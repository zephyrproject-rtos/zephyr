# Kernel
CONFIG_INIT_STACKS=y

# Random generator
CONFIG_TEST_RANDOM_GENERATOR=y

# Networking
CONFIG_NETWORKING=y

# Hostname
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="tsn-switch"

# IP
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_TC_TX_COUNT=8
CONFIG_NET_TC_RX_COUNT=8
CONFIG_NET_IF_MAX_IPV4_COUNT=6
CONFIG_NET_IF_MAX_IPV6_COUNT=6
CONFIG_NET_PKT_RX_COUNT=64
CONFIG_NET_PKT_TX_COUNT=64
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128
CONFIG_NET_LOG=y
CONFIG_NET_SHELL=y

# Config
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::1"
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"

# DSA support
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_DSA=y
CONFIG_NET_DSA_LOG_LEVEL_INF=y

# Bridge
CONFIG_NET_ETHERNET_BRIDGE=y
CONFIG_NET_ETHERNET_BRIDGE_ETH_INTERFACE_COUNT=6
CONFIG_NET_ETHERNET_BRIDGE_FDB=y
CONFIG_NET_ETHERNET_BRIDGE_SHELL=y

# gPTP
CONFIG_NET_GPTP=y
CONFIG_NET_GPTP_STATISTICS=y
CONFIG_NET_GPTP_GM_CAPABLE=y
# gPTP bridge default priority1 per standard
CONFIG_NET_GPTP_BMCA_PRIORITY1=246
CONFIG_NET_GPTP_NUM_PORTS=6

# QBV
CONFIG_NET_QBV=y
