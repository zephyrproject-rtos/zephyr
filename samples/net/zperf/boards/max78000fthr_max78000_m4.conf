CONFIG_NET_PKT_RX_COUNT=14
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=12
CONFIG_NET_BUF_DATA_SIZE=1515
CONFIG_NET_BUF_FIXED_DATA_SIZE=y

CONFIG_NET_IPV6=n
CONFIG_NET_CONFIG_NEED_IPV6=n

CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=14140

# Fragmentation only properly working on max78000fth at <= 8.5 Mbits/s,
# because of the limited RAM availability; disabled by default

# CONFIG_NET_IPV4_FRAGMENT=y
# CONFIG_NET_IPV4_FRAGMENT_MAX_COUNT=8
# CONFIG_NET_IPV4_FRAGMENT_MAX_PKT=2
# CONFIG_NET_IPV4_FRAGMENT_TIMEOUT=2

CONFIG_ETHERNET_LOG_LEVEL_WRN=y
