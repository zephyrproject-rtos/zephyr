# WiFi driver + shell (connect via: wifi connect -s <SSID> -p <PSK> -k 1)
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_SHELL=y

# DHCP: override prj.conf static-IP default; auto-restart on STA connect
CONFIG_NET_DHCPV4=y
CONFIG_WIFI_STA_AUTO_DHCPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR=""

# M55 stack sizes
CONFIG_SHELL_STACK_SIZE=6144
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4608
CONFIG_NET_TCP_WORKQ_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=1024

# Packet/buffer sizing: 1514-byte bufs fit one Ethernet frame; reduce counts
# to stay within M55 heap budget.
CONFIG_NET_BUF_DATA_SIZE=1514
CONFIG_NET_ZPERF_MAX_PACKET_SIZE=1514
CONFIG_NET_PKT_RX_COUNT=20
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_PKT_TX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20

# TCP window sizing for WiFi throughput
CONFIG_NET_TCP_MAX_SEND_WINDOW_SIZE=32120
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=36500

# Socket service thread must be preemptible so WHD RX thread can run
CONFIG_NET_SOCKETS_SERVICE_THREAD_PRIO=15

# WiFi + general stats for monitoring
CONFIG_NET_STATISTICS_WIFI=y
CONFIG_NET_STATISTICS_USER_API=y
