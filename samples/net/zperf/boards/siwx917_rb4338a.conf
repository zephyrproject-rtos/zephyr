# Use the socket service thread low-priority and preemptive.
# The default (-1) is cooperative and can starve lower-layer Wi-Fi/network
# processing under heavy RX load, which reduces zperf TCP/UDP throughput.
CONFIG_NET_SOCKETS_SERVICE_THREAD_PRIO=15

#shell stack size
CONFIG_SHELL_STACK_SIZE=3072

# Wi-Fi
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_WIFI_SILABS_SIWX91X_MFP=n

# Buffer / TCP tuning
CONFIG_NET_BUF_DATA_SIZE=1514
CONFIG_NET_TCP_MAX_SEND_WINDOW_SIZE=32120
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=36500
CONFIG_NET_PKT_RX_COUNT=30
CONFIG_NET_BUF_RX_COUNT=30
CONFIG_NET_PKT_TX_COUNT=30
CONFIG_NET_BUF_TX_COUNT=30
CONFIG_NET_BUF_POOL_USAGE=y
CONFIG_NET_ZPERF_MAX_PACKET_SIZE=1514

CONFIG_SILABS_SIWX91X_SLOW_FLASH_DATA=y
# `CONFIG_SILABS_SIWX91X_SLOW_FLASH_DATA` improves SiWx91x performance by using
# `-mslow-flash-data`, but with the current Arm GCC toolchain that is not fully
# compatible with thread-local storage accesses. Hence, disable it.
CONFIG_THREAD_LOCAL_STORAGE=n

# Performance (logging / asserts off)
CONFIG_ASSERT=n
CONFIG_LOG=n
CONFIG_NET_LOG=n
CONFIG_SRAM_SW_ISR_TABLE=y
CONFIG_SRAM_VECTOR_TABLE=y
