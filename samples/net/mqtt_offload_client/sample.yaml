sample:
  description: mqtt-offload-client sample application
  name: mqtt-offload-client

common:
  harness: net
  tags:
    - net
    - mqtt
    - modem
    - hl78xx
  filter: dt_alias_exists("modem")
  extra_conf_files:
    - prj.conf
    - overlay-extra.conf
    - overlay-swir_hl78xx-verbose-logging.conf
    - overlay-swir_hl78xx_ev_kit.conf
    - overlay-swir_hl78xx-tls.conf
  extra_args:
    - SHIELD=swir_hl78xx_ev_kit
    - USE_DUMMY_CREDS=1

tests:
  sample.net.mqtt_offload:
    platform_allow:
      - nucleo_u575zi_q
    integration_platforms:
      - nucleo_u575zi_q
    build_only: true
