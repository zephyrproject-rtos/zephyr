# Generic networking options
CONFIG_NETWORKING=y
CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y

CONFIG_NET_SOCKETS=y
CONFIG_ZVFS_POLL_MAX=4
CONFIG_POSIX_API=y

CONFIG_COAP=y

# Kernel options
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Logging
CONFIG_PRINTK=y
CONFIG_NET_LOG=y

# Network Shell
CONFIG_NET_SHELL=y

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV6=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::1"
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"

# Where should the application send packets
CONFIG_NET_SAMPLE_COAP_CLIENT_PEER="[2001:db8::2]:4242"
#CONFIG_NET_SAMPLE_COAP_CLIENT_PEER="192.0.2.2:4242"

CONFIG_NET_SAMPLE_COAP_CLIENT_REPLY_TIMEOUT_MS=15000
CONFIG_NET_SAMPLE_COAP_CLIENT_BLOCKWISE_MAX_RETRIES=3

CONFIG_HEAP_MEM_POOL_SIZE=2048
