# Generic networking options
CONFIG_NETWORKING=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=n
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_POSIX_SYSCONF_IMPL_MACRO=y
CONFIG_ZVFS_OPEN_MAX=14
CONFIG_NET_CONNECTION_MANAGER=y

# Kernel options
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_ISR_STACK_SIZE=1024
CONFIG_MAIN_STACK_SIZE=3584
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_SHELL_STACK_SIZE=2048

CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_INIT_STACKS=y

# Network buffers
CONFIG_NET_PKT_RX_COUNT=6
CONFIG_NET_PKT_TX_COUNT=20
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_CONTEXT_NET_PKT_POOL=y

# IP address options
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_MAX_CONN=8

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_ARGC_MAX=5
CONFIG_SENSOR_SHELL=n
CONFIG_SHELL_HISTORY_BUFFER=128

# Network application options and configuration
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
# When more than one board is used - adjust the IPv{46}
# addresses - e.g. 3.3 -> 3.5
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.3.3"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.168.3.1"

CONFIG_NET_CONFIG_NEED_IPV6=y
CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::11"
CONFIG_NET_CONFIG_PEER_IPV6_ADDR="2001:db8::1"

# IP address options
CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=3
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=4
# For bigger networks aka stacked version (default is 8)
CONFIG_NET_IPV6_MAX_NEIGHBORS=16

# How many client can connect to echo-server simultaneously
CONFIG_NET_SAMPLE_NUM_HANDLERS=1

# LAN865x T1S driver specific
CONFIG_NET_L2_ETHERNET=y
# CONFIG_NET_PROMISCUOUS_MODE=y
CONFIG_ETH_LAN865X=y
CONFIG_NET_BUF_DATA_SIZE=128

# Log
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096

# Debugging
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_DEBUG_THREAD_INFO=y

CONFIG_NET_STATISTICS=y
CONFIG_NET_SHELL=y

CONFIG_NET_DEBUG_NET_PKT_ALLOC=y
CONFIG_NET_BUF_POOL_USAGE=y
CONFIG_NET_ICMPV4_LOG_LEVEL_INF=y
CONFIG_NET_ICMPV6_LOG_LEVEL_INF=y
#CONFIG_NET_IPV6_LOG_LEVEL_DBG=y

# Use UDPPERF stress test program
# As it is an external Zephyr 'module'
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y

CONFIG_NET_LOG=y
#CONFIG_NET_UDP_LOG_LEVEL_DBG=y
#CONFIG_NET_IPV4_LOG_LEVEL_DBG=y
#CONFIG_ETHERNET_LOG_LEVEL_DBG=y
#CONFIG_NET_CORE_LOG_LEVEL_DBG=y

CONFIG_SHELL_BACKEND_SERIAL_LOG_LEVEL_DBG=y
CONFIG_SHELL_AUTOSTART=y

# The attempt to fix the initialization routines
# call sequence - default values of):
# CONFIG_ETH_INIT_PRIORITY - 80
# CONFIG_MDIO_INIT_PRIORITY - 60
# CONFIG_PHY_INIT_PRIORITY - 70
# are causing dependency error.
# The 'solution' is to lower the default ETH
# priority to allow first PHY initialization, then
# MDIO and on the very end ETH
CONFIG_ETH_INIT_PRIORITY=59
