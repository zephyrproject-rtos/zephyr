CONFIG_NET_L2_ETHERNET=y

# Memory optimization - 96KB RAM
CONFIG_MAIN_STACK_SIZE=768
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=768
CONFIG_IDLE_STACK_SIZE=256
CONFIG_ISR_STACK_SIZE=512
CONFIG_NET_PKT_RX_COUNT=2
CONFIG_NET_PKT_TX_COUNT=2
CONFIG_NET_BUF_RX_COUNT=4
CONFIG_NET_BUF_TX_COUNT=4
CONFIG_NET_MAX_CONTEXTS=2
CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=1
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=1
CONFIG_HEAP_MEM_POOL_SIZE=1024
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_ETH_ADIN1140_RX_THREAD_STACK_SIZE=768

# Enable logging for debug
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_NET_LOG=n
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=10
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048

# Disable heavy features
CONFIG_NET_SHELL=y
CONFIG_SHELL=y
CONFIG_NET_STATISTICS=n
CONFIG_LOG_BACKEND_SHOW_COLOR=y
CONFIG_LOG_BACKEND_FORMAT_TIMESTAMP=n

# Use only IPv4 to save memory
CONFIG_NET_IPV6=n
CONFIG_NET_CONFIG_NEED_IPV6=n
