CONFIG_POSIX_API=y

# General config
CONFIG_LOG=y
CONFIG_GPIO=y
CONFIG_REBOOT=y
CONFIG_TICKLESS_KERNEL=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETLINE=y
CONFIG_NEWLIB_LIBC=y
CONFIG_INIT_STACKS=y

# Networking config
CONFIG_NETWORKING=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_IPV4=y
CONFIG_NET_LOG=y
CONFIG_NET_TCP=y

# Latmon config
CONFIG_NET_LATMON=y
CONFIG_LATMON_LOG_LEVEL_DBG=y

# Heap for Latmon
CONFIG_HEAP_MEM_POOL_SIZE=8192
