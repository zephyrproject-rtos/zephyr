# CRITICAL: Fix BT RX workqueue stack overflow
CONFIG_BT_RX_STACK_SIZE=4096

# Increase L2CAP transmit buffer count significantly for A2DP streaming
CONFIG_BT_L2CAP_TX_BUF_COUNT=40

# Increase heap for dynamic allocations
CONFIG_HEAP_MEM_POOL_SIZE=40960

# Increase system workqueue stack for A2DP
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=5120

# Allow more Bluetooth connections
CONFIG_BT_MAX_CONN=2

# Fix ACL context mismatch warning (minimum is 20)
CONFIG_BT_CONN_TX_MAX=20

# Increase HCI command buffer pool
CONFIG_BT_BUF_CMD_TX_COUNT=10

# Increase event buffer count to handle bursts
CONFIG_BT_BUF_EVT_RX_COUNT=30
CONFIG_BT_BUF_EVT_DISCARDABLE_COUNT=15

# Increase L2CAP segments for large packets
CONFIG_BT_L2CAP_TX_MTU=1024

# Increase net buffer counts for BT
CONFIG_BT_ATT_TX_COUNT=8
