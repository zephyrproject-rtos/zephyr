# RT1060 EVKC — IW612/IW610 M.2 OpenThread Border Router
# Overrides overlay-ot-rcp-host-wifi-nxp.conf defaults (designed for RW610)

# IW612/IW610 M.2 — disable RW610 specific options
CONFIG_NXP_RW610=n
CONFIG_NXP_RF_IMU=n
CONFIG_NXP_FW_LOADER=n
CONFIG_NXP_MONOLITHIC_WIFI=n
CONFIG_NXP_WIFI_AUTO_INIT=y
CONFIG_NXP_WIFI_IND_DNLD=n

# Disable conflicting options
CONFIG_IEEE802154=n
CONFIG_STACK_SENTINEL=n
CONFIG_DISPLAY=n
CONFIG_LVGL=n
CONFIG_OPENTHREAD_INTERFACE_EARLY_UP=n
CONFIG_SPI_INIT_PRIORITY=50

# Shell
CONFIG_SHELL_CMD_BUFF_SIZE=256
CONFIG_SHELL_PRINTF_BUFF_SIZE=512
CONFIG_SPI_SHELL=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_BOOT_BANNER=y
CONFIG_EARLY_CONSOLE=y
CONFIG_NET_LOG=y
CONFIG_OPENTHREAD_DEBUG=y
CONFIG_OPENTHREAD_LOG_LEVEL_INFO=y
CONFIG_BT_HCI_DRIVER_LOG_LEVEL_INF=y
CONFIG_BT_LOG_LEVEL_INF=y
CONFIG_WIFI_LOG_LEVEL_INF=y
CONFIG_SPI_LOG_LEVEL_INF=y
CONFIG_HDLC_RCP_IF_DRIVER_LOG_LEVEL_INF=y

# RT1060 has 32MB SDRAM — increase heap and net buffers for OTBR RCP architecture
# RCP (IW612 via SPI) requires more buffers than integrated SoC (RW612)
# due to multi-copy path: net_pkt → Spinel serialize → SPI TX → SPI RX → net_pkt
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128
CONFIG_NET_PKT_RX_COUNT=48
CONFIG_NET_PKT_TX_COUNT=48
