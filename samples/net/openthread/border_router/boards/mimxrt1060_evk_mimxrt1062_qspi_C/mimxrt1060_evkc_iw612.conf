# RT1060 EVKC + IW612 (Murata 2EL)
# Loaded last — overrides overlay-ot-rcp-host-wifi-nxp.conf (RW610 defaults)

CONFIG_WIFI_NXP=y
CONFIG_NXP_IW61X=y
CONFIG_BT_NXP_NW612=y
CONFIG_NXP_IW61X_REGION_WW=y

CONFIG_NXP_RF_IMU=n
CONFIG_NXP_FW_LOADER=n

# Network diagnostics
CONFIG_OPENTHREAD_NET_DIAG_VENDOR_NAME="NXP"
CONFIG_OPENTHREAD_NET_DIAG_VENDOR_MODEL="RT1060+IW612"
CONFIG_OPENTHREAD_NET_DIAG_VENDOR_SW_VERSION="v1.0.0"
