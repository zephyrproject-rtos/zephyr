# Board-specific config for xg24_rb4187c (OpenThread shell)
# Extra stack and ensure console is available early.
# Disable NVS and use RAM-only settings to avoid flash/NVS init hangs on this board.
#
# Power manager: required by RAIL prebuilt (librail_efr32xg24) for
# sl_power_manager_subscribe_em_transition_event and related symbols.
CONFIG_PM=y
#
# If OpenThread state is "disabled" and "ot thread start" returns Error 13 (InvalidState),
# bring the net iface up first so openthread_run() loads the dataset: "net iface up 1"
# (see boards/xg24_rb4187c_README.md).
#
# Stack sizes: the full init chain (net_init -> net_if_up -> openthread_run ->
# ThreadNetif::Up) runs on the main thread. Fault at 0x0801FC0A (ThreadNetif::Up) is often
# stack overflow or bad state; use large stacks so init completes without overflow.

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=16384

# OpenThread: generous stacks for OT thread and radio workqueue (skeleton driver + C++).
CONFIG_OPENTHREAD_THREAD_STACK_SIZE=6144
CONFIG_OPENTHREAD_RADIO_WORKQUEUE_STACK_SIZE=2048

CONFIG_OPENTHREAD_THREAD_VERSION_1_4=y
CONFIG_OPENTHREAD_PING_SENDER=y

# 802.15.4 driver log: use 3 (INFO) to see init success/failure if "net iface up" returns -6.
CONFIG_IEEE802154_SILABS_EFR32_DRIVER_LOG_LEVEL=3

# OpenThread stack logging: enable and set to INFO to verify network operations (attach, rx/tx, etc.).
# Use CONFIG_OPENTHREAD_LOG_LEVEL_DEBG=y (and drop _INFO) for maximum verbosity.
CONFIG_OPENTHREAD_DEBUG=y
CONFIG_OPENTHREAD_LOG_LEVEL_INFO=y
CONFIG_LOG=y

# Ensure console is ready as early as possible
CONFIG_BOOT_BANNER=y
CONFIG_EARLY_CONSOLE=y

# OpenThread: use RAM for OT state (no persistent dataset in flash).
CONFIG_OPENTHREAD_SETTINGS_RAM=y

# Secure storage ITS (required when using PSA crypto) needs a store implementation.
# Enable settings + NVS so ITS store links. If console fails to come up, try
# CONFIG_NVS=n and CONFIG_SETTINGS_NONE=y and use a custom ITS store or ZMS instead.
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_SECURE_STORAGE_ITS_STORE_IMPLEMENTATION_SETTINGS=y
