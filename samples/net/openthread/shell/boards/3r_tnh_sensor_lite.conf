# BL704L has only 80 KB RAM; trim the OpenThread shell sample to fit.

# Logging consumes several KB of RAM (buffers + dedicated thread stack).
CONFIG_LOG=n
CONFIG_NET_LOG=n

# Drop the networking shell; keep only the OpenThread shell for the test plan.
CONFIG_NET_SHELL=n

CONFIG_SHELL_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=2048

# OpenThread message buffers dominate RAM (128 B each); cut the pool.
CONFIG_OPENTHREAD_NUM_MESSAGE_BUFFERS=48

# The default DEVICE_ID_HASH secure-storage key provider relies on
# hwinfo_get_device_eui64()/uuid(), which BL704L doesn't provide, so the AEAD
# key can't be derived and the network key fails to persist (ot networkkey reads
# zero), blocking Thread attach. Use the entry-UID-hash provider instead.
CONFIG_SECURE_STORAGE_ITS_TRANSFORM_AEAD_KEY_PROVIDER_ENTRY_UID_HASH=y

# The mbedTLS AES round tables default to RAM (8 KB); keep them in flash.
CONFIG_MBEDTLS_AES_ROM_TABLES=y
