# The crypto-heavy "ot dataset set active" key import runs in the shell thread;
# a 2 KB stack overflows into the secure-storage AES-GCM buffers and corrupts
# the stored network key. Match the BL704L (3r) board's working stack size.
CONFIG_SHELL_STACK_SIZE=4096

# BL702 image-0 slot is 384 KB; trim to fit the OpenThread FTD shell.
CONFIG_LOG=n
CONFIG_NET_LOG=n
CONFIG_NET_SHELL=n

# Console/shell run on UART0; drop the board-default USB CDC-ACM device stack
# to keep the image within the 384 KB code partition.
CONFIG_USBD_CDC_ACM_CLASS=n
CONFIG_USB_DEVICE_STACK_NEXT=n

# Enforce that the linked image stays within the image-0 (slot0) partition so
# it cannot overlap the storage partition used by secure storage / settings.
CONFIG_USE_DT_CODE_PARTITION=y

# Drop shell help strings to keep the image within the 384 KB code partition.
CONFIG_SHELL_HELP=n
