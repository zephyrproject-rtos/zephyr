common:
  harness: net
  tags:
    - net
    - openthread
  depends_on: openthread
sample:
  description: Test Thread and IEEE 802.15.4 using the OpenThread shell
  name: OpenThread Shell
tests:
  sample.net.openthread.shell:
    build_only: true
    platform_allow:
      - nrf52840dk/nrf52840
      - nrf52840dongle/nrf52840
    integration_platforms:
      - nrf52840dk/nrf52840
  sample.net.openthread.shell.rw612_openthread_rcp_host:
    build_only: true
    extra_args:
      # Disabling monolithic since CI environment doesn't use blobs
      - CONFIG_NXP_MONOLITHIC_NBU=n
    platform_allow:
      - frdm_rw612
      - rd_rw612_bga
  sample.net.openthread.shell.mcxw_openthread_host:
    build_only: true
    extra_args:
      - EXTRA_CONF_FILE="prj-ot-host.conf"
    platform_allow:
      - frdm_mcxw71
      - frdm_mcxw72
      - mcxw72_evk
      - frdm_mcxw70
  sample.net.openthread.shell.esp:
    build_only: true
    extra_args:
      - CONFIG_BUILD_ONLY_NO_BLOBS=y
    platform_allow:
      - esp32c6_devkitc/esp32c6/hpcore
      - esp32h2_devkitm
  sample.net.openthread.shell.xg24:
    build_only: true
    extra_args:
      - CONFIG_BUILD_ONLY_NO_BLOBS=y
    platform_allow:
      - xg24_rb4186c
      - xg24_rb4187c
  sample.net.openthread.shell.bflb:
    build_only: true
    extra_args:
      - CONFIG_BUILD_ONLY_NO_BLOBS=y
    platform_allow:
      - bl618g0
      - ai_m61_32s_kit
      - ai_m62_12f_kit
      - aipi_eyes_s2
      - maix_m0s_dock
      - m0sense
      - dt_xt_zb1_devkit
      - bl706_iot_dvk
      - 3r_tnh_sensor_lite
