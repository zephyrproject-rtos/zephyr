# Configuration file specific for NXP's MCXW platform

# Enable OpenThread as standalone module
CONFIG_NETWORKING=n
CONFIG_NET_L2_OPENTHREAD=n
CONFIG_OPENTHREAD=y
CONFIG_OPENTHREAD_SOURCES=y

# Module auto-init (replaces L2 init path)
CONFIG_OPENTHREAD_SYS_INIT=y

# Vendor specific radio implementation
CONFIG_OPENTHREAD_RADIO_VENDOR_IMPLEMENTATION=y
CONFIG_OPENTHREAD_RADIO_VENDOR_IMPLEMENTATION_FILE="nxp_mcxw_radio.c"
CONFIG_COUNTER=y
