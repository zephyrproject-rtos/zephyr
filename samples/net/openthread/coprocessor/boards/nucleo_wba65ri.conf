CONFIG_UART_ASYNC_API=y
CONFIG_OPENTHREAD_COPROCESSOR_UART_ASYNC=y
CONFIG_OPENTHREAD_THREAD_VERSION_1_4=y
CONFIG_OPENTHREAD_RADIO_WORKQUEUE_STACK_SIZE=1536
