CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=n
CONFIG_NET_UDP=y

# DHCPv6 client with prefix delegation (requesting router).
CONFIG_NET_DHCPV6=y

# Router Advertisement transmit, required to advertise the delegated
# prefix on the downstream link.
CONFIG_NET_IPV6_ND=y
CONFIG_NET_IPV6_RA=y

# Send unsolicited Router Advertisements often so downstream hosts pick up
# the delegated prefix quickly (the default of 600s is impractical for
# interactive testing).
CONFIG_NET_IPV6_RA_INTERVAL=30

# Forwarding between the upstream (WAN) and downstream (LAN) interfaces.
CONFIG_NET_IPV6_ROUTE=y
CONFIG_NET_IPV6_FORWARDING=y

# Prefix delegation needs two links: an upstream (WAN) interface that runs
# the DHCPv6 client and a downstream (LAN) interface onto which the delegated
# prefix is advertised. On native_sim these map to two TAP interfaces
# (zeth0 = upstream, zeth1 = downstream).
CONFIG_ETH_NATIVE_TAP_INTERFACE_COUNT=2

# Allow IPv6 on both interfaces and at least two interfaces (upstream +
# downstream) worth of addresses/prefixes.
CONFIG_NET_IF_MAX_IPV6_COUNT=2
CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=4
CONFIG_NET_IF_IPV6_PREFIX_COUNT=4

CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_INIT_STACKS=y

CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

CONFIG_NET_LOG=y
CONFIG_LOG=y

CONFIG_NET_SHELL=y

CONFIG_NET_L2_ETHERNET=y
