# BL602 WiFi driver overlay for the wifi shell sample.

# Immediate log mode: with deferred logging the log thread is starved
# while the firmware scheduler thread services scan/connect bursts.
CONFIG_LOG_MODE_IMMEDIATE=y

# 184 KB usable RAM: drop IPv6/TCP.
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=n

# The supplicant allocates scan results/BSS entries from the system heap;
# size it generously.  Keep a small fixed libc arena for mbedTLS calloc.
CONFIG_HEAP_MEM_POOL_SIZE=49152
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=8192

# The wifi shell sample's prj.conf overrides the SoC defaults for these:
# restore the 8 KB shell stack the TX path needs (net_pkt_read -> blob TX
# chain -> SW CCMP encrypt overflows the sample's 5200) and rein the
# net buffer counts back in for the RAM budget.
CONFIG_SHELL_STACK_SIZE=8192
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=8

# Time-slice same-priority preemptible threads: the FW scheduler thread
# re-wakes every millisecond while polling its RX semaphore and would
# otherwise monopolise its priority level during traffic bursts,
# starving net_mgmt / shell_uart.
CONFIG_TIMESLICING=y
CONFIG_TIMESLICE_SIZE=10
CONFIG_TIMESLICE_PRIORITY=0

CONFIG_WIFI_LOG_LEVEL_ERR=y
