# BL602 WiFi driver overlay for the wifi shell sample.

# Sync log mode + immediate printing so logger doesn't queue while
# wifi mgmt callbacks run on the FW thread.
CONFIG_PRINTK_SYNC=y
CONFIG_LOG_MODE_IMMEDIATE=y

# 184 KB usable RAM: drop IPv6/TCP and trim the PSA key-slot table
# (the supplicant only holds a handful of transient keys at a time).
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=n
CONFIG_MBEDTLS_PSA_KEY_SLOT_COUNT=6
CONFIG_MBEDTLS_AES_ROM_TABLES=y

# The supplicant allocates scan results/BSS entries from the system heap;
# size it generously.  Keep a small fixed libc arena for mbedTLS calloc.
CONFIG_HEAP_MEM_POOL_SIZE=49152
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=8192

# Key install + SW CCMP (psa_aead_encrypt) run on sysworkq; the Zephyr
# default overflows on RISC-V.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# The TX path runs in the shell thread: net_pkt_read -> txu_cntrl_push
# (blob) -> tx fixup -> SW CCMP encrypt.  Default 5200 overflows.
CONFIG_SHELL_STACK_SIZE=8192

# Scan results are delivered via the net_mgmt event thread.
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048

# Net buffer sizing for the 136 KB SRAM budget.
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=8
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=4

# Unicast DHCP replies use the HW's dedicated unicast RX path.
CONFIG_NET_DHCPV4_ACCEPT_UNICAST=y

# Time-slice cooperative threads so the FW scheduler thread doesn't
# starve net_mgmt / shell_uart while waiting on RX semaphores.
CONFIG_TIMESLICING=y
CONFIG_TIMESLICE_SIZE=10
CONFIG_TIMESLICE_PRIORITY=0

CONFIG_WIFI_LOG_LEVEL_INF=y
# Bring-up visibility for the supplicant flow.
CONFIG_WIFI_NM_WPA_SUPPLICANT_LOG_LEVEL_INF=y
