CONFIG_WIFI_AMEBA=y
CONFIG_ZVFS_POLL_MAX=32
CONFIG_HEAP_MEM_POOL_SIZE=65536

# Required by NET_L2_WIFI_SHELL on Ameba
CONFIG_NEWLIB_LIBC=y

# AP mode DHCP server support
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_DHCPV4_SERVER_ADDR_COUNT=10
CONFIG_NET_MAX_CONN=10
CONFIG_ZVFS_OPEN_MAX=6
CONFIG_NET_DHCPV4_INIT_REBOOT=n
