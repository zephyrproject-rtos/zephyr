#
# Same as native_sim.conf for 64-bit native_sim build.
#

CONFIG_SHELL_TAB_AUTOCOMPLETION=y
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_HISTORY_BUFFER=256

CONFIG_WIFI_HWSIM=y
CONFIG_WIFI_HWSIM_NUM_RADIOS=2
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_IF_MAX_IPV4_COUNT=3
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_AP=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_CRYPTO_NONE=y
CONFIG_WIFI_NM_MAX_MANAGED_INTERFACES=4

# All hwsim radios share a single IP stack, so each radio's address is a
# local address. Disable the "destination is my own address" short-circuit
# so inter-radio data frames (e.g. ping) traverse the simulated medium.
CONFIG_NET_IP_ADDR_CHECK=n
