# Board-specific debug config for MIMXRT1170 EVK CM7
#
# Purpose:
# - Disable ENET HW acceleration to test whether DHCP/ICMP failures are caused
#   by checksum offload / driver + toolchain interaction.
# - Enable focused network logging for DHCPv4/IPv4/UDP/Ethernet paths.

CONFIG_ETH_NXP_ENET_HW_ACCELERATION=n

CONFIG_NET_LOG=y
CONFIG_ETHERNET_LOG_LEVEL_DBG=y
CONFIG_NET_DHCPV4_LOG_LEVEL_DBG=y
CONFIG_NET_IPV4_LOG_LEVEL_DBG=y
CONFIG_NET_UDP_LOG_LEVEL_DBG=y
