# C++ support with full standard library (required for TFLM STL headers)
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_GLIBCXX_LIBCPP=y

# TensorFlow Lite Micro
CONFIG_TENSORFLOW_LITE_MICRO=y

# NXP NEUTRON NPU support with TFLM integration
# This will select NXP_NEUTRON automatically
CONFIG_TENSORFLOW_LITE_MICRO_NXP_NEUTRON=y

# Enable float printf for confidence scores
CONFIG_REQUIRES_FLOAT_PRINTF=y

# Use picolibc for embedded platforms (recommended for TFLM)
CONFIG_PICOLIBC=y
CONFIG_PICOLIBC_IO_FLOAT=y

# Enable logging (optional)
CONFIG_LOG=y

# Enable FPU for floating point operations
CONFIG_FPU=y
