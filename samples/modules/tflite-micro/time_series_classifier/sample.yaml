sample:
  description: Time-series TensorFlow Lite Micro classifier sample
  name: time series tensorflow classifier
common:
  tags: tensorflow
  modules:
    - tflite-micro
  harness: console
  harness_config:
    type: multi_line
    ordered: false
    regex:
      - "prediction:.*, score:.*"
      - "result: PASS"
tests:
  sample.tensorflow.time_series_classifier:
    platform_allow:
      - qemu_x86
      - qemu_x86_64
    integration_platforms:
      - qemu_x86
    tags: tensorflow
    filter: CONFIG_FULL_LIBC_SUPPORTED

  sample.tensorflow.time_series_classifier.cmsis_nn:
    tags: tensorflow
    platform_allow:
      - mps3/corstone300/fvp
      - ek_ra8m1
    integration_platforms:
      - mps3/corstone300/fvp
      - ek_ra8m1
    extra_configs:
      - CONFIG_TENSORFLOW_LITE_MICRO_CMSIS_NN_KERNELS=y
