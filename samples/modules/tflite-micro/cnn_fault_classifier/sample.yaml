sample:
  description: TensorFlow Lite Micro 1D CNN fault classifier sample
  name: 1D CNN fault classifier TensorFlow Lite Micro

common:
  tags:
    - tensorflow
  modules:
    - tflite-micro
  harness: console
  harness_config:
    type: multi_line
    ordered: false
    regex:
      - "input_window: .*"
      - "prediction: .*"
      - "result: PASS"

tests:
  sample.tensorflow.cnn_fault_classifier:
    platform_allow:
      - qemu_x86
      - qemu_x86_64
    integration_platforms:
      - qemu_x86
    filter: CONFIG_FULL_LIBC_SUPPORTED

  sample.tensorflow.cnn_fault_classifier.cmsis_nn:
    platform_allow:
      - ek_ra8m1
    extra_configs:
      - CONFIG_TENSORFLOW_LITE_MICRO_CMSIS_NN_KERNELS=y
