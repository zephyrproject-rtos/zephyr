sample:
  description: LVGL sample, containing all upstream demos
  name: LVGL demos
common:
  modules:
    - lvgl
  harness: console
  filter: dt_chosen_enabled("zephyr,display")
  tags:
    - samples
    - display
    - lvgl
    - gui
  harness_config:
    fixture: fixture_display
    type: one_line
    regex:
      - >-
        (\d+ free bytes, \d+ allocated bytes, overhead = \d+
        bytes \(\d+\.\d+%\)|lvgl in malloc mode)
tests:
  sample.modules.lvgl.demo_music:
    platform_allow:
      - native_sim
    extra_configs:
      - CONFIG_LV_Z_DEMO_MUSIC=y
  sample.modules.lvgl.demo_benchmark:
    platform_allow:
      - native_sim
    extra_configs:
      - CONFIG_LV_Z_DEMO_BENCHMARK=y
      - CONFIG_LV_USE_DEMO_WIDGETS=y
  sample.modules.lvgl.demo_stress:
    platform_allow:
      - native_sim
    extra_configs:
      - CONFIG_LV_Z_DEMO_STRESS=y
  sample.modules.lvgl.demo_widgets:
    platform_allow:
      - native_sim
    extra_configs:
      - CONFIG_LV_Z_DEMO_WIDGETS=y
  sample.modules.lvgl.demo_keypad_encoder:
    platform_allow:
      - native_sim
    extra_configs:
      - CONFIG_LV_Z_DEMO_KEYPAD_AND_ENCODER=y
  sample.modules.lvgl.demo_render:
    platform_allow:
      - native_sim
    extra_configs:
      - CONFIG_LV_Z_DEMO_RENDER=y
  sample.modules.lvgl.demo_benchmark.lvgl_auto:
    platform_allow:
      - native_sim
    extra_configs:
      - CONFIG_LV_Z_DEMO_BENCHMARK=y
      - CONFIG_LV_USE_DEMO_WIDGETS=y
      - CONFIG_LV_Z_RUN_LVGL_ON_WORKQUEUE=y
      - CONFIG_LV_Z_LVGL_WORKQUEUE_STACK_SIZE=8192
      - CONFIG_LV_Z_LVGL_WORKQUEUE_PRIORITY=0
  sample.modules.lvgl.demos.dithering:
    filter: CONFIG_DISPLAY_COLOR_DITHER_SUPPORTED
    platform_allow:
      - reterminal_e1002/esp32s3/procpu
  sample.modules.lvgl.demos.rk043fn66hs_ctg:
    platform_allow: mimxrt1060_evk/mimxrt1062/qspi
    extra_args: SHIELD=rk043fn66hs_ctg
    extra_configs:
      - CONFIG_LV_Z_DEMO_BENCHMARK=y
    tags:
      - shield
  sample.modules.lvgl.demos.rk055hdmipi4ma0:
    platform_allow:
      - mimxrt1170_evk/mimxrt1176/cm7
      - mimxrt595_evk/mimxrt595s/cm33
      - mimxrt700_evk/mimxrt798s/cm33_cpu0
    extra_args: SHIELD=rk055hdmipi4ma0
    extra_configs:
      - CONFIG_LV_Z_DEMO_BENCHMARK=y
    tags:
      - shield
  sample.modules.lvgl.demos.g1120b0mipi:
    platform_allow: mimxrt700_evk/mimxrt798s/cm33_cpu0
    extra_args: SHIELD=g1120b0mipi
    extra_configs:
      - CONFIG_LV_Z_DEMO_BENCHMARK=y
    tags:
      - shield
  sample.modules.lvgl.demos.zc143ac72mipi:
    platform_allow: mimxrt700_evk/mimxrt798s/cm33_cpu0
    extra_args: SHIELD=zc143ac72mipi
    extra_configs:
      - CONFIG_LV_Z_DEMO_BENCHMARK=y
    tags:
      - shield
  sample.modules.lvgl.demos.st_b_lcd40_dsi1_mb1166:
    filter: dt_compat_enabled("orisetech,otm8009a")
    platform_allow: stm32h747i_disco/stm32h747xx/m7
    extra_args: SHIELD=st_b_lcd40_dsi1_mb1166
    extra_configs:
      - CONFIG_LV_Z_DEMO_BENCHMARK=y
    tags:
      - shield
  sample.modules.lvgl.demos.st_b_lcd40_dsi1_mb1166_a09:
    filter: dt_compat_enabled("frida,nt35510")
    platform_allow: stm32h747i_disco/stm32h747xx/m7
    extra_args: SHIELD=st_b_lcd40_dsi1_mb1166_a09
    extra_configs:
      - CONFIG_LV_Z_DEMO_BENCHMARK=y
    tags:
      - shield
  sample.modules.lvgl.demos.rtkmipilcdb00000be:
    platform_allow:
      - ek_ra8d1
      - ek_ra8p1/r7ka8p1kflcac/cm85
    extra_args: SHIELD=rtkmipilcdb00000be
    tags:
      - shield
  sample.modules.lvgl.demos.rtk7eka6m3b00001bu:
    platform_allow: ek_ra8d1
    extra_args:
      - SHIELD="rtk7eka6m3b00001bu;ek_ra8d1_rtk7eka6m3b00001bu"
    extra_configs:
      - CONFIG_LV_DEMO_MUSIC_LANDSCAPE=y
    tags:
      - shield
  sample.modules.lvgl.demos.rtklcdpar1s00001be:
