{% extends "base.html" %}
{% from "macros.html" import copy_button %}

{% block content %}

<div class="row rst-content mb-3">
  <div class="col">
    <code class="literal p-1" id="filePath">{{file_path}}</code>
    {{ copy_button("filePath") }}
  </div>
</div>

<div class="row">
  <div class="col">
    <pre class="text-viewer"><code>{{file_contents}}</code></pre>
  </div>
</div>

{% endblock %}
