[pytest]
norecursedirs = test_data *.egg .* _darcs build CVS dist node_modules venv {arch}
markers =
    fast: test uses --dry-run and never builds; completes in under a second
    build: test invokes the compiler; requires a working Zephyr toolchain
    run: test executes firmware (native_sim); requires a working Zephyr toolchain
