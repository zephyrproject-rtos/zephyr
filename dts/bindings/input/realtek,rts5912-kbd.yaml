description: Realtek RTS5912 keyboard matrix controller

compatible: "realtek,rts5912-kbd"

include: [kbd-matrix-common.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  row-size:
    required: true
    min: 1
    max: 9

  col-size:
    required: true
    min: 1
    max: 19

  kso-ignore-mask:
    type: int
    default: 0
