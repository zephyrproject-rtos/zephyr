description: TSC2007 touch panel controller

compatible: "ti,tsc2007"

include: [i2c-device.yaml, touchscreen-common.yaml, touchscreen-common-calibration.yaml]

properties:
  int-gpios:
    type: phandle-array
    description: |
      Interrupt GPIO. Used by the controller to signal touch data is
      available. Active low.

  x-plate-ohms:
    type: int
    description: |
      The resistance of the touchscreen X-plate in ohms specifies
      the physical resistance of the X-direction plate on the touchscreen.
