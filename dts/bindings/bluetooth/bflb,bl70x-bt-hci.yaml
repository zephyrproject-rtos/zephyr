description: Bluetooth HCI for Bouffalo Lab BL70X

compatible: "bflb,bl70x-bt-hci"

include: bt-hci.yaml

properties:
  bt-hci-name:
    default: "BT BL70X"
  bt-hci-bus:
    default: "virtual"
  bt-hci-quirks:
    default: ["no-auto-dle"]
