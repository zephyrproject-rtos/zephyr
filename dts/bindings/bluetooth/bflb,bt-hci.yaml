description: Bluetooth HCI for Bouffalo Lab on-chip BLE controllers

compatible: "bflb,bt-hci"

include: bt-hci.yaml

properties:
  bt-hci-name:
    default: "BT BFLB"
  bt-hci-bus:
    default: "virtual"
  bt-hci-quirks:
    default: ["no-auto-dle"]
