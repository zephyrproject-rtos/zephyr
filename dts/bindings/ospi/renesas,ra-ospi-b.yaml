description: Renesas RA OSPI

compatible: "renesas,ra-ospi-b"

include: [base.yaml, pinctrl-device.yaml]

bus: ospi

properties:
  reg:
    required: true

  unit:
    type: int
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  clocks:
    required: true

  ddr-sampling-extension:
    type: int
    default: 0
    enum: [0, 1, 2, 3, 4, 5, 6, 7]
    description: |
      Optional DDR sampling extension configuration, required for DDR transactions.
      Read OSPI_B hardware manual for more details.
