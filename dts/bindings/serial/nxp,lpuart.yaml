description: NXP LPUART

compatible: "nxp,lpuart"

include: [uart-controller.yaml, uart-controller-pin-inversion.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  nxp,loopback:
    type: boolean
    description: |
      Enable loopback mode on LPUART peripheral. When present, RX pin is
      disconnected, and transmitter output is internally connected to
      the receiver input.

  single-wire:
    type: boolean
    description: |
      Enable the single wire half-duplex communication.
      Using this mode, TX and RX lines are internally connected and
      only TX pin is used afterwards and should be configured.
      RX/TX conflicts must be handled on user side.

  nxp,rs485-mode:
    type: boolean
    description: |
      Set to enable RTS signal, which can be used to enable the driver
      of an external RS-485 transceiver. Note hw-flow-control should be
      set to false.

  nxp,rs485-de-active-low:
    type: boolean
    description: RTS polarity at RS485 mode.

  nxp,disable-rx-dma-scatter:
    type: boolean
    description: |
      Disable RX DMA destination scatter mode for this LPUART instance.

      This can be used on platforms where the DMA backend misbehaves when
      UART async RX combines cyclic mode with destination scatter enabled.

  nxp,defer-rx-dma-reload:
    type: boolean
    description: |
      Defer RX DMA reload until the completion callback for this LPUART
      instance.

      This can be used on platforms where reloading the next RX buffer
      while the channel is busy is unreliable.
