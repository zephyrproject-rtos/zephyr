description: ESP32 Low Power UART

compatible: "espressif,esp32-lpuart"

include: uart-controller.yaml

properties:
  reg:
    required: true

  tx-pin:
    type: int
    description: |
      LP UART TX pin. The LP UART pins are fixed in silicon and routed
      through the LP IO mux. Defaults are set per SoC in the device tree.

  rx-pin:
    type: int
    description: |
      LP UART RX pin. The LP UART pins are fixed in silicon and routed
      through the LP IO mux. Defaults are set per SoC in the device tree.

  rts-pin:
    type: int
    description: |
      LP UART RTS pin. Only configured when hw-flow-control is enabled.

  cts-pin:
    type: int
    description: |
      LP UART CTS pin. Only configured when hw-flow-control is enabled.

  current-speed:
    type: int

  loopback:
    type: boolean
    description: |
      Enable the LP UART hardware internal loopback, tying TX to RX inside
      the peripheral. Intended for self-test on hardware without external
      wiring.
