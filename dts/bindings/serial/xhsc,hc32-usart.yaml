description: XHSC HC32 USART

compatible: "xhsc,hc32-usart"

include: uart-controller.yaml

properties:
  reg:
    required: true

  current-speed:
    required: true

  pinctrl-0:
    type: phandles
    required: true

  pinctrl-names:
    type: string-array
    required: true

  fcg3-periph:
    type: int
    required: true
    description: FCG3 peripheral clock mask for this USART instance.
