title: Microchip UART g1 controller

description: |
  Microchip Universal Asynchronous Receiver Transmitter (UART) driver.

  Group g1 UART driver supports following hardware peripherals:
    - module name="UART" id="6418" version="R"

compatible: "microchip,uart-g1"

include:
  - name: uart-controller.yaml
  - name: pinctrl-device.yaml

properties:
  reg:
    type: array
    required: true
    description: |
      Specifies the base address and size of the UART controller memory-mapped registers.

  interrupts:
    type: array
    required: true
    description: |
      Specifies the interrupt numbers associated with the UART controller.

  clocks:
    type: phandle-array
    required: true
    description: |
      Specifies the clock reference for this UART instance.
