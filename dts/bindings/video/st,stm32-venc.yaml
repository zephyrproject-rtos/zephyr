description: |
    STMicroelectronics STM32 video encoder peripheral (VENC).
    Example of node configuration at board level:

    &venc {
      status = "okay";
    };

compatible: "st,stm32-venc"

include: [base.yaml, reset-device.yaml]

properties:
  interrupts:
    required: true

  clocks:
    required: true

  resets:
    required: false
