description: NXP iMX MIPI CSI Host Controller

compatible: "nxp,imx-mipi-csi"

include: [base.yaml]

properties:
  reg:
    required: true

  phys:
    type: phandle
    required: true
    description: PHY device phandle


  data-lanes:
    type: int
    required: true
    description: Number of data lanes (1-4)
    enum:
      - 1
      - 2
      - 3
      - 4

child-binding:
  child-binding:
    child-binding:
      include: video-interfaces.yaml
