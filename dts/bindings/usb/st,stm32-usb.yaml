description: STM32 USB controller

compatible: "st,stm32-usb"

include: [usb-ep.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  ram-size:
    type: int
    required: true
    description: |
      Size of USB dedicated RAM. STM32 SOC's reference
      manual defines USB packet SRAM size.

  disconnect-gpios:
    type: phandle-array
    description: |
      Some boards use a USB DISCONNECT pin to enable
      the pull-up resistor on USB Data Positive signal.

  phys:
    type: phandle
    description: PHY provider specifier

  phy-type:
    type: string
    required: true
    enum:
      - "USB_OTG_ULPI_PHY"
      - "PCD_PHY_EMBEDDED"
      - "USB_OTG_HS_EMBEDDED_PHY"
    description: |
      Type of PHY (Physical Layer) interface used by the OTG_FS/OTG_HS interface.
      The general features of the OTG_FS/OTG_HS interface are as follows:
        - "USB_OTG_ULPI_PHY": Uses the ULPI interface for an external high-speed PHY for OTG_HS.
        - "PCD_PHY_EMBEDDED": Uses the on-chip full-speed PHY for OTG_FS.
        - "USB_OTG_HS_EMBEDDED_PHY": Uses the on-chip full-speed PHY for OTG_HS.

  clocks:
    required: true
