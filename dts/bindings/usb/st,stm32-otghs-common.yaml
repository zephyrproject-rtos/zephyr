# Common fields for STM32 OTGHS controller

include: [usb-ep.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  ram-size:
    type: int
    required: true
    description: |
      Size of USB dedicated RAM. STM32 SOC's reference
      manual defines a shared FIFO size.

  phys:
    type: phandle
    description: PHY provider specifier

  clocks:
    required: true

  dr-mode:
    type: string
    enum:
      - "host"
      - "peripheral"
      - "otg"
    description: |
      Select the USB data role exposed by this controller instance.

      "host" instantiates the STM32 OTG HS host controller driver.
      "peripheral" instantiates the STM32 device controller driver.
      "otg" marks the controller as dual-role capable and defers the
      active Zephyr stack selection to the STM32 OTG HS OTG-role Kconfig
      choice.

      If omitted, Zephyr keeps the historical STM32 OTG HS behavior and
      treats the controller as peripheral-only.
