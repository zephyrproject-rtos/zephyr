description: STM32U5 OTGHS controller

compatible: "st,stm32u5-otghs"

include: st,stm32-otghs.yaml

properties:
  physel:
    type: string
    required: true
    enum:
      - "USB_OTG_FS_EMBEDDED_PHY"
      - "USB_OTG_HS_EMBEDDED_PHY"
    description: |
      OTG_HS supports the following PHY interfaces:
        - "USB_OTG_FS_EMBEDDED_PHY": on chip full speed PHY.
        - "USB_OTG_HS_EMBEDDED_PHY": on-chip high-speed PHY.
