description: STM32F4 OTGHS controller

compatible: "st,stm32u5-otghs"

include: st,stm32-otghs.yaml

properties:
  phy-type:
    type: string
    required: true
    enum:
      - "USB_OTG_PHY_EMBEDDED"
      - "USB_OTG_HS_EMBEDDED_PHY"
    description: |
      ST STM32U5 USB
      OTG_HS supports the following PHY interfaces:
        - "USB_OTG_PHY_EMBEDDED": an on-chip full-speed PHY.
        - "USB_OTG_HS_EMBEDDED_PHY": an on-chip full-speed PHY.
