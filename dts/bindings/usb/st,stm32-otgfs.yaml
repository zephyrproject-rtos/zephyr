description: STM32 OTGFS controller

compatible: "st,stm32-otgfs"

include: [usb-ep.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  ram-size:
    type: int
    required: true
    description: |
      Size of USB dedicated RAM. STM32 SOC's reference
      manual defines a shared FIFO size.

  phys:
    type: phandle
    description: PHY provider specifier

  phy-type:
    type: string
    required: true
    enum:
      - "PCD_PHY_ULPI"
      - "PCD_PHY_EMBEDDED"
      - "PCD_PHY_UTMI"
    description: |
      OTG_FS supports the following PHY interfaces:
        - "PCD_PHY_ULPI": an UTMI+ Low Pin Interface for external high-speed PHY.
        - "PCD_PHY_EMBEDDED": an on-chip full-speed PHY.
        - "PCD_PHY_UTMI": an USB 2.0 Transceiver Macrocell interface for on-chip full-speed PHY.

  clocks:
    required: true
