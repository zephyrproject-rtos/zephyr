description: STM32 OTGFS controller

compatible: "st,stm32-otgfs"

include: [usb-ep.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  ram-size:
    type: int
    required: true
    description: |
      Size of USB dedicated RAM. STM32 SOC's reference
      manual defines a shared FIFO size.

  phys:
    type: phandle
    description: PHY provider specifier

  physel:
    type: string
    default: "USB_OTG_FS_EMBEDDED_PHY"
    description: |
      OTG_FS supports the following PHY interfaces:
        - "USB_OTG_FS_EMBEDDED_PHY": on chip full speed PHY.

  clocks:
    required: true
