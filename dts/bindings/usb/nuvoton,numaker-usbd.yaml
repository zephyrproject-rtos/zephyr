description: Nuvoton NuMaker USB 1.1 device controller

compatible: "nuvoton,numaker-usbd"

include: [usb-ep.yaml, reset-device.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  resets:
    required: true

  clocks:
    required: true

  dma-buffer-size:
    type: int
    required: true
    description: |
      Size of DMA buffer in bytes

  disallow-iso-in-out-same-number:
    type: boolean
    description: |
      Some soc series don't allow Isochronous IN/OUT endpoints to be assigned the same numbers,
      for example, 0x82 (for Isochronous IN) and 0x02 (for Isochronous OUT) are disallowed.

  allow-disable-usb-on-unplug:
    type: boolean
    description: |
      Supports USB controller can be disabled temporarily when USB cable is unplugged
      and then enabled back when the cable is re-plugged.

  disable-vbus-detect:
    type: boolean
    description: |
      All USB controllers support VBUS detect function, except some targets may
      integrate USB-C circuitry and need extra USB-C control for the function
      to get enabled. For these targets, USB-C control is not added by default
      and so the function won't work. Set the flag so that UDC driver can reflect
      the real condition for user application to be aware of such limitation.
