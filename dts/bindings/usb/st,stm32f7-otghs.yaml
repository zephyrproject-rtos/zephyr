description: STM32F7 OTGHS controller

compatible: "st,stm32f7-otghs"

include: st,stm32-otghs.yaml

properties:
  physel:
    type: string
    enum:
      - "USB_OTG_HS_PHY_ULPI"
      - "USB_OTG_FS_EMBEDDED_PHY"
    description: |
      OTG_HS supports the following PHY interfaces:
        - "USB_OTG_HS_ULPI_PHY": UTMI+ Low Pin Interface for external high-speed PHY.
        - "USB_OTG_FS_EMBEDDED_PHY": on chip full speed PHY.
