description: >
    This is a binding for the Synopsys I3C interface

compatible: "snps,designware-i3c"

include: i3c-controller.yaml

properties:
  input-clock-frequency:
    required: true
    type: int
    description: clk frequency.

  od-thigh-max-ns:
    type: int
    default: 41
    description: Maximum high clock pulse length (ns) in Open-Drain mode.

  od-tlow-min-ns:
    type: int
    default: 200
    description: Minimum low clock pulse length (ns) in Open-Drain mode.
