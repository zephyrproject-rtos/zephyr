description: |
  Micro Crystal RV3028 RTC multifunction device.

  This binding describes the I2C parent device. Functional blocks are
  represented as child nodes.

compatible: "microcrystal,rv3028"

include:
  - name: i2c-device.yaml

properties:
  clkout-frequency:
    type: int
    enum:
      - 32768
      - 8192
      - 1024
      - 64
      - 32
      - 1
    description: |
      Frequency of the CLKOUT signal in Hertz. If omitted, the CLKOUT pin is driven low.

  backup-switch-mode:
    type: string
    required: true
    enum:
      - disabled
      - direct
      - level
    description: |
      Automatic backup switchover function selection:
        - disabled: The switchover function is disabled - only one power supply available (VDD)
        - direct: Direct Switching Mode (DSM): when VDD < VBACKUP, switchover occurs from VDD to
          VBACKUP without requiring VDD to drop below VTH:LSM (2.0 V)
        - level: Level Switching Mode (LSM): when VDD < VTH:LSM (2.0 V) AND VBACKUP > VTH:LSM,
          switchover occurs from VDD to VBACKUP

  trickle-resistor-ohms:
    type: int
    enum:
      - 3000
      - 5000
      - 9000
      - 15000
    description: |
      Enable the trickle charger with provided current-limiting resistance in ohms. The trickle
      charger allows a battery or supercapacitor connected to VBACKUP to be charged.

  int-gpios:
    type: phandle-array
    description: |
      GPIO connected to the RV3028 INT interrupt output. The signal is
      open-drain and active low. It is required when any child device uses
      interrupt-driven alarm, update, timestamp, or counter callbacks.

examples:
  - |
    /* Example node for an RV3028 RTC MFD on the i2c0 bus with all child devices. */
    &i2c0 {
      status = "okay";
      clock-frequency = <I2C_BITRATE_STANDARD>;

      rv3028: rv3028@52 {
        compatible = "microcrystal,rv3028";
        reg = <0x52>;
        int-gpios = <&gpiob 7 (GPIO_PULL_UP | GPIO_ACTIVE_LOW)>;
        backup-switch-mode = "disabled";
        clkout-frequency = <8192>;
        trickle-resistor-ohms = <5000>;
        status = "okay";

        rv3028_rtc: rtc {
          compatible = "microcrystal,rv3028-rtc";
          status = "okay";
        };

      };
    };
