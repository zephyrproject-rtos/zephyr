description: Raspberry Pi BCM283x power domain

compatible: "raspberrypi,bcm283x-power"

include: power-domain.yaml

properties:
  firmware:
    required: true
    type: phandle

  power-domain-id:
    required: true
    type: int
    description: Raspberry Pi BCM283x power domain ID
