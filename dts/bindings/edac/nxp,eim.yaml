description: NXP Error Injection Module

compatible: "nxp,eim"

include: [reset-device.yaml, base.yaml]

child-binding:
  properties:
    channel-id:
      required: true
      type: int

    size:
      required: true
      type: int

    start-address:
      required: true
      type: int

    inject-enable:
      required: true
      type: int

    ecc-enable:
      required: true
      type: int
