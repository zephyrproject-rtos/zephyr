description: Texas Instruments LP5866 LED controller node

compatible: ti,lp5866

include: ti,lp586x.yaml

properties:
  num-lines:
    type: int
    default: 6
    enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
    description: |
      Number of lines connected to the device. The default values of 6 is
      the maximum number supported by this specific device.
