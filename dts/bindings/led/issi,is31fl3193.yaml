description: |
  IS31FL3193 3-channel LED driver with programmable pattern sequencing

  Supports single-channel and RGB LEDs. For single channel LEDs,
  the led_set_brightness() API can be used to set the brightness of each LED.

compatible: "issi,is31fl3193"

include: ["i2c-device.yaml", "led-controller.yaml"]

child-binding:
  properties:
    label:
      required: true

    color-mapping:
      required: true

    current-limit:
      type: int
      enum:
        - 42
        - 10
        - 5
        - 30
        - 17  # Actually 17.5mA, but rounded down to fit in an integer
      required: true
      description: |
        The current limit for the LED in mA.

examples:
  - |
    /* Single RGB LED */
    is31fl3193@68 {
      compatible = "issi,is31fl3193";
      reg = <0x68>;

      led_0 {
        label = "RGB LED";
        color-mapping =
          <LED_COLOR_ID_RED>,
          <LED_COLOR_ID_GREEN>,
          <LED_COLOR_ID_BLUE>;
      };
    };
  - |
    /* Three single-channel LEDs */
    is31fl3193@68 {
      compatible = "issi,is31fl3193";
      reg = <0x68>;

      led_0 {
        label = "RED LED";
        color-mapping = <LED_COLOR_ID_RED>;
      };

      led_1 {
        label = "GREEN LED";
        color-mapping = <LED_COLOR_ID_GREEN>;
      };

      led_2 {
        label = "BLUE LED";
        color-mapping = <LED_COLOR_ID_BLUE>;
      };
    };
