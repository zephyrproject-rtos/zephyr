description: Microchip XEC BBLED

compatible: "microchip,xec-bbled"

include:
  - name: base.yaml
  - name: pinctrl-device.yaml
  - name: microchip,dmec-ecia-girq.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  pcrs:
    type: int
    required: true
    description: BBLED PCR register index and bit position
