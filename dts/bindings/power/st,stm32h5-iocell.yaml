title: STM32H5 I/O cell controller

description: |
  I/O cell controller similar to the one found in STM32H7R/S and STM32N6
  series, except that the HSLV configuration is done on a per-pin basis
  at GPIO level instead of a domain basis.

compatible: "st,stm32h5-iocell"

include:
  - name: st,stm32-iocell.yaml
    property-blocklist:
      - hslv-mode
