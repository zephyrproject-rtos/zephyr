description: STM32 I/O cell controller

compatible: "st,stm32-iocell"

include: base.yaml

properties:
  "#address-cells":
    const: 0

  "#size-cells":
    const: 0

child-binding:
  description: |
    IO power domains

  properties:
    domain:
      type: int
      description: |
        Domain e.g., STM32_DT_IOCELL_VDDIO

    hslv-enabled:
      type: boolean
      description: |
        True if HSLV (high-speed low voltage) should be enabled.
        This option will work only if the corresponding bit is set in
        option bytes / OTP fuse.
        Enabling this option on domain that is powered from 3.3V
        can permanently damage the device! Please consult datasheet for
        pecise threshold value.

    hslv-auto:
      type: boolean
      description: |
        Similar to hslv-enabled, but th HSLV setting will follow
        option bytes / OTP fuse configuration.
        Can be useful for board allowing both 1.8V and 3.3V operation.
        Otherwise users should avoid using this option.

    compensation-enabled:
      type: boolean
      description: |
        Enables the I/O compensation cell
