description: NXP mcux SAI-I2S controller

compatible: "nxp,mcux-i2s"

include: [i2s-controller.yaml, pinctrl-device.yaml, reset-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  dma-names:
    required: true

  nxp,tx-dma-channel:
    type: int
    required: true
    description: tx dma channel number

  nxp,rx-dma-channel:
    type: int
    required: true
    description: rx dma channel number

  nxp,tx-sync-mode:
    type: boolean
    description: tx sync mode

  nxp,rx-sync-mode:
    type: boolean
    description: rx sync mode

  pre-div:
    type: int
    description: pre divider

  podf:
    type: int
    description: post-divider fraction

  pll-clocks:
    type: phandle-array
    description: pll settings
    specifier-space: pll-clock

  pll-clock-names:
    type: string-array
    description: Provided names of pll-clock specifiers

  pinmuxes:
    type: phandle-array
    specifier-space: pinmux
    description: iomux settings

  nxp,tx-channel:
    type: int
    description: tx channel the maximum number is SOC dependent

  clock-mux:
    type: int
    description: Clock mux source for SAI root clock

  nxp,bclk-source:
    type: int
    default: 1
    enum: [0, 1, 2, 3]
    description: |
      Bit clock source (TCR2/RCR2 MSEL). 0 = bus clock, 1 = master clock
      divider / MCLK option 1, 2/3 = MCLK option 2/3 or other SAI. Defaults
      to 1, the master clock divider, which matches the i.MX-family SAI
      clocking. SoCs without an internal master clock divider and no MCLK
      routing (e.g. MCXE31x) must select the bus clock (0).

  mclk-output:
    type: boolean
    description: |
      Set if MCLK signal is an output.  Hardware default sets MCLK signal as input.

pinmux-cells:
  - offset
  - mask
