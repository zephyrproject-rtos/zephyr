description: STM32 I2S controller

compatible: "st,stm32-sai"

include: [i2s-controller.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  dmas:
    required: true

  dma-names:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  mclk-div-enable:
    type: boolean
    description: |
      SAI NODIV property

  mclk-enable:
    type: boolean
    description: |
      Master Clock Output function.
      An mck pin must be listed within pinctrl-0 when enabling this property.

  synchronous:
    type: boolean
    description: |
      Synchronous mode.
      The SAI controller is configured to work in synchronous mode.
