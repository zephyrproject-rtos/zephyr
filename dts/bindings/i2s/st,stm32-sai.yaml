description: STM32 I2S controller

compatible: "st,stm32-sai"

include: [i2s-controller.yaml, pinctrl-device.yaml]

properties:

properties:
  reg:
    required: true

  #interrupts:
  #  required: true

  dmas:
    required: true

  dma-names:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  mck-enabled:
    type: boolean
    description: |
      Master Clock Output function.
      An mck pin must be listed within pinctrl-0 when enabling this property.

  no-divider:
    type: boolean
    description: |
      nodiv.