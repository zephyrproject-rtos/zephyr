description: |
  Broadcom BCM2835 / BCM2710 / BCM2837 PCM / I2S controller.

  DMA-paced: sample buffers stream between memory and the TX/RX FIFOs
  through the BCM2835 DMA controller, paced by the PCM TX/RX DREQ
  lines. In master mode the bit clock is derived from the SoC clock
  manager's PCM divider, which the driver programs directly; no
  clocks phandle is required.

compatible: "brcm,bcm2835-i2s"

include: [i2s-controller.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  dmas:
    required: true
    description: |
      TX and RX DMA channel specifiers. The dma-cell is the peripheral
      DREQ number: 2 for PCM TX, 3 for PCM RX.

  dma-names:
    required: true
    description: Must be "tx" and "rx".
