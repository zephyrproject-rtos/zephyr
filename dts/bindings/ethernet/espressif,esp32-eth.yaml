description: ESP32 Ethernet

compatible: "espressif,esp32-eth"

include:
  - name: ethernet-controller.yaml
  - name: pinctrl-device.yaml

properties:
  phy-handle:
    required: true

  ref-clk-output-gpios:
    type: phandle-array
    description: |
      GPIO to output RMII Clock.

  pinctrl-0:
    description: |
      RMII pin configuration, using the RMII_* macros from the SoC
      pinctrl header to select the GPIO for each signal.
