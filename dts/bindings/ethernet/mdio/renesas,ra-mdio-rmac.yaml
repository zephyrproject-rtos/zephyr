description: Renesas RA External MDIO controller

compatible: "renesas,ra-mdio-rmac"

include: [mdio-controller.yaml, pinctrl-device.yaml]

properties:
  channel:
    type: int
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  mdio-hold-time-ns:
    type: int
    default: 0
    description: |
      Time for changing MDO after rising edge of MDC in nanoseconds. This value depends on PHY chip
      AC Characteristics. Use 0 to disable.

  mdio-capture-time-ns:
    type: int
    default: 0
    description: |
      Time for sampling MDI after rising edge of MDC in nanoseconds. This value depends on PHY chip
      AC Characteristics. Use 0 to disable.
