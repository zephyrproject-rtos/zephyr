description: TI DP83TD510E Ethernet PHY device

compatible: "ti,dp83td510"

include: ethernet-phy-common.yaml

properties:
  reset-gpios:
    type: phandle-array
    description: GPIO connected to PHY reset signal pin. Reset is active low.
  int-gpios:
    type: phandle-array
    description: GPIO for interrupt signal indicating PHY state change.
  ti,interface-type:
    type: string
    required: true
    description: Which type of phy connection the phy is set up for
    enum:
      - "rmii"
      - "rmii-25MHz"
  default-speeds:
    default: ["10BASE Full-Duplex"]
