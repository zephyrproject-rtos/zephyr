description: Microchip KSZ9131 Ethernet PHY device

compatible: "microchip,ksz9131"

include: ethernet-phy-common.yaml

properties:
  reset-gpios:
    type: phandle-array
    description: GPIO connected to PHY reset signal pin. Reset is active low.
  int-gpios:
    type: phandle-array
    description: GPIO for interrupt signal indicating PHY state change.
  default-speeds:
    default: ["10BASE Half-Duplex", "10BASE Full-Duplex", "100BASE Half-Duplex",
              "100BASE Full-Duplex", "1000BASE Half-Duplex", "1000BASE Full-Duplex"]
  microchip,rgmii-delay:
    type: string
    description: |
      Configure KSZ9131 internal RGMII clock delay mode.

      This property is only applicable when the PHY is connected
      using an RGMII interface.

      - "none": no internal delay
      - "id": enable RX and TX delay
      - "rxid": enable RX delay only
      - "txid": enable TX delay only
    enum:
      - "none"
      - "id"
      - "rxid"
      - "txid"
