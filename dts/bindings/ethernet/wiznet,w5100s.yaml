description: W5100S standalone 10/100BASE-T Ethernet controller with SPI interface

compatible: "wiznet,w5100s"

include: [spi-device.yaml, ethernet-controller.yaml]

properties:
  int-gpios:
    type: phandle-array
    description: Interrupt pin.

      The interrupt pin of W5100S is active low.
      If connected directly the MCU pin should be configured
      as active low.
      If interrupt pin is not defined in the DT, the device defaults to polling mode.
  reset-gpios:
    type: phandle-array
    description: Reset pin.

      The reset pin of W5100S is active low.
      If connected directly the MCU pin should be configured
      as active low.
