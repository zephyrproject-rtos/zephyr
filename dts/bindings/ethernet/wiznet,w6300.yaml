description: Wiznet W6300 Ethernet Controller with private PIO QSPI transport

compatible: "wiznet,w6300"

include: [ethernet-controller.yaml, "raspberrypi,pico-pio-device.yaml"]

properties:
  clk-gpios:
    type: phandle-array
    required: true
    description: Output pin for the W6300 QSPI clock.

  io0-gpios:
    type: phandle-array
    required: true
    description: |
      Bidirectional data pin IO0. IO0 through IO3 must be consecutive GPIO pins.

  io1-gpios:
    type: phandle-array
    required: true
    description: Bidirectional data pin IO1. Must be IO0 + 1.

  io2-gpios:
    type: phandle-array
    required: true
    description: Bidirectional data pin IO2. Must be IO0 + 2.

  io3-gpios:
    type: phandle-array
    required: true
    description: Bidirectional data pin IO3. Must be IO0 + 3.

  cs-gpios:
    type: phandle-array
    required: true
    description: Chip select GPIO pin.

  clocks:
    required: true

  clock-frequency:
    type: int
    required: true
    description: W6300 PIO QSPI clock frequency in Hz.

  int-gpios:
    type: phandle-array
    required: true
    description: Interrupt GPIO pin

  reset-gpios:
    type: phandle-array
    description: Reset GPIO pin
