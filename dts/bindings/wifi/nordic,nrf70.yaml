# Includes the generic supply-gpios/vin-supply properties so they are available
# on both the SPI and QSPI variants (the SPI variant also pulls power.yaml in
# via spi-device.yaml; duplicate includes are harmless).
include: [power.yaml]

properties:
  iovdd-ctrl-gpios:
    type: phandle-array
    description: |
      GPIO of the SoC controlling IO_VDD Control pin of the nRF70, either this
      or iovdd-regulator needs to be set.

  iovdd-regulator:
    type: phandle
    description: |
      Regulator controlling IO_VDD of the nRF70, either this or iovdd-ctrl-gpios
      needs to be set.

  supply-power-up-delay-ms:
    type: int
    default: 6
    description: |
      Duration to wait after asserting supply-gpios before asserting BUCK_EN.
      The nRF70 supply sequencing requires at least 6 ms between supplying
      VBAT and asserting BUCK_EN.

  bucken-gpios:
    type: phandle-array
    required: true
    description: GPIO of the SoC controlling BUCK_EN pin of the nRF70

  host-irq-gpios:
    type: phandle-array
    required: true
    description: GPIO of the SoC controlling the HOST_IRQ pin of the nRF70

  srrf-switch-gpios:
    type: phandle-array
    description: |
      GPIO of the RF Switch to control SR RF output to either SR Antenna
      or shared Antenna with Wi-Fi

  iovdd-power-up-delay-ms:
    type: int
    default: 1
    description: |
      Duration to wait after enabling IOVDD before attempting communications.
      Default value of 1 comes from the nRF7002 DK/EK switch (TCK106AG): ~600us
