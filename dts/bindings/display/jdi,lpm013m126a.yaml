description: JDI LPM013M126A 176x176 Color Memory LCD

compatible: "jdi,lpm013m126a"

include: spi-device.yaml

properties:
  disp-gpios:
    type: phandle-array
    description: |
      DISPLAY enable pin.
      Determines whether the LCD shows its memory content or a blank (white) screen.
      When defined, this pin is driven high during initialization.
      Blanking operations provided by the API can toggle this pin as needed.

  extcomin-gpios:
    type: phandle-array
    description: |
      EXTCOMIN pin
      Provides a square wave on the EXTCOMIN pin to toggle the VCOM level
      of the display.

  extcomin-frequency:
    type: int
    description: |
      Frequency (Hz) to toggle the EXTCOMIN pin.

  height:
    type: int
    required: true
    default: 176
    description: Display height in pixels

  width:
    type: int
    required: true
    default: 176
    description: Display width in pixels
