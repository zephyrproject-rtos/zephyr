description: EFI GOP framebuffer display (runtime size from bootloader)

compatible: "zephyr,efi-gop-display"

properties:
  width:
    type: int
    description: |
      Width in pixels (for LVGL static buffer sizing; driver uses EFI value at runtime).
    default: 1024
  height:
    type: int
    description: |
      Height in pixels (for LVGL static buffer sizing; driver uses EFI value at runtime).
    default: 768
  status:
    type: string
    description: mark node enabled/disabled
