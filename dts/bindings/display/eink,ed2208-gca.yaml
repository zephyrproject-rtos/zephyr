title: E-Ink ED2208-GCA (EL073TF1) Display Controller

description: |
  Controller of the E-Ink ED2208-GCA (EL073TF1) Spectra 6 e-ink displays.

compatible: "eink,ed2208-gca"

include:
  - display-controller.yaml
  - name: mipi-dbi-spi-device.yaml
    property-blocklist:
      - te-delay

properties:
  busy-gpios:
    type: phandle-array
    required: true
    description: |
      BUSY_N status GPIO.

      The BUSY_N pin is active low. If connected directly the MCU pin
      should be configured as active low.
