title: Waveshare 7" Display Driver

description: |
    Waveshare display shields consist of a DPI panel and a controller board.
    The controller board consists of ICN6211 DSI-to-RGB bridge and an MCU, to
    convert DSI to DPI and control the backlight.
    This binding treats the controller board as a whole unit.

compatible: "waveshare,7"

include: [base.yaml, display-controller.yaml]

on-bus: i2c

properties:
  reg:
    required: true

  pixel-format:
    type: int
    required: true
    description:
      Pixel format. Available formats in include/zephyr/dt-bindings/display/panel.h
