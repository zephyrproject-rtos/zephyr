description: NXP i.MX LCDIFV3 (LCD Interface v3) controller

compatible: "nxp,imx-lcdifv3"

include: [base.yaml, lcd-controller.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  media-axi-clk-rate:
    type: int
    required: true

  media-apb-clk-rate:
    type: int
    required: true
