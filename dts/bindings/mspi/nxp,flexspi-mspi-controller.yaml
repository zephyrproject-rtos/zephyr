description: NXP FlexSPI MSPI controller

compatible: "nxp,flexspi-mspi-controller"

include: [base.yaml, pinctrl-device.yaml, mspi-controller.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  clocks:
    required: true

  clock-frequency:
    required: true

  ahb-bufferable:
    type: boolean
    description: |
      Enable AHB bufferable write access by setting register field
      AHBCR[BUFFERABLEEN].

  ahb-cacheable:
    type: boolean
    description: |
      Enable AHB cacheable read access by setting register field
      AHBCR[CACHEABLEEN].

  ahb-prefetch:
    type: boolean
    description: |
      Enable AHB read prefetch by setting register field AHBCR[PREFETCHEN].

  ahb-read-addr-opt:
    type: boolean
    description: |
      Remove burst start address alignment limitation by setting register
      field AHBCR[READADDROPT].

  combination-mode:
    type: boolean
    description: |
      Combine port A and port B data pins to support octal mode access by
      setting register field MCR0[COMBINATIONEN].

  sck-differential-clock:
    type: boolean
    description: |
      Enable/disable SCKB pad use as SCKA differential clock output,
      when enabled, Port B flash access is not available.

  rx-clock-source:
    type: int
    default: 0
    enum:
      - 0
      - 1
      - 2
      - 3
    description: |
      Source clock for flash read. See the RXCLKSRC field in register MCR0.

  rx-clock-source-b:
    type: int
    default: 0
    enum:
      - 0
      - 1
      - 2
      - 3
    description: |
      Source clock for flash read on port B. See the RXCLKSRC_B field
      in register MCR2.

  rx-buffer-config:
    type: array
    description: |
      Array of tuples to configure AHB RX buffers:
      <prefetch priority master_id buf_size>.

  ahb-boundary:
    type: string
    default: "no-boundary"
    enum:
      - "no-boundary"
      - "1024"
      - "512"
      - "256"
    description: |
      Sets the AHB read/write boundary. Cross-boundary accesses are split
      by hardware when enabled.
