description: NXP QSPI controller with MSPI interface

compatible: "nxp,qspi"

include: [base.yaml, pinctrl-device.yaml, mspi-controller.yaml]

properties:
  reg:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  clocks:
    required: true

  cs-setup-time:
    type: int
    default: 3
    description: |
      Chip select setup time, in serial clock cycles. Default corresponds
      to the hardware reset value.

  cs-hold-time:
    type: int
    default: 3
    description: |
      Chip select hold time, in serial clock cycles. Default corresponds
      to the hardware reset value.

  data-hold-time:
    type: int
    default: 1
    description: |
      Data output hold time, in serial clock cycles. Default corresponds
      to the hardware reset value.
