description: |
  Microchip FLEXCOM SPI

  Group G1 FLEXCOM SPI includes the following hardware peripherals:
    - module name="FLEXCOM" id="11268" version="237"

examples:
  - |
    Example devicetree configuration:

      &pinctrl {
        pinctrl_spi11_default: spi11_default {
          group1 {
            pinmux = <PIN_PB3__FLEXCOM11_IO0>,
                     <PIN_PB4__FLEXCOM11_IO1>,
                     <PIN_PB5__FLEXCOM11_IO2>,
                     <PIN_PB6__GPIO>; /* GPIO CS */
            bias-pull-up;
          };
        };
      };

      spi11: spi@400 {
        pinctrl-0 = <&pinctrl_spi11_default>;
        pinctrl-names = "default";
        dmas = <&dma0 0 28>,
               <&dma0 1 27>;
        dma-names = "tx", "rx";
        cs-gpios = <&piob 6 GPIO_ACTIVE_LOW>;
        status = "okay";
      };

compatible: "microchip,flexcom-g1-spi"

include:
  - name: spi-controller.yaml
  - name: pinctrl-device.yaml

properties:
  reg:
    required: true

  clocks:
    required: true

  clock-names:
    required: true

  loopback:
    type: boolean
    description: |
      Connects TX to RX internally creating a loop back connection. Useful
      for testing.

  dmas:
    description: |
      TX & RX dma specifiers.  Each specifier will have a phandle
      reference to the dma controller, the channel number, and peripheral
      trigger source. The channel number is arbitrary but must not be
      reused. The number of channels available is device dependent.

  dma-names:
    description: |
      This should be "tx" and "rx" and should match the order given for
      dmas.
