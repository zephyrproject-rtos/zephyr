description: |
   Bee SPI

compatible: "realtek,bee-spi"

include: [spi-controller.yaml, reset-device.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  clocks:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  is-slave:
    type: boolean
    description: Indicate the spi is spi slave.
