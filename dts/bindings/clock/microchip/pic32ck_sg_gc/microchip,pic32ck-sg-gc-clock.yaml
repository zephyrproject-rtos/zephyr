title: Microchip PIC32CK_SG_GC SOC family clock

description: |
  Microchip PIC32CK_SG_GC SOC family clock controller.

  Provides the clock subsystem for the PIC32CK_SG_GC SoC family, covering the
  OSCCTRL (1kHz oscillators), OSC32KCTRL (32 kHz oscillators), GCLK and
  MCLK (AHB/APB bus clocks) blocks.
  It acts as the central clock provider that peripherals reference through
  their "clocks" property.

  Example:

    clock: clock@40001000 {
      compatible = "microchip,pic32ck-sg-gc-clock";
      reg = <0x40001000 0x400>;
      #clock-cells = <2>;
      status = "okay";
    };

include:
  - name: base.yaml
  - name: pinctrl-device.yaml

compatible: "microchip,pic32ck-sg-gc-clock"

properties:
  on-timeout-ms:
    type: int
    default: 5
    description: |
      Timeout in milliseconds for clock to be on.

      Driver waits in clock on API to check if the clock is actually on,
      so that the waiting time is not indefinite.

  flash-auto-wait-state-en:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      Automatic wait state enable
      0: to disable, 1: to enable

  flash-wait-states:
    type: int
    default: 0
    description: |
      Number of wait states for a flash read operation.

      Change this value based on the NVM access time and system frequency
      up to 15 wait states.
