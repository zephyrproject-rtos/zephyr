title: PIC32CK_SG_GC External Crystal Oscillator (XOSC32K)

description: |
  32.768 kHz External Crystal Oscillator (XOSC32K) Control.

  Controls the low-frequency 32.768 kHz oscillator, which can be driven by an
  external crystal or an external clock input. Provides configuration for the
  gain mode, servo loop, gain boost, start-up time, clock-failure detection
  with safe-clock fallback, and RTC clock selection. The XOSC32K output is
  commonly used as a low-power and RTC clock source.

  Example:

    xosc32k: xosc32k {
      compatible = "microchip,pic32ck-sg-gc-xosc32k";
      xosc32k-enable = <1>;
      xosc32k-xtal-en = <1>;
      xosc32k-frequency = <32768>;
      xosc32k-startup-time = <1000>;
    };

include: [base.yaml]

compatible: "microchip,pic32ck-sg-gc-xosc32k"

properties:
  xosc32k-enable:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      Oscillator Enable

  xosc32k-xtal-en:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      Selects external clock or crystal oscillator
      0 - External clock connected on XIN. XOUT can be used as general-purpose I/O.
      1 - Crystal connected to XIN/XOUT.

  xosc32k-frequency:
    type: int
    default: 0
    description: |
      32.768 kHz frequency

  xosc32k-on-demand-en:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      0: The oscillator is always on, if standby-en is true, else run in
         Standby Sleep mode if requested by a peripheral.
      1: Run if requested by peripheral
      Important: Initializing it with 1, along with clock enabled, can lead to indefinite wait for
      the clock to be on, if there is no peripheral request for the clock in the sequence of clock
      Initialization. If required, better to turn on the clock using API, instead of enabling both
      during startup.

  xosc32k-control-gain-mode:
    type: string
    enum:
      - "lower-gain-mode-value"
      - "higher-than-cgm0"
      - "higher-than-cgm1"
      - "higher-than-cgm2"
      - "higher-than-cgm3"
      - "higher-than-cgm4"
      - "higher-than-cgm5"
      - "higher-than-cgm6"
      - "higher-than-cgm7"
      - "higher-than-cgm8"
      - "higher-than-cgm9"
      - "higher-than-cgm10"
      - "higher-than-cgm11"
      - "higher-than-cgm12"
      - "higher-than-cgm13"
      - "highest-gain-mode-value"
    default: "higher-than-cgm7"
    description: |
      control the gain of the external crystal oscillator

  xosc32k-servo-loop-en:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      xosc32k servo loop
      0 - enable
      1-  disable

  xosc32k-gain-boost:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      xosc32k gain boost
      0 - enable
      1-  disable

  xosc32k-startup-time:
    type: int
    enum:
      - 0
      - 1
      - 2
      - 63
      - 125
      - 250
      - 500
      - 1000
      - 2000
      - 4000
      - 8000
    default: 1000
    description: |
      Oscillator Start-Up Time in ms

  xosc32k-rtc-clk-selection-en:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      xosc RTC clock selection
      0 - enable
      1-  disable


  xosc32k-cfd-en:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      Clock Failure Detector Enable
      0: to disable, 1: to enable

  xosc32k-cfd-prescaler:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      Clock Failure Detector Prescaler
      0: The CFD safe clock frequency is the OSCULP32K frequency
      1: The CFD safe clock frequency is the OSCULP32K frequency divided by 2

  xosc32k-cfd-switchback-en:
    type: int
    enum:
      - 0
      - 1
    default: 0
    description: |
      Clock Switch Back
      0: to disable, 1: to enable
