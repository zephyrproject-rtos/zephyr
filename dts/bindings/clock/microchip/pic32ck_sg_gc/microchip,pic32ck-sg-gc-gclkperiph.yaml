title: PIC32CK_SG_GC Generic clock peripheral

description: |
  Microchip PIC32CK_SG_GC Generic Clock Peripheral channels (GCLK_PERIPH).

  The outputs from the Generators are used as sources for the Peripheral
  Channels, which provide the Generic Clock (GCLK_PERIPH) to the peripheral
  modules. Each peripheral channel selects one generator as its source and
  can be independently enabled or disabled.
  Each peripheral channel is described by a child node.

  Example:

    gclkperiph: gclkperiph {
      compatible = "microchip,pic32ck-sg-gc-gclkperiph";
      #clock-cells = <1>;

      sercom0 {
        subsystem = <CLOCK_MCHP_GCLKPERIPH_ID_SERCOM0>;
        gclkperiph-src = "gclk0";
        gclkperiph-en = <1>;
      };
    };

include: [base.yaml]

compatible: "microchip,pic32ck-sg-gc-gclkperiph"

properties:
  "#clock-cells":
    const: 1
    type: int
    description: |
      The subsystem cell is to identify a clock controller sub-system.

      The subsystem can be referred from include\zephyr\dt-bindings\clock\mchp_pic32ck_gc_clock.h,
      under the GCLKPERIPH_TYPE section of ids.
      All clock control API use this value to specify the clock on which the API operates.
      Since subsystem is opaque to the user, it can be accessed from the devicetree node and used.

clock-cells:
  - subsystem

child-binding:
  properties:
    subsystem:
      type: int
      required: true
      description: |
        Clock subsystem

    gclkperiph-src:
      type: string
      enum:
        - "gclk0"
        - "gclk1"
        - "gclk2"
        - "gclk3"
        - "gclk4"
        - "gclk5"
        - "gclk6"
        - "gclk7"
        - "gclk8"
        - "gclk9"
        - "gclk10"
        - "gclk11"
      default: "gclk0"
      description: |
        Generator to be used as the source of a peripheral clock

    gclkperiph-en:
      type: int
      enum:
        - 0
        - 1
      default: 0
      description: |
        This bit is used to enable and disable a Peripheral Channel.
          0 The Peripheral Channel is disabled
          1 The Peripheral Channel is enabled
