title: PIC32CM_SG_GC RTC clock

description: |
  RTC clock configuration.

include: [base.yaml]

compatible: "microchip,pic32cm-sg-gc-rtc"

properties:
  "#clock-cells":
    const: 1
    type: int

  rtc-src:
    type: int
    default: 0
    description: |
      RTC source clock selection
      0: ulp32k
      1: ulp1k
      2: xosc32k
      3: xosc1k

clock-cells:
  - subsystem

examples:
  - |
    #Usage example:

    &clock {
      compatible = "microchip,pic32cm-sg-gc-clock";

      rtcclock: rtcclock {
        compatible = "microchip,pic32cm-sg-gc-rtc";
        #clock-cells = <1>;
        rtc-src = <0>;
      };
    };
