title: PIC32CM_SG_GC Main clock domains

description: |
  Main Clock Controller provides synchronous system clocks to the CPU & peripherals.

include: [base.yaml]

compatible: "microchip,pic32cm-sg-gc-mclkdomain"

child-binding:
  properties:
    subsystem:
      type: int
      required: true
      description: Clock subsystem

    mclk-div:
      type: int
      enum:
        - 1
        - 2
        - 4
        - 8
        - 16
        - 32
        - 64
        - 128
      default: 1
      description: |
        Clock Division Factor

examples:
  - |
    #Usage example:

    &clock {
      compatible = "microchip,pic32cm-sg-gc-clock";

      mclkdomain: mclkdomain {
        compatible = "microchip,pic32cm-sg-gc-mclkdomain";

        mclkcpu {
          subsystem = <CLOCK_MCHP_MCLKDOMAIN_ID_CPU>;
          mclk-div = <1>;
        };
      };
    };
