description: |
  Microchip SAM Slow Clock Controller (SCKC)

compatible: "microchip,sama7g5-sckc"

include: [clock-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  "#clock-cells":
    const: 1
    description: |
      from common clock binding; shall be set to 1.

  slow-rc-frequency:
    type: int
    default: 64000
    description: The frequency of the enbedded Slow RC Oscillator.

clock-cells:
  - clock-crystal-osc
