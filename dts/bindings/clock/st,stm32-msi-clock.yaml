description: STM32 MSI Clock

compatible: "st,stm32-msi-clock"

include: [clock-controller.yaml, base.yaml]

properties:
  msi-range:
    required: true
    type: int
    default: 6
    description: |
      MSI clock ranges:
      0: around 100 kHz
      1: around 200 kHz
      2: around 400 kHz
      3: around 800 kHz
      4: around 1 MHz
      5: around 2 MHz
      6: around 4 MHz (reset value)
      7: around 8 MHz
      8: around 16 MHz
      9: around 24 MHz
      10: around 32 MHz
      11: around 48 MHz
    min: 0
    max: 11

  msi-pll-mode:
    type: boolean
    description: |
      MSI clock PLL enable
      Enables the PLL part of the MSI clock source.
