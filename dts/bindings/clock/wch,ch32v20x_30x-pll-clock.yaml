description: WCH CH32V20x/30x PLL

compatible: "wch,ch32v20x_30x-pll-clock"

include: [clock-controller.yaml, base.yaml]

properties:
  "#clock-cells":
    const: 0

  clocks:
    type: phandle-array
    required: true

  mul:
    type: int
    required: true
    description: |
        Main PLL multiplication factor
    enum:
      - 2   # x2
      - 3   # x3
      - 4   # x4
      - 5   # x5
      - 6   # x6
      - 7   # x7
      - 8   # x8
      - 9   # x9
      - 10  # x10
      - 11  # x11
      - 12  # x12
      - 13  # x13
      - 14  # x14
      - 15  # x15
      - 16  # x16
      - 18  # x18

  hsi-prediv:
    type: int
    default: 1
    description: |
        HSI predivider value before PLL input. Controls the EXTEN_PLL_HSI_PRE
        bit in the EXTEN_CTR register. Only applicable when the PLL clock source
        is HSI. The HSI predivider has a hardware default of /2, but we use a default
        of /1 to allow for mul values to be interchangeable with HSE.
        1 = HSI fed directly to PLL (no division, matches HSE behavior)
        2 = HSI divided by 2 before PLL (hardware reset default)
    enum:
      - 1
      - 2
