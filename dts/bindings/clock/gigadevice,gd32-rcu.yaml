description: |
    This binding gives a base representation of the GD32 reset control unit

compatible: "gigadevice,gd32-rcu"

include: [clock-controller.yaml, base.yaml]

properties:
    reg:
      required: true

    "#clock-cells":
      const: 2

clock-cells:
  - bus
  - bits
