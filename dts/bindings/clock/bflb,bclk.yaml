description: |
  The BCLK clock, or peripheral clock
  Source -> / divider -> This Clock

compatible: "bflb,bclk"

include: [base.yaml, clock-controller.yaml]

properties:
  divider:
    type: int
    required: true
    description: Divide root clock by this 8-bits value.

  "#clock-cells":
    const: 0
