description: |
  The representation of Raspberry Pi Pico's PLL.

compatible: "raspberrypi,pico-pll"

include: [base.yaml, fixed-factor-clock.yaml]

properties:
  fb-div:
    type: int
    required: true
    description: |
      The feedback divider value.
    min: 16
    max: 320

  post-div1:
    type: int
    required: true
    description: |
      The post clock divider.
    min: 1
    max: 49

  post-div2:
    type: int
    required: true
    description: |
      The post clock divider.
    min: 1
    max: 49
