description: |
  The BL60x Root Clock

compatible: "bflb,bl60x-root-clk"

include: [base.yaml, clock-controller.yaml]

properties:
  clocks:
    type: phandle-array
    required: true
    description: source

  pll-select:
    type: int
    required: true
    enum:
      - 0
      - 1
      - 2
      - 3
    description: |
      Select PLL divider ID
      0 = 48M, 1 = 120M, 2 = 160M, 3 = 192M

  divider:
    type: int
    required: true
    description: Divide source clock by this 8-bits value. Typically 1.
