description: Nordic nRF high-frequency crystal oscillator (nRF51 series)

compatible: "nordic,nrf51-hfxo"

include: fixed-clock.yaml

properties:
  clock-frequency:
    const: 16000000

  startup-time-us:
    type: int
    required: true
    description: Startup time in microseconds.
