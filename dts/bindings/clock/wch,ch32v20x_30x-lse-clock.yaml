description: WCH CH32F/V20x_30x Low Speed External clock

compatible: "wch,ch32v20x_30x-lse-clock"

include: [fixed-clock.yaml]

properties:
  lse-bypass:
    type: boolean
    description: |
      LSE Crystal oscillator bypass
      Set to the property to by-pass the oscillator with an external clock.
