description: |
  Xilinx AXI Interrupt Controller (PG099).

  Hardware capabilities are described on a per-instance basis through
  devicetree properties generated by Vivado. Optional register blocks
  may or may not be present depending on the IP configuration.

compatible: "xlnx,xps-intc-1.00.a"

include: [interrupt-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  "#interrupt-cells":
    const: 2

  xlnx,num-intr-inputs:
    type: int
    required: true
    description: |
      Number of interrupt inputs implemented in this instance (IP parameter
      C_NUM_INTR_INPUTS). Valid range is 1 to 32.

  xlnx,is-fast:
    type: int
    default: 0
    description: |
      Vivado configuration parameter C_HAS_FAST.

      This property is modeled as an integer to match the value generated by
      Vivado (0 = disabled, 1 = enabled).

      Non-zero if the IP was synthesized with fast interrupt support.

      Fast interrupt mode is currently not supported by the Zephyr driver.

  xlnx,has-ipr:
    type: int
    default: 0
    description: |
      Vivado configuration parameter C_HAS_IPR.

      This property is modeled as an integer to match the value generated by
      Vivado (0 = absent, 1 = present).

      Non-zero when the Interrupt Pending Register (IPR) is present.

  xlnx,has-sie:
    type: int
    default: 0
    description: |
      Vivado configuration parameter C_HAS_SIE.

      This property is modeled as an integer to match the value generated by
      Vivado (0 = absent, 1 = present).

      Non-zero when the Set Interrupt Enable (SIE) register is present.

  xlnx,has-cie:
    type: int
    default: 0
    description: |
      Vivado configuration parameter C_HAS_CIE.

      This property is modeled as an integer to match the value generated by
      Vivado (0 = absent, 1 = present).

      Non-zero when the Clear Interrupt Enable (CIE) register is present.

  xlnx,has-ivr:
    type: int
    default: 0
    description: |
      Vivado configuration parameter C_HAS_IVR.

      This property is modeled as an integer to match the value generated by
      Vivado (0 = absent, 1 = present).

      Non-zero when the Interrupt Vector Register (IVR) is present.

interrupt-cells:
  - irq
  - priority


examples:
  - |
    soc {
      #address-cells = <1>;
      #size-cells = <1>;

      axi_intc: interrupt-controller@41200000 {
        compatible = "xlnx,xps-intc-1.00.a";
        reg = <0x41200000 0x1000>;
        interrupt-controller;
        #interrupt-cells = <2>;

        xlnx,has-ipr = <1>;
        xlnx,has-sie = <1>;
        xlnx,has-cie = <1>;
        xlnx,has-ivr = <1>;
        xlnx,num-intr-inputs = <11>;

      };
    };
