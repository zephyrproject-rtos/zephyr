description: Renesas RZG external interrupt controller

compatible: "renesas,rz-ext-irq"

include: [interrupt-controller.yaml, base.yaml, pinctrl-device.yaml]

properties:
  "#address-cells":
    const: 0

  "#interrupt-cells":
    const: 2

  trigger-type:
    required: true
    type: int
    description: |
      Indicates the condition that will trigger an interrupt when detected.
      Trigger-type should be one of these options: RZ_EXTERNAL_IRQ_TRIG_FALLING,
      RZ_EXTERNAL_IRQ_TRIG_RISING, RZ_EXTERNAL_IRQ_TRIG_BOTH_EDGE, RZ_EXTERNAL_IRQ_TRIG_LEVEL_LOW
