title: STM32 USB HS PHY

description: |
    USB High-Speed PHY as first found in STM32U5 series.

    PHYs described by this binding are configured using registers located
    in a shared IP such as RCC or SYSCFG, unlike `st,stm32-usbphyc` PHYs
    which have dedicated MMIO interfaces.

compatible: "st,stm32u5-otghs-phy"

include: phy-controller.yaml

properties:
  "#phy-cells":
    const: 0

  clocks:
    required: true

  clock-reference:
    type: string
    required: true
    enum:
      - "16M"
      - "19.2M"
      - "20M"
      - "24M"
      - "26M"
      - "32M"
    description: |
      Input frequency of the HS PHY (in MHz: "1M" = 1 MHz)

      The correct value depends on the system's clock configuration,
      including the `clocks` property of this node.

examples:
  - |
    /* Supported clock configurations on STM32U5 */

    /* HSE */
    clocks = <&rcc STM32_CLOCK(AHB2, 15)>,
              <&rcc STM32_SRC_HSE OTGHS_SEL(0)>;

    /* HSE/2 */
    clocks = <&rcc STM32_CLOCK(AHB2, 15)>,
              <&rcc (STM32_SRC_HSE | STM32_CLOCK_DIV(2)) OTGHS_SEL(2)>;

    /* PLL1_P_CK */
    clocks = <&rcc STM32_CLOCK(AHB2, 15)>,
              <&rcc STM32_SRC_PLL1_P OTGHS_SEL(1)>;

    /* PLL1_P_CK/2 */
    clocks = <&rcc STM32_CLOCK(AHB2, 15)>,
              <&rcc (STM32_SRC_PLL1_P | STM32_CLOCK_DIV(2)) OTGHS_SEL(3)>;
