description: STM32 USB HS PHY controller

compatible: "st,stm32-usbphyc"

include: phy-controller.yaml

properties:
  clocks:
    required: true

  clock-names:
    required: true
    enum:
      - "gate"
      - "mux"
      - "fsel"
    description: |
      Up to three clock cells are accepted:
      - "gate": clock gate in front of the USBPHYC PLL clock input
      - "mux": clock mux selecting source used as USBPHYC PLL clock
      - "fsel": USBPHYC PLL clock frequency selection
                (applicable only when this is configured at RCC level)

      Refer to the Reference Manual applicable for your product to find
      which cells should be provided for proper operation.

  "#phy-cells":
    const: 0

examples:
  - |
    /* In DTS for STM32N6-based board */
    &usbphyc1 {
      clocks = <&rcc STM32_CLOCK(AHB5, 27)>,
               <&rcc STM32_SRC_HSE OTGPHY1_SEL(3)>;
      clock-names = "gate", "mux";
    };
