description: |
  A temperature transducer is a device that converts a thermal quantity
  into any other physical quantity. This binding applies to temperature to
  voltage (like the LTC2997), and temperature to current (like the AD590)
  linear transducers.
  In both cases these are assumed to be connected to a voltage ADC.

  When an io-channel measures the output voltage of a temperature analog front
  end such as a temperature transducer, the interesting measurement is almost
  always the corresponding temperature, not the voltage output. This binding
  describes such a circuit.

  The general transfer function here is (using SI units)
    V(T) = Rsense * Isense(T)
    T = (Isense(T) / alpha) + offset
    T = 1 / (Rsense * alpha) * (V + offset * Rsense * alpha)

  When using a temperature to voltage transducer, Rsense is set to 1.

  The following circuits show a temperature to current and a temperature to
  voltage transducer that can be used with this binding.

           VCC
          -----
            |
        +---+---+
        | AD590 |                               VCC
        +---+---+                              -----
            |                                    |
            V proportional to T             +----+----+
            |                          D+ --+         |
            +---- Vout                      | LTC2997 +--- Vout
            |                          D- --+         |
        +---+----+                          +---------+
        | Rsense |                               |
        +---+----+                             -----
            |                                   GND
          -----
           GND

  This is based on Linux, documentation:
    https://www.kernel.org/doc/Documentation/devicetree/bindings/iio/afe/temperature-transducer.yaml

compatible: "temperature-transducer"

include: base.yaml

properties:
  io-channels:
    required: true
    description: |
      Channel node of a voltage io-channel.

  sense-offset-millicelsius:
    type: int
    default: 0
    description: |
      Temperature offset in millicelsius.
      This offset is commonly used to convert from Kelvins to degrees Celsius.
      In that case, sense-offset-millicelsius would be set to <(-273150)>.

      When the datasheet specifies an output voltage at a reference temperature
      (e.g., 400 mV at 0°C for the TMP236), the offset must be calculated from
      the transfer function. For a sensor with VOUT = V0 + (alpha × T)

        sense-offset-millicelsius = -(V0_mV × 1,000,000) / alpha-ppm-per-celsius

      Example for TMP236 (V0 = 400 mV at 0°C, alpha = 19.5 mV/°C = 19500 µV/°C)

        sense-offset-millicelsius = -(400 × 1,000,000) / 19500 = -20513

  sense-resistor-ohms:
    type: int
    default: 1
    description: |
      The sense resistor in ohms.
      By default sense-resistor-ohms cancels out the resistor making the
      circuit behave like a temperature transducer.

  alpha-ppm-per-celsius:
    type: int
    required: true
    description: |
      Sometimes referred to as output gain, slope, or temperature coefficient.

      alpha is expressed in parts per million which can be micro-amps per
      degrees Celsius or micro-volts per degrees Celsius. This is the main
      characteristic of a temperature transducer and should be stated in the
      datasheet.

  power-gpios:
    type: phandle-array
    description: |
      GPIO used to control power to the temperature transducer.
      When specified, the driver will automatically enable power during
      sample_fetch() and disable it afterward for power saving.

  power-on-sample-delay-us:
    type: int
    default: 0
    description: |
      Delay in microseconds after enabling power-gpios before sampling.
      This allows the sensor output to stabilize after power-on.
      Consult the sensor datasheet for required startup time.

examples:
  - |
    ad950: temperature-sensor-0 {
        compatible = "temperature-transducer";
        #io-channel-cells = <0>;
        io-channels = <&temp_adc 3>;

        sense-offset-millicelsius = <(-273150)>; /* Kelvin to degrees Celsius */
        sense-resistor-ohms = <8060>;
        alpha-ppm-per-celsius = <1>; /* 1 uA/K */
    };
  - |
    znq_tmp: temperature-sensor-1 {
        compatible = "temperature-transducer";
        #io-channel-cells = <0>;
        io-channels = <&temp_adc 2>;

        sense-offset-millicelsius = <(-273150)>; /* Kelvin to degrees Celsius */
        alpha-ppm-per-celsius = <4000>; /* 4 mV/K */
    };
