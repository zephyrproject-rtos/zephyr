description: NXP External Watchdog Monitor

compatible: "nxp,ewm"

include: base.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  clk-sel:
    type: int
    description: |
      Watchdog clock select, valid range 0-3
      (See the chip-specific information for clock sources used).

  clk-divider:
    type: int
    description: Watchdog clock divider, valid range 0-255.

  input-trigger-en:
    type: boolean
    description: |
      When enabled the ewm_in signal can be used
      to assert the ewm.

  input-trigger-active-high:
    type: boolean
    description: |
      When enabled the ewm_in signal is active high.
      The ewm_in signal is active low otherwise.
