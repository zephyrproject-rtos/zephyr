description: |
  This binding describes the Sifli SF32LB watchdog timer (WDT).

compatible: "sifli,sf32lb-wdt"

include: [base.yaml, sifli-sf32lb-pmuc.yaml, sifli-sf32lb-cfg.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  sifli,pmuc:
    required: true

  sifli,cfg:
    required: true

  sifli,reset-all:
    type: boolean
    description: |
      If set, the watchdog will be configured to reset the whole chip, including
      LCPU. Otherwise, it will only reset HCPU.
