description: Infineon CAT1 Watchdog

compatible: "infineon,watchdog"

include: [base.yaml, "infineon,system-interrupts.yaml"]

properties:
  reg:
    required: true

  interrupts:
    description: Required for non-cat1c devices

  system-interrupts:
    description: Required for cat1c devices

  infineon,wdt-lock:
    type: boolean
    description: |
      The watchdog has lock/unlock protection registers. When set, the driver
      unlocks the configuration registers before each update and locks them
      afterwards to guard against unintended writes.
