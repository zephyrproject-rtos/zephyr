description: |
  Renesas IPC MBOX

  Notes:
  - With Renesas IPC MBOX, both TX and RX functions can be used on a single channel.
  - Currently, all channels support signal mode, while only channel "0" supports message mode.

compatible: "renesas,ra-ipc-mbox"

include: [base.yaml, mailbox-controller.yaml]

properties:
  unit:
    type: int
    required: true
    description: |
      MBOX unit index number.
      A unit will use 2 FIFO for read and write operation: IPC1x and IPC0x, with x is the unit index
      For example, the MBOX unit 0 will use IPC10 and IPC00

  reg:
    required: true

  interrupts:
    required: true

  channel-mask:
    type: int
    required: true
    description: Bitmask representing the supported channels

mbox-cells:
  - channel
