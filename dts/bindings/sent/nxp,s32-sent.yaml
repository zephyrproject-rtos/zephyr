description: Devicetree binding for NXP S32 Single Edge Nibble Transmission (SENT) Receiver

compatible: "nxp,s32-sent"

include: [sent-controller.yaml, pinctrl-device.yaml]

properties:
  interrupts:
    required: true

  clocks:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

child-binding:

  compatible: "nxp,s32-sent-channel"

  properties:
    bus-timeout-cycles:
      type: int
      required: true
      enum:
        - 0
        - 256
        - 512
        - 1024
        - 2048
      description: |
        Specifies the number of bus timeout cycles. This value determines the maximum number
        of cycles the bus will wait before timing out.
