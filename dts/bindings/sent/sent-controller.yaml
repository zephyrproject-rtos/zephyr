description: Devicetree binding for Single Edge Nibble Transmission (SENT)

include: base.yaml

properties:
  reg:
    required: true

child-binding:
  description: |
    Each child node defines the configuration of a Single Edge Nibble Transmission (SENT) channel

  properties:
    reg:
      type: array
      required: true
      description: Channel identifier.

    num-data-nibbles:
      type: int
      enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
      required: true
      description: |
        Specifies the number of data nibbles. A nibble is a four-bit aggregation.
        This property defines how many such nibbles are used in the data transmission.

    tick-time-prescaler-us:
      type: int
      required: true
      description: |
        Specifies the tick time prescaler in microseconds (us). This value determines the
        base time unit for the system's timing operations, effectively setting the resolution
        of the timer.

    calib-method-low-latency:
      type: boolean
      description: |
        Indicates whether the successive calibration pulse check method with low latency is enabled.
        This method ensures faster calibration by reducing the delay between successive pulses.

    calib-pulse-range-25:
      type: boolean
      description: |
        Indicates whether a 25% variation in the calibration pulse is acceptable.
        If not, a 20% variation is acceptable.

    pause-pulse-enable:
      type: boolean
      description: |
        Indicates whether the channel is enabled to detect a pause pulse.

    crc-check-disable:
      type: boolean
      description: |
        Indicates whether the CRC message check is disabled.

    crc-no-data-nibble-xor:
      type: boolean
      description: |
        Indicates whether the CRC message implementation avoids using the zero data nibble
        XOR method. When set to true, the CRC calculation will not include the XOR operation
        with zero data nibbles.

    crc-status-nibble-include:
      type: boolean
      description: |
        Indicates whether the message CRC implementation includes the status and
        communication nibble when calculating the CRC for fast messages.
