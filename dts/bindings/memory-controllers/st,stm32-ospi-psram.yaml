description: |
  STM32 OSPI PSRAM.

compatible: "st,stm32-ospi-psram"

include: [base.yaml]

properties:
  reg:
    required: true

  size:
    type: int
    required: true
    description: Memory size in bits

  max-frequency:
    type: int
    required: true
    description: Maximum clock frequency of device's OSPI interface in Hz

  memory-type:
    type: string
    required: true
    description: |
      OSPI Memory Type
    enum:
      - "micron"
      - "macronix"
      - "apmemory"
      - "macronix_ram"
      - "hyperbus"
