description: |
  NXP i.MX SNVS Low-Power General Purpose Registers used as battery-backed
  RAM.

  The SNVS LPGPR bank retains its contents across resets as long as the SNVS
  Low-Power domain is powered (typically via VBAT). A security violation
  detected by the SNVS tamper logic will zeroize this bank when LPCR.GPR_Z_DIS
  is clear (the reset default).

compatible: "nxp,imx-snvs-gpr"

include: base.yaml
