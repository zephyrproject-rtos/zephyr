description: |
  Operational Amplifier (opamp)

include:
  - name: base.yaml

properties:
  "#io-channel-cells":
    type: int
    required: true

  functional-mode:
    type: string
    enum:
      - "pga"
      - "inverting"
      - "non_inverting"
      - "follower"
    description: |
      Selects opamp functional mode.
