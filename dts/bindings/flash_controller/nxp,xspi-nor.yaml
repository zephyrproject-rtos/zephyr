description: NXP XSPI Flash Controller

compatible: "nxp,xspi-nor"

include: ["nxp,xspi-device.yaml", "jedec,jesd216.yaml"]

properties:
  reset-gpios:
    type: phandle-array
    description: |
      RESET# pin of the flash device. When present, the driver pulses it at initialization.
      Only used when the application does not XIP from this flash.

  initial-soft-reset:
    type: boolean
    description: |
      Issue a software reset sequence at initialization.
