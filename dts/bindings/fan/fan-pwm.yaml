title: PWM-driven fan

description: |
    A cooling fan whose speed is controlled by a PWM signal. The PWM duty cycle sets the fan
    speed, from 0% (stopped) to 100% (full speed). Applications drive the fan through the generic
    fan API in <zephyr/drivers/fan.h>.

compatible: "fan-pwm"

include: base.yaml

properties:
  pwms:
    required: true
    type: phandle-array
    description: |
      PWM specifier for the channel wired to the fan speed-control input. The period cell sets
      the PWM frequency used to drive the fan; the driver adjusts the duty cycle at runtime as
      the application requests speeds. Polarity flags are forwarded to the PWM controller
      verbatim.
