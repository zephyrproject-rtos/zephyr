description: |
    GPIO pins exposed on the ESP Thread Border Router sub-board header.

    The ESP Thread BR board provides a sub-board connector for expansion
    modules such as the Ethernet (W5500) sub-board.

    This binding provides a nexus mapping for the following pins:

         Conn J4 (2x13)
         ==========================
         Signal    Pin    Signal
         --------------------------
          (GND)   1   2   (GND)
           (5V)   3   4   (3V3)
         GPIO15   5   6   GPIO16
         GPIO03   7   8   GPIO46
         GPIO09   9   10  GPIO14
         GPIO21  11   12  GPIO47
         GPIO48  13   14  GPIO45
         GPIO35  15   16  GPIO36
         GPIO37  17   18  GPIO38
         GPIO39  19   20  GPIO40
         GPIO41  21   22  GPIO42
          U0_RX  23   24  U0_TX
         GPIO02  25   26  GPIO01

compatible: "espressif,esp-threadbr-header"

include: [gpio-nexus.yaml, base.yaml]
