description: Series 0-2 GPIO (General Purpose Input/Output) Port

compatible: "silabs,gecko-gpio-port"

include: [gpio-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  peripheral-id:
    type: int
    description: peripheral ID

  "#gpio-cells":
    const: 2

gpio-cells:
  - pin
  - flags
