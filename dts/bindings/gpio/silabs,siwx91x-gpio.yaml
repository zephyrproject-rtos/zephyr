description: Silabs SiWx91x GPIO

compatible: "silabs,siwx91x-gpio"

include: base.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  silabs,port-count:
    type: int
    description: |
        Number of ports present in the GPIO controller
    required: true

  silabs,max-pin-usage-count:
    type: int
    description: |
        Maximum number of pins used as GPIO, not applicable for UULP nodes
        For HP GPIO, range is between <1 to 64>
        For ULP GPIO, range is between <1 to 16>

  silabs,ulp:
    type: boolean
    description: |
      If this property is set, the GPIO controller uses ULP (ultra low power) pads.
