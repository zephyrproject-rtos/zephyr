description: |
  GPIO pins exposed on Renesas Parallel Graphics Expansion Header.

  This binding provides a nexus mapping for 40 pins Paralel Graphics LCD header, using
  <board>_PARALLEL_GRAPHICS_HEADER_<pin> macros, defined at:
  - include/zephyr/dt-bindings/gpio/renesas-ek-ra6m3g-header.h
  - include/zephyr/dt-bindings/gpio/renesas-ek-ra8d1-header.h

compatible: "renesas,ra-parallel-graphics-header"

include: [gpio-nexus.yaml, base.yaml]
