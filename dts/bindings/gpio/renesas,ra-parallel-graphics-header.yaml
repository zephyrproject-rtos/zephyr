description: |
  GPIO pins exposed on Renesas Parallel Graphics Expansion Header.

  This binding provides a nexus mapping for 40 pins Paralel Graphics LCD header, using macros
  defined at zephyr/dt-bindings/gpio/renesas-ra-gpio-ioport.h

compatible: "renesas,ra-parallel-graphics-header"

include: [gpio-nexus.yaml, base.yaml]
