description: Infineon GPIO Port

compatible: "infineon,gpio"

include: [gpio-controller.yaml, base.yaml, "infineon,system-interrupts.yaml"]

properties:
  reg:
    required: true

  system-interrupts:
    description: Required for cat1c devices

  "#gpio-cells":
    const: 2

gpio-cells:
  - pin
  - flags
