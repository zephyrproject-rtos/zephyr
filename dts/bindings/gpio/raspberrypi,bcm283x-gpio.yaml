description: Raspberry Pi BCM283x GPIO Expander

compatible: "raspberrypi,bcm283x-gpio"

include: [gpio-controller.yaml, base.yaml]

properties:
  ngpios:
    required: true
    const: 8

  "#gpio-cells":
    const: 2

gpio-cells:
  - pin
  - flags
