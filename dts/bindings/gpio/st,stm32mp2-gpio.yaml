description: |
  STM32MP2 GPIO Controller

  On STM32MP2 platforms, GPIO clocks are controlled and configured by the
  Cortex-A35 core being the resource manager allowed by the Resource Isolation
  Framework (RIF).

compatible: "st,stm32mp2-gpio"

include:
  - name: st,stm32-gpio.yaml
    property-blocklist:
      - clocks
