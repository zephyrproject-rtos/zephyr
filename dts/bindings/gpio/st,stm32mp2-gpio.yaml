description: STM32MP2 GPIO Controller

compatible: "st,stm32mp2-gpio"

include:
  - name: gpio-controller.yaml
    property-blocklist:
      - ngpios
  - name: base.yaml

properties:
  reg:
    required: true

  clocks:
    description: |
      The clocks property is optional for STM32MP2 GPIO controllers.
      This property is not required when the Cortex-A core is responsible for
      GPIO initialization and acts as the resource manager, as defined by the
      RIF (Resource Isolation Framework) peripheral. Adding the GPIO clocks
      in that case would only trigger an IAC event.
      If the Cortex-M core is designated as the resource manager, then the
      clocks property must be defined and added to the device tree.

  "#gpio-cells":
    const: 2

  ngpios:
    type: int
    default: 16
    description: |
        This property indicates the number of in-use slots of available slots
        for GPIOs. The STM32 GPIO controller typically has all 16 possible port
        IO with few exceptions. It should only be necessary to explicitly set
        this property if the controller itself does not implement all 16 port
        IO register bits; for example PORTE in the STM32WB55xx series which only
        implements the first 5. Package restrictions on the number of exposed
        GPIO should not influence this property. For cases in which there might
        be holes in the slot range, this value should be the max slot number+1.

gpio-cells:
  - pin
  - flags
