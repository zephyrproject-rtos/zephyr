description: |
  Analog Devices ADG736 dual SPDT analog switch, GPIO control mode.

  Each of the 2 SPDT switches is controlled by a dedicated GPIO pin
  (IN1 and IN2). The ADG736 has no enable pin.

compatible: "adi,adg736"

include: adi,adg1736-base.yaml

examples:
  - |
    adg736 {
      compatible = "adi,adg736";
      in1-gpios = <&gpio0 0 GPIO_ACTIVE_HIGH>;
      in2-gpios = <&gpio0 1 GPIO_ACTIVE_HIGH>;
    };
