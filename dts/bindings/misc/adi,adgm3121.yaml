description: |
  Analog Devices ADGM3121 DPDT MEMS switch (DC-24GHz), SPI control mode.

  The ADGM3121 contains 4 MEMS switches controlled via a single SPI register
  at address 0x20 using 16-bit SPI frames (Mode 0, MSB-first, max 10MHz).

  Example:

    &spi1 {
      adgm3121: adgm3121@0 {
        compatible = "adi,adgm3121";
        reg = <0>;
        spi-max-frequency = <10000000>;
      };
    };

compatible: "adi,adgm3121"

include: spi-device.yaml
