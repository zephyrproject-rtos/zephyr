description: |
    Nordic PPIB (Programmable Peripheral Interconnect Bridge)

compatible: "nordic,nrf-ppib"

include: base.yaml

properties:
  reg:
    required: true

  channels:
    type: int
    required: true
    description: Number of channels implemented by the PPIB instance.

  offset:
    type: int
    description: |
      Optional offset used in connection within a pair of PPIBs. Offset need to be
      applied to the central PPIB connected to the current PPIB.
