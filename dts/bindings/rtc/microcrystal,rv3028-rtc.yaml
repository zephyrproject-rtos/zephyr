description: Micro Crystal RV3028 RTC, periodic time update and alarm device

compatible: "microcrystal,rv3028-rtc"

include: rtc-device.yaml

examples:
  - |
    /* Example node for an RV3028 RTC on the i2c0 bus. */
    &i2c0 {
      status = "okay";
      clock-frequency = <I2C_BITRATE_STANDARD>;

      rv3028: rv3028@52 {
        compatible = "microcrystal,rv3028";
        reg = <0x52>;
        int-gpios = <&gpiob 7 (GPIO_PULL_UP | GPIO_ACTIVE_LOW)>;
        backup-switch-mode = "disabled";
        status = "okay";

        rv3028_rtc: rtc {
          compatible = "microcrystal,rv3028-rtc";
          status = "okay";
        };
      };
    };
