# SPDX-License-Identifier: Apache-2.0
description: TI ADS79xx-Q1 SPI ADC (ADS7950..ADS7961 family) in manual mode

include: [spi-device.yaml, adc-controller.yaml]

properties:
  ti,range:
    type: int
    default: 1
    enum: [1, 2]
    description: |
      Input range selection for manual mode:
      1 = 0..Vref
      2 = 0..2*Vref (requires 2*Vref <= VA)

  ti,powerdown-between-samples:
    type: boolean
    description: |
      If present, set the manual-mode PD bit so the ADC powers down at end of each
      16-SCLK frame. (Increases latency; saves power.)

