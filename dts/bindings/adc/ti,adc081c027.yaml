description: |
  Texas Instruments ADC081C027: single-channel 8-bit I2C ADC of the ADCxx1C
  family. The ALERT output of the 021 variants is replaced by an address
  selection input, so this part cannot signal an alert to the host.

  The conversion result is left aligned in D11:D0 of the conversion result
  register.

compatible: "ti,adc081c027"

include: ti,adcxx1c-base.yaml
