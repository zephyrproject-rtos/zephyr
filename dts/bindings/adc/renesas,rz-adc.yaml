description: "Renesas RZ ADC"

compatible: "renesas,rz-adc"

include: [adc-controller.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  vref-mv:
    type: int
    required: true
    description: Indicates the reference voltage of the ADC in mV.

  channels-count:
    type: int
    required: true
    description: ADC channels number

  "#io-channel-cells":
    const: 1

io-channel-cells:
  - input
