description: ADC binding for the Texas Instruments 8 channel 12 bit I2C ADC with GPIOs

compatible: "ti,tla2528-adc"

include: [adc-controller.yaml, base.yaml]

on-bus: tla2528

properties:
  "#io-channel-cells":
    const: 1

io-channel-cells:
  - input
