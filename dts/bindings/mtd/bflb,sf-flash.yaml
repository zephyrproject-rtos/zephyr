title: Bouffalolab Serial Flash controller Flash

description: Bouffalolab Serial Flash controller Flash or device compatible with JESD216

compatible: "bflb,sf-flash"

include:
  - "bflb,sf-device.yaml"
  - "jedec,spi-nor-common.yaml"

examples:
  - |
    // mx25l51245g in DIO mode.
    mx25l51245g: flash@0 {
      compatible = "bflb,sf-flash", "soc-nv-flash";
      reg = <0 0x1000000>;
      write-block-size = <1>;
      erase-block-size = <DT_SIZE_K(4)>;

      spi-bus-mode = <3>;
      sf-pad = <3>;
      jedec-id = [c2 20 1a];
      use-sfdp;

      initialization-sequence = <0x06 0x0 0x0 0x1 0x0002 0x2>;
      partitions {
        #address-cells = <1>;
        #size-cells = <1>;

        storage_partition2: partition2@0 {
          compatible = "zephyr,mapped-partition";
          label = "storage_2";
          reg = <0x0 0x1000000>;
        };
      };
    };

properties:
  use-sfdp:
    type: boolean
    description: |
      Fetch commands from flash using SFDP instead of using defaults (Recommended).
      In the case of setting both 'override-bank1' and this, bank1 will use the sdfp command
      matching the spi-bus-mode selected, or override with dts command if it is set.
