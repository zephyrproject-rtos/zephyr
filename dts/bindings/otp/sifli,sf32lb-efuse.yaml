title: SiFli SF32LB eFuse OTP

description: |
  SiFli SF32LB series eFuse OTP memory controller.

  This controller exposes the eFuse contents through the Zephyr OTP driver API.
  It can also be used as an NVMEM provider by defining an `nvmem-layout` node
  with `compatible = "fixed-layout"` and adding child nodes that describe
  NVMEM cells via `reg = <offset size>`.

compatible: "sifli,sf32lb-efuse"

include: base.yaml

examples:
  - |
    efuse: otp@5000c000 {
      compatible = "sifli,sf32lb-efuse";
      reg = <0x5000c000 0x100>;
      sifli,pmuc = <&pmuc>;
      sifli,bank-size = <32>;
      sifli,bank-offsets = <0x30 0x50 0x70 0x90>;
      status = "okay";

      nvmem-layout {
        compatible = "fixed-layout";
        #address-cells = <1>;
        #size-cells = <1>;

        sf32lb52_uid: uid@0 {
          reg = <0x0 0x10>;
          read-only;
          #nvmem-cell-cells = <0>;
        };

        sf32lb52_calib_bank1: calib@20 {
          reg = <0x20 0x20>;
          read-only;
          #nvmem-cell-cells = <0>;
        };
      };
    };

properties:
  reg:
    required: true

  sifli,pmuc:
    type: phandle
    required: true
    description: |
      Reference to the PMUC syscon node. Required for adjusting LDO voltage
      before reading eFuse.

  sifli,bank-size:
    type: int
    default: 32
    description: |
      Size of each eFuse bank in bytes.

  sifli,bank-offsets:
    type: array
    required: true
    description: |
      Register offsets for each bank's data registers. The number of elements
      determines the number of banks. Each offset points to the first data
      register (e.g., BANK0_DATA0) of the corresponding bank.
