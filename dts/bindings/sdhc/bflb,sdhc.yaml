description: Bouffalo Lab SD Host Controller

compatible: "bflb,sdhc"

include: [sdhc.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  bus-width:
    type: int
    default: 4
    description: |
      Data bus width. 1 for 1-bit, 4 for 4-bit. 1-bit width is rarely used.
    enum:
      - 1
      - 4
