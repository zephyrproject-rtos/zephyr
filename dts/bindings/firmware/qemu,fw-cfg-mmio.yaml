description: QEMU fw_cfg (MMIO transport)

compatible: "qemu,fw-cfg-mmio"

include: [base.yaml]

properties:
  reg:
    required: true

examples:
  - |
    fw-cfg@9020000 {
        compatible = "qemu,fw-cfg-mmio";
        reg = <0x0 0x09020000 0x0 0x18>;
        status = "okay";
    };
