description: SCMI (System Control and Management Interface) clock protocol

compatible: "arm,scmi-clock"

include: [base.yaml, clock-controller.yaml]

properties:
  shmem:
    type: phandles

  reg:
    required: true
    const: [0x14]

  "#clock-cells":
    required: true
    const: 1
    description: |
      Vendor-specific clock identifier. Needs to match identifier
      expected by the SCMI platform as this is directly used in SCMI
      clock management messages.

  ignore-denied:
    type: boolean
    description: |
      Enable ignoring SCMI DENIED responses for clock enable/disable requests
      for selected clock IDs listed in ignore-denied-clock-ids.

  ignore-denied-clock-ids:
    type: array
    description: |
      List of SCMI clock identifiers for which SCMI_DENIED (mapped to -EACCES)
      should be treated as success when enabling/disabling clocks.

clock-cells:
  - name
