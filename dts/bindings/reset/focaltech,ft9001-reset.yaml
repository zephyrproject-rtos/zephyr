description: |
  Reset controller for FocalTech FT9001 SoC.
  Reset specifiers use the IDs defined in
  include/zephyr/dt-bindings/reset/focaltech_ft9001_reset.h

compatible: "focaltech,ft9001-reset"

include: [reset-controller.yaml, base.yaml]

properties:
  "#reset-cells":
    const: 1

reset-cells:
  - id
