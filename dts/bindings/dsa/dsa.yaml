description: DSA Device

child-binding:
  description: Properties of port

  include:
    - name: pinctrl-device.yaml
    - name: ethernet-controller.yaml
      property-allowlist:
        - zephyr,random-mac-address
        - local-mac-address
        - phy-handle
        - phy-connection-type

  properties:
    reg:
      type: array
      required: true
      description: Port number
    ethernet:
      type: phandle
      description:
        A phandle to a valid Ethernet device node. This host
        device is what the switch port is connected to.
    tag-protocol:
      type: string
      description:
        Tag protocol the switch using. Or the switch supports no tag way
        if it's not specified on CPU port.
      enum:
        - "netc"
