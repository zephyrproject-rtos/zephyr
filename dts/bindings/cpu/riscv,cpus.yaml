include: cpu.yaml

properties:
  mmu-type:
    description: Memory Management Unit (MMU)
    type: string
    enum:
      - riscv,sv32
      - riscv,sv39
      - riscv,sv48
      - riscv,none

  riscv,isa:
    description: RISC-V instruction set architecture
    required: true
    type: string

  riscv,isa-base:
    description: The base ISA implemented by the hart.
    type: string

  riscv,isa-extensions:
    description: Extensions supported by the hart.
    type: string-array
