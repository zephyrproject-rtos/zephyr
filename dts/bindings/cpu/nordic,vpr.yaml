description: Nordic Semiconductor RISC-V VPR CPU

compatible: "nordic,vpr"

include: riscv-common.yaml

properties:
  nordic,bus-width:
    type: int
    enum:
      - 32
      - 64
    required: true
    description:
      Bus width of the CPU.

  nordic,vpr-ready-event:
    type: int
    description:
      Event which is set by the VPR core (cpuppr) to indicate that it is running.
