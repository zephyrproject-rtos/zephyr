description: Realtek Bee Timer implemented as PWM

compatible: "realtek,bee-pwm"

include: [base.yaml, pwm-controller.yaml, pinctrl-device.yaml]

properties:
  clocks:
    type: phandle-array

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  "#pwm-cells":
    const: 3

pwm-cells:
  - channel
  - period
  - flags
