description: Shakti PWM

compatible: "shakti,pwm"

include: [pwm-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  clock-frequency:
    type: int
    required: true
    description: Clock frequency feeding the PWM block, in Hz.

pwm-cells:
  - channel
  - period
  - flags
