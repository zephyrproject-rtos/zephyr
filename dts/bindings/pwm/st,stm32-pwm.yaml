description: STM32 PWM

compatible: "st,stm32-pwm"

include: [pwm-controller.yaml, base.yaml, pinctrl-device.yaml]

properties:
  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  four-channel-capture-support:
    type: boolean
    description: |
      Add support to capture on four channels. This is less accurate than
      the default 2 channel support because the counter is reset by
      interrupt instead of slave-mode controller. This option can also
      be used as alternative for timers that does not support slave mode.

  dmas:
    description: |
      Optional DMA specifiers used by the DMA-based batch capture backend
      (CONFIG_PWM_CAPTURE_WITH_DMA). One specifier per timer capture/compare
      channel that participates in capture, streaming the CCRx register into a
      RAM ring buffer. For period/pulse capture on channel N, provide both the
      direct channel (CCRn) and its complementary channel used for the pulse.
      Each specifier follows the SoC DMA binding.

  dma-names:
    description: |
      Names matching the "dmas" specifiers. Use "cc1".."cc4" to associate each
      DMA specifier with the corresponding timer capture/compare channel.

  "#pwm-cells":
    const: 3
    description: |
      Number of items to expect in a PWM
      - channel of the timer used for PWM
      - period to set in ns
      - flags : combination of standard flags like PWM_POLARITY_NORMAL
        or specific flags like STM32_PWM_COMPLEMENTARY.
        The input capture prescaler for period capture can be enabled using
        STM32_PWM_CAPTURE_PSC_x (x = 2, 4, 8). The measured period is
        compensated at driver level.
        As an example, the following complementary PWMs(CH2&CH2N) are shown
        below.
          <&pwm1 2 100 (PWM_POLARITY_NORMAL)>;
          <&pwm1 2 100 (PWM_POLARITY_NORMAL | STM32_PWM_COMPLEMENTARY)>;

pwm-cells:
  - channel
  - period
  - flags

examples: |
    &pwm1 {
      status = "okay";
      pinctrl-0 = <&pwm1_ch1_pa8>, <&pwm1_ch2_pa9>;
      pinctrl-names = "default";
      dmas = <&gpdma1 0 SLOT_TIMx_CH1 0>,
             <&gpdma1 1 SLOT_TIMx_CH2 0>;
      dma-names = "cc1", "cc2";
    };
