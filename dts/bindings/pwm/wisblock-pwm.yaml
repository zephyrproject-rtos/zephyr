description: |
  PWM channels exposed on the WisBlock IO connector.

  WisBlock Core modules can expose PWM-capable lines through the WisBlock
  IO connector. This binding provides a nexus mapping where parent pin
  indices correspond to the WISBLOCK_PWM_* constants defined in
  <zephyr/dt-bindings/pwm/wisblock-pwm.h>:

    0   IO1   PWM channel routed to IO1
    1   IO2   PWM channel routed to IO2
    2   IO3   PWM channel routed to IO3
    3   IO4   PWM channel routed to IO4
    4   IO5   PWM channel routed to IO5
    5   IO6   PWM channel routed to IO6
    6   IO7   PWM channel routed to IO7

  Example usage in a WisBlock Core board file:

    wisblock_pwm: wisblock-pwm {
      compatible = "wisblock-pwm";
      pwm-map = <WISBLOCK_PWM_IO1 0 0 &pwm0 0 0 0>,
                <WISBLOCK_PWM_IO2 0 0 &pwm0 1 0 0>;
      #pwm-cells = <3>;
    };

compatible: "wisblock-pwm"

include: [base.yaml, pwm-nexus.yaml]
