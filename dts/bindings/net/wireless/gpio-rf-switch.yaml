description: |
  Group of GPIO-controlled relays used to enable an RF switch and select the active antenna.

compatible: "gpio-rf-switch"

child-binding:
  description: GPIO rf switch child node
  properties:
    gpios:
      type: phandle-array
      required: true

    label:
      type: string
      description: Descriptive name of the switch
