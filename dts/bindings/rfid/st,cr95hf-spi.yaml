description: ST CR95HF RFID

compatible: "st,cr95hf"

include: spi-device.yaml

properties:
  irq-in-gpios:
    type: phandle-array
    required: true

  irq-out-gpios:
    type: phandle-array

examples:
  - |
    &spi1 {
      pinctrl-0 = <&spi1_sck_pa5 &spi1_miso_pa6 &spi1_mosi_pa7>;
      pinctrl-names = "default";
      status = "okay";
      #address-cells = <1>;
      #size-cells = <0>;
      cs-gpios = <&gpioa 4 GPIO_ACTIVE_LOW>;

      cr95hf: spi-device@0 {
        reg = <0>;
        spi-max-frequency = <50000>;
        compatible = "st,cr95hf";
        status = "okay";
        irq-in-gpios = <&gpioa 2 GPIO_ACTIVE_LOW>;
        irq-out-gpios = <&gpioa 3 GPIO_ACTIVE_LOW>;
      };

      dmas = <&dma1 3 (STM32_DMA_PERIPH_TX | STM32_DMA_PRIORITY_HIGH)>,
        <&dma1 2 (STM32_DMA_PERIPH_RX | STM32_DMA_PRIORITY_HIGH)>;
      dma-names = "tx", "rx";
    };
