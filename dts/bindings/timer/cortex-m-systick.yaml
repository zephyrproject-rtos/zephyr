# Common fields for SysTick of ARM Cortex-M chips
include: base.yaml

properties:
  reg:
    required: true

  external-clock-source:
    type: boolean
    description: |
      For ARM Cortex-M SysTick timer, the CLKSOURCE bit in the
      SysTick Control and Status Register (CSR) selects the clock source.
      If this property is present, the external reference clock is selected.
      If absent, the processor/core clock is selected.

  min-delay:
    type: int
    description: |
      Minimum delay in cycles for the SysTick timer. This controls the
      minimum timeout value that can be set. If not specified, the driver
      defaults to MAX(1024, CYC_PER_TICK/16) cycles, which at 32kHz with
      CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000 equals 1024 cycles (32ms).
      For low-frequency clock sources, set this to a lower value
      (e.g., CYC_PER_TICK = 32 for 1ms tick) to allow shorter timeouts.
