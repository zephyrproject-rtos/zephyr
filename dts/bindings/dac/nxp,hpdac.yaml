description: NXP MCUX HPDAC (14-bit DAC)

compatible: "nxp,hpdac"

include: dac-controller.yaml

properties:
  reg:
    required: true

  "#io-channel-cells":
    const: 1

  resolution:
    type: int
    required: true
    description: DAC resolution in bits.

io-channel-cells:
  - output
