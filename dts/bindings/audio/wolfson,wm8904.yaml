description: WM8904 audio codec

include: [i2c-device.yaml]

compatible: "wolfson,wm8904"

properties:
  reg:
    required: true
  clock-source:
    type: string
    default: "MCLK"
    description: |
      Codec's internal clock signal (SYSCLK) source selection. These options
      are available:
      - "MCLK": WM8904's MCLK pin (supplied by the host)
      - "FLL":  WM8904's FLL facility, can be free-running
      The "MCLK" option is default, as this clock signal is usually supplied
      by the host.
    enum:
      - "MCLK"
      - "FLL"
  fll-ref-clk:
    type: int
    description: |
      FLL reference clock frequency in Hz. This property is required when
      the "clock-source" property is set to "FLL". The FLL reference clock
      is supplied by the host and is used to generate the codec's internal
      clock signal (SYSCLK).
