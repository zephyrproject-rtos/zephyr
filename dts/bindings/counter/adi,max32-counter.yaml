description: ADI MAX32 counter

compatible: "adi,max32-counter"

include: [base.yaml, pinctrl-device.yaml]

examples:
  - |
    &timer0 {
            counter0: counter {
                    pinctrl-0 = <&tmr0c_ioa_p0_4>;
                    pinctrl-names = "default";
                    status = "okay";
            };
    };
