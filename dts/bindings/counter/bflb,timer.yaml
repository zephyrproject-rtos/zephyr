description: |
  Bouffalo Lab General Purpose Timer Block.

  Two 32-bit counter channels share this register block. Each channel is
  described by a child node with compatible "bflb,timer-channel".

compatible: "bflb,timer"

include: base.yaml

properties:
  reg:
    required: true
  clocks:
    required: true
  "#address-cells":
    const: 1
  "#size-cells":
    const: 0
