description: Sifli SF32LB General Purpose Timer (GPT)

compatible: "sifli,sf32lb-gptm"

include: base.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  prescaler:
    type: int
    default: 0
    required: true
    description: Counter prescaler from 0 to 65535.
