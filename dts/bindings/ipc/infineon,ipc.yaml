description: Infineon IPC

compatible: "infineon,ipc"
include: base.yaml

properties:
  "#ipc-config-cells":
    type: int
    const: 3
    description: |
        IPC config specifier. Include information about number
        of IPC channel, interrupt and priority of interrupt.

ipc-config-cells:
  - channel
  - interrupt
  - interrupt_prior
