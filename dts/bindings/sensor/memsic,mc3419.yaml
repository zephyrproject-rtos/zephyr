description: MC3419 3-axis accel sensor

compatible: "memsic,mc3419"

include: [sensor-device.yaml, i2c-device.yaml]

properties:
  int-gpios:
    type: phandle-array
    description: |
      This property specifies the connection for INT, this pin
      defaults to active low when sample produce interrupt.

  int-pin2:
    type: boolean
    description: |
      This property is used for interrupt routing.The sensor
      has two interrupt pins.By default the interrupt are routed
      to interrupt pin 1, by enabled this property interrupt are
      routed to interrupt pin 2.

  lpf-fc-sel:
    type: int
    default: 0
    enum:
      - 0
      - 9
      - 10
      - 11
      - 13
    description: |
      Select lpf cut-off frequency if lpf-en is true. otherwise this has no effect
      Possible values and corresponding values are listed bellow
      0 => disable LPF
      9 => LPF with fc set to IDR/4.255
      10 => LPF with fc set to IDR/6
      11 => LPF with fc set to IDR/12
      13 => LPF with fc set to IDR/16
      Default is disabling LPF.
