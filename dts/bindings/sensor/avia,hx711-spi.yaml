description: |
    Avia Semiconductor HX711 24-bit ADC Specialized for Load Cells / Strain Gauges on SPI bus

compatible: "avia,hx711-spi"

include: ["spi-device.yaml", "sensor-device.yaml", "pinctrl-device.yaml"]

properties:
  gain:
    type: int
    required: true
    enum:
      - 64
      - 128
    description: |
      PGA gain for channel A

  avdd:
    type: int
    required: true
    description: |
      AVDD value in milivolts, for converting samples to voltage

  dout-trig-gpios:
    type: phandle-array
    description: |
      GPIO for DOUT and trigger signal indicating a sample is ready
