description: |
  TE Connectivity MS5637 digital pressure and temperature sensor.
  Communicates via I2C at fixed address 0x76.

compatible: "meas,ms5637"

include: [sensor-device.yaml, i2c-device.yaml]

properties:
  osr-press:
    type: int
    default: 2048
    enum:
      - 256
      - 512
      - 1024
      - 2048
      - 4096
      - 8192
    description: |
      Default pressure oversampling ratio.

  osr-temp:
    type: int
    default: 2048
    enum:
      - 256
      - 512
      - 1024
      - 2048
      - 4096
      - 8192
    description: |
      Default temperature oversampling ratio.

examples:
  - |
    i2c {
      #address-cells = <1>;
      #size-cells = <0>;

      ms5637@76 {
        compatible = "meas,ms5637";
        reg = <0x76>;
      };
    };
