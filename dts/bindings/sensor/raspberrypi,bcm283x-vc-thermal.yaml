description: |
  Raspberry Pi BCM283x SoC die-temperature sensor.

  The SoC temperature is read through the VideoCore firmware
  GET_TEMPERATURE property tag -- the same source as `vcgencmd
  measure_temp`. The sensor owns no registers of its own, so it is
  modelled as a child of the raspberrypi,bcm283x-firmware node.
  Exposes SENSOR_CHAN_DIE_TEMP.

compatible: "raspberrypi,bcm283x-vc-thermal"

include: base.yaml
