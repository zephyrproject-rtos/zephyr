description: |
    TMP112 Digital Temperature Sensor.  See more info at
    https://www.ti.com/product/TMP112

compatible: "ti,tmp112"

include: i2c-device.yaml

properties:
  sampling-rate:
    description: Sampling rate in mHz (milli-Hertz)
    type: int
    default: 4000
    enum:
      - 250
      - 1000
      - 4000
      - 8000
  full-scale:
    description: Full scale in degree Celsius
    type: int
    default: 128
    enum:
      - 128
      - 150
