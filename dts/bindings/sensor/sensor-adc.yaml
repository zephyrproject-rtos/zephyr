description: |
  Virtual sensor device converting an ADC device's channels to sensor voltage channels.

compatible: "sensor-adc"

include: sensor-device.yaml

properties:
  io-channels:
    required: true
    description: ADC device's IO channels to expose as sensor voltage channels.

  fifo-watermark:
    type: int
    min: 0
    max: 65534
    default: 0
    description: |
      ADC device's initial sampling FIFO watermark in number of samplings. Watermark is disabled by
      default.

  fifo-depth:
    type: int
    required: true
    min: 1
    max: 65535
    description: |
      ADC device's sampling FIFO depth in number of samplings. The fifo-width is determined from
      the number of io-channels.

  calibrate:
    type: boolean
    description: Calibrate ADC device before each ADC sampling.

examples:
  - |
    / {
              vsense {
                      compatible = "sensor-adc";
                      io-channels = <&adc0 0>, <&adc1 3>;
                      fifo-depth = <12>;
                      calibrate;
              };
    };

    &adc0 {
            status = "okay";

            channel@0 {
                    reg = <0>;
                    zephyr,gain = "ADC_GAIN_1_4";
                    zephyr,resolution = <12>;
                    zephyr,reference = "ADC_REF_INTERNAL";
                    zephyr,oversampling = <2>;
                    zephyr,acquisition-time = <ADC_ACQ_TIME_DEFAULT>;
                    zephyr,input-positive = <0>;
            };

            channel@3 {
                    reg = <3>;
                    zephyr,gain = "ADC_GAIN_1_4";
                    zephyr,reference = "ADC_REF_INTERNAL";
                    zephyr,input-positive = <0>;
            };
    };
