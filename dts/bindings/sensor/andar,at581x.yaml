description: Andar AT581X radar sensor

compatible: "andar,at581x"

include: [sensor-device.yaml, i2c-device.yaml]

properties:
  threshold:
    type: int
    default: 200
    description: |
      Detection threshold value (0-1023).
      Lower values increase sensitivity.

  gain:
    type: int
    default: 27
    description: |
      Gain setting (0-255).
      Default value 0x1B (27) provides good performance.

  base-time-ms:
    type: int
    default: 500
    description: |
      Base detection time in milliseconds.
      Time before detection signal is asserted.

  keep-time-ms:
    type: int
    default: 1500
    description: |
      Keep detection time in milliseconds.
      Time to maintain detection signal after motion stops.