description: NXP PMC temperature sensor (PMC-TMPSNS)

compatible: "nxp,pmc-tmpsns"

include: sensor-device.yaml

properties:
  io-channels:
    required: true
    description: |
      This should point to an ADC channel (e.g., <&adc0 0>)
      to read from the PMC internal temperature sensor.

  nxp,power-rails:
    type: phandle-array
    specifier-space: power-rail
    description: |
      Power-rail specifiers for rails that must be powered up before the controller
      can be accessed.
