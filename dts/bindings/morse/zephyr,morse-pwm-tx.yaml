description: |
  Morse Code transmitter backend driven by a PWM channel.

  This backend uses a PWM peripheral to produce the Morse signal. While
  the Morse engine holds the keyed (mark) state, the PWM runs at the
  configured period with a 50% duty cycle; while it holds the unkeyed
  (space) state, the duty cycle is forced to 0%. The PWM period thus
  selects the carrier/tone frequency that is gated on and off by the
  dot/dash timing.

  Typical uses are driving a piezo buzzer or speaker to render Morse as
  an audible tone (side-tone), generating a sub-carrier for a radio
  modulator, or dimming an LED to a comfortable brightness.

compatible: "zephyr,morse-pwm-tx"

include: base.yaml

properties:
  pwms:
    type: phandle-array
    required: true
    description: |
      PWM channel driven for Morse output. The period encoded in the
      PWM specifier selects the tone/carrier frequency: for an audible
      side-tone choose a period in the audio band (for example PWM_USEC(500)
      for 2 kHz). The polarity flag controls the idle level of the channel.

examples:
  - |
    / {
      /* LED-0 => PB0 */
      morse_tx: transmitter {
        compatible = "zephyr,morse-pwm-tx";

        pwms = <&pwm3 3 PWM_MSEC(80) PWM_POLARITY_NORMAL>;
      };
    };

    &timers3 {
      st,prescaler = <10000>;
      status = "okay";

      pwm3: pwm {
        status = "okay";
        pinctrl-0 = <&tim3_ch3_pb0>;
        pinctrl-names = "default";
      };
    };
