description: |
  Morse Code subsystem controller.

  This binding describes a Morse Code engine that encodes ASCII text into
  the dot/dash symbols defined by ITU-R M.1677-1 and serializes them over
  a TX backend (for example GPIO bitbang or PWM), and/or deserializes
  them from an RX backend (for example a GPIO edge interrupt). At least
  one of tx-drv or rx-drv must be provided.

  A hardware Counter is used to generate the dot time base. Separate
  alarm channels are used for transmit and receive, so the same Counter
  instance can serve both directions simultaneously in a full-duplex
  configuration.

  Symbol timing follows ITU-R M.1677-1: a "dot" is one time unit, a
  "dash" is three time units, the space between elements of the same
  letter is one time unit, the space between letters is three time
  units, and the space between words is seven time units.

compatible: "zephyr,morse"

include: base.yaml

properties:
  speed:
    type: int
    default: 20
    description: |
      Transmission speed in Words Per Minute (WPM), measured against the
      standard reference word "PARIS ". The word "PARIS " is 50 time
      units long, represented as ".--. .- .-. .. .../" where:

        10 dits (.)               10 units
         4 dahs (-)               12 units
         9 intra-character spaces  9 units
         4 inter-character spaces 12 units
         1 word space (/)          7 units

      The driver derives the dot time unit as 60 / (50 * speed) seconds.
      With the default of 20 WPM the dot time unit is 60 ms.

  tmr:
    type: phandle
    required: true
    description: |
      Phandle to the Counter device used as the time base for serializing
      and deserializing Morse symbols. The Counter frequency must be high
      enough to resolve one dot time unit with adequate precision at the
      configured speed (the engine applies a 0.5% tolerance when matching
      RX pulse/blank lengths).

  tx-tmr-chan:
    type: int
    description: |
      Counter alarm channel dedicated to transmission. Required when
      tx-drv is provided; the engine uses this channel to clock each bit
      of the encoded stream onto the TX backend.

  rx-tmr-chan:
    type: int
    description: |
      Counter alarm channel dedicated to reception. Required when rx-drv
      is provided; the engine uses this channel to time pulse/blank
      phases and to detect end-of-letter, end-of-word and end-of-
      transmission timeouts. Must differ from tx-tmr-chan when both
      directions are enabled so the alarms do not collide.

  rx-drv:
    type: phandle
    description: |
      Phandle to the RX backend device (for example a node compatible
      with "zephyr,morse-gpio-rx") that reports bit-state transitions to
      the Morse engine for symbol decoding. Omit this property to build
      a transmit-only instance.

  tx-drv:
    type: phandle
    description: |
      Phandle to the TX backend device (for example a node compatible
      with "zephyr,morse-gpio-tx" or "zephyr,morse-pwm-tx") that drives
      the physical medium ON/OFF following the serialized bit stream.
      Omit this property to build a receive-only instance.

examples:
  - |
    /*
     * nucleo_g474re GPIO-RX/TX configuration
     * Note: that a jumper must be made between the PA5~6 pins.
     */
    / {
      /* arduino.pd12 */
      morse_rx: receiver {
        compatible = "zephyr,morse-gpio-rx";

        gpios = <&gpioa 6 GPIO_ACTIVE_HIGH>;
      };

      /* arduino.pd13 */
      morse_tx: transmitter {
        compatible = "zephyr,morse-gpio-tx";

        gpios = <&gpioa 5 GPIO_ACTIVE_HIGH>;
      };

      morse: morse {
        compatible = "zephyr,morse";
        status = "okay";

        speed = <20>;
        tmr = <&morse_counter>;

        rx-tmr-chan = <0>;
        tx-tmr-chan = <1>;

        rx-drv = <&morse_rx>;
        tx-drv = <&morse_tx>;
      };
    };

    &timers2 {
      st,prescaler = <10000>;
      status = "okay";

      morse_counter: counter {
        status = "okay";
      };
    };

  - |
    /*
     * sam_v71_xult/samv71q21 GPIO-RX/TX configuration
     */
    / {
      morse_rx: receiver {
        compatible = "zephyr,morse-gpio-rx";

        gpios = <&pioc 9 GPIO_ACTIVE_LOW>;
      };

      morse_tx: transmitter {
        compatible = "zephyr,morse-gpio-tx";

        gpios = <&pioc 9 GPIO_ACTIVE_LOW>;
      };

      morse: morse {
        compatible = "zephyr,morse";
        status = "okay";

        speed = <20>;

        tmr = <&tc0>;
        tx-tmr-chan = <0>;
        rx-tmr-chan = <1>;

        tx-drv = <&morse_tx>;
        rx-drv = <&morse_rx>;
      };
    };

    &tc0 {
      clk = <4>;
      status = "okay";
    };

  - |
    /*
     * nucleo_h753zi PWM-TX configuration
     */
    / {
      /* zio.d33 */
      morse_tx: transmitter {
        compatible = "zephyr,morse-pwm-tx";

        pwms = <&pwm12 1 PWM_MSEC(80) PWM_POLARITY_NORMAL>;
      };

      morse: morse {
        compatible = "zephyr,morse";
        status = "okay";

        speed = <2>;
        tmr = <&morse_counter>;

        tx-tmr-chan = <0>;

        tx-drv = <&morse_tx>;
      };
    };

    &timers2 {
      st,prescaler = <10000>;
      status = "okay";

      morse_counter: counter {
        status = "okay";
      };
    };
