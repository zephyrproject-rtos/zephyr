# Common fields for MIPI-DBI devices

include: [base.yaml, power.yaml]

on-bus: mipi-dbi

properties:
  mipi-max-frequency:
    type: int
    description: Maximum clock frequency of device's MIPI interface in Hz

  mipi-mode:
    type: int
    description: |
      MIPI DBI mode in use. See dt-bindings/mipi_dbi/mipi_dbi.h for a list
      of supported modes.
