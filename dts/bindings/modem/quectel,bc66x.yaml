description: Quectel BC660K-GL or BC66 NB-IoT modem

compatible: "quectel,bc66x"

include: zephyr,cellular-modem-device.yaml

properties:
  mdm-boot-gpios:
    type: phandle-array
    required: true
    description: BOOT pin (PWRKEY)

  mdm-rst-gpios:
    type: phandle-array
    required: true
    description: RST pin

  mdm-psm-gpios:
    type: phandle-array
    required: true
    description: PSM pin (PSM_EINT)
