description: Renesas RA CANFD controller

compatible: "renesas,ra-canfd"

include: [can-fd-controller.yaml, pinctrl-device.yaml]

properties:
  interrupts:
    required: true

  clocks:
    required: true

  channel:
    type: int
    required: true

  rx_max_filters:
    type: int
    default: 8
    enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
    description:
      To determine the maximum rx filters can be added on this CAN device. The total number of
      filters must be less than 8.
