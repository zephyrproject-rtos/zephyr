description: |
  Infineon XMC4xxx CAN

compatible: "infineon,xmc4xxx-can"

include: base.yaml

properties:
  reg:
    required: true

  clock-prescaler:
    type: int
    min: 1
    max: 1023
    required: true
    description: Clock divider for the input clock.

  message-objects:
    type: int
    required: true
    description: Number of total can messages supported by hardware.
