description: NXP LPC84x Switch Matrix Pin Controller

compatible: "nxp,lpc84x-swm"

include:
  - name: base.yaml
  - name: pinctrl-device.yaml

properties:
  reg:
    required: true
    description: SWM register base address and size.

  clocks:
    required: true
    description: Clock required for SWM.

child-binding:
  description: LPC84x pinctrl child node
  child-binding:
    description: LPC84x pinctrl group

    include:
      - name: pincfg-node.yaml
        property-allowlist:
          - bias-pull-up
          - bias-pull-down
          - bias-disable
          - drive-open-drain
          - drive-push-pull

    properties:
      pinmux:
        required: true
        type: array
        description: Array of pinmux values.

      nxp,invert:
        type: boolean
        description: Invert input.

      nxp,hysteresis:
        type: boolean
        description: Enable input hysteresis.
