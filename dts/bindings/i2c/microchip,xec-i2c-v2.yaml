description: Microchip I2C/SMB V2 controller

compatible: "microchip,xec-i2c-v2"

include:
  - "i2c-controller.yaml"
  - "pinctrl-device.yaml"
  - "microchip,dmec-ecia-girq.yaml"

properties:
  reg:
    required: true

  port-sel:
    type: int
    description: soc block mapping to pin
    required: true

  pcr-scr:
    type: int
    required: true
    description: |
      Encoded PCR index and bit position used for peripheral sleep enable
      and reset.

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  sda-gpios:
    type: phandle-array
    required: true
    description: |
      I2C controller versions older than v3.8 do not make pin
      state monitoring visible in the bit-bang register without
      switching the pins from I2C control to bit-bang control.
      This can cause disruption of an open I2C session. For older
      hardware access pin state using the GPIO driver.

  scl-gpios:
    type: phandle-array
    required: true
    description: |
      Refer to the description of sda-gpios.
