description: Realtek RTS5912 I2C node

compatible: "realtek,rts5912-i2c"

include: base.yaml

properties:
  dw-i2c-dev:
    type: phandle
    required: true
    description: |
      DesignWare i2c device

  sda-timeout-value:
    type: int
    default: 30
    description: |
      Describe the SDA stuck at low timeout value, unit in ms

  scl-timeout-value:
    type: int
    default: 30
    description: |
      Describe the SCL stuck at low timeout value, unit in ms

  sda-gpio-pin:
    type: int
    required: true
    description: |
      Describe the SDA gpio number

  scl-gpio-pin:
    type: int
    required: true
    description: |
      Describe the SCL gpio number
