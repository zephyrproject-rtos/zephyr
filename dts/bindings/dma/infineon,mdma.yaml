title: Infineon M-DMA

description: |
  M-DMA (MXSAXIDMAC) controller for Infineon devices.

compatible: "infineon,mdma"

include: dma-controller.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  "#dma-cells":
    const: 1

dma-cells:
  - channel
