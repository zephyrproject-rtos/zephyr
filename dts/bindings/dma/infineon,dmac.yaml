title: Infineon DMAC

description: |
  DMAC for Infineon devices

compatible: "infineon,dmac"

include: [dma-controller.yaml, "infineon,system-interrupts.yaml"]

properties:
  reg:
    required: true

  interrupts:
    required: true

  "#dma-cells":
    const: 1

dma-cells:
  - channel
