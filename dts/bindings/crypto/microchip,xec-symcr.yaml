description: Microchip XEC symmetric crypto (AES/Hash) accelerator.

compatible: "microchip,xec-symcr"

include:
  - name: base.yaml
  - name: microchip,dmec-ecia-girq.yaml

properties:
  reg:
    required: true

  pcr:
    type: int
    required: true
    description: |
      Integer encoding the PCR register index and bit position
      of this Crypto controller.
