description: Max32 custom properties for performance state (pstate)

compatible: "adi,max32-pstate"

include: "zephyr,pstate.yaml"

properties:
  pstate-id:
    type: int
    required: true
    description: |
      Identifier of performance state which maps to a divider setting.
