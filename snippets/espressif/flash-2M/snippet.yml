name: espressif-flash-2M
description: Selects the 2MB SPI flash variant of the ESP32 chips.

boards:
  /.*/esp32/.*/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/flash_0x1000_amp_2M.overlay
  /.*/esp32s2/.*/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/flash_0x1000_default_2M.overlay
  /.*/esp32s3/.*/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/flash_0x0_amp_2M.overlay
  /.*/esp32c3/.*/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/flash_0x0_default_2M.overlay
  /.*/esp32c6/.*/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/flash_0x0_default_2M.overlay
  /.*/esp32h2/.*/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/flash_0x0_default_2M.overlay
  /.*/esp32c2/.*/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/flash_0x0_default_2M.overlay
