name: nordic-ppr
description: Boots Nordic PPR (Peripheral Processor) from another core.
append:
  EXTRA_DTC_OVERLAY_FILE: nordic-ppr.overlay

boards:
  /.*/nrf54h20/cpuapp/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/nrf54h20_cpuapp.overlay
  /.*/nrf9280/cpuapp/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/nrf9280_cpuapp.overlay
