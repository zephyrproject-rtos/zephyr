name: nordic-ppr-xip
description: |
  Boots Nordic PPR (Peripheral Processor) from another core, executing in place
  from MRAM.
append:
  EXTRA_DTC_OVERLAY_FILE: nordic-ppr-xip.overlay

boards:
  /.*/nrf54h20/cpuapp/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/nrf54h20_cpuapp.overlay
  /.*/nrf9280/cpuapp/:
    append:
      EXTRA_DTC_OVERLAY_FILE: soc/nrf9280_cpuapp.overlay
