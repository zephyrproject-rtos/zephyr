# Workflow that triggers on changes impacting API documentation. It checks that any newly
# introduced API is properly documented, and that no new group shows up at the top level of the
# API documentation index.
#
# The paths below track the Doxygen INPUT set declared in doc/zephyr.doxyfile.in, since a
# top-level group can be introduced from any of those roots.

name: Doxygen Checks

on:
  pull_request:
    paths:
      - 'include/**'
      - 'subsys/testsuite/include/**'
      - 'subsys/testsuite/ztest/include/**'
      - 'subsys/secure_storage/include/**'
      - 'kernel/include/kernel_arch_interface.h'
      - 'lib/libc/**'
      - 'lib/midi2/**'
      - 'modules/openthread/include/openthread.h'
      - 'doc/_doxygen/**'
      - 'doc/zephyr.doxyfile.in'
      - 'scripts/ci/doxygen_coverage_diff.py'
      - 'scripts/ci/doxygen_toplevel_groups.py'
      - '.github/workflows/doxygen-checks.yml'
    branches:
      - main
      - v*-branch
      - collab-*

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  doxygen-checks:
    name: "Doxygen Checks"
    runs-on:
      group: zephyr-runner-v2-linux-x64-4xlarge
    container:
      image: ghcr.io/zephyrproject-rtos/ci-repo-cache:v0.29.2.20260422
      options: '--entrypoint /bin/bash'
    timeout-minutes: 60
    env:
      BASE_REF: ${{ github.base_ref }}

    steps:
      - name: Apply container owner mismatch workaround
        run: |
          git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Clone cached Zephyr repository
        continue-on-error: true
        run: |
          git clone --shared /repo-cache/zephyrproject/zephyr .
          git remote set-url origin ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}

      - name: Checkout PR Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Environment Setup
        run: |
          git config --global user.email "bot@zephyrproject.org"
          git config --global user.name "Zephyr Builder"
          git rebase origin/${BASE_REF}
          git clean -f -d

          west init -l . || true
          west update --path-cache /repo-cache/zephyrproject 2>&1 1> west.update.log || west update --path-cache /repo-cache/zephyrproject 2>&1 1> west.update.log || ( rm -rf ../modules ../bootloader ../tools && west update --path-cache /repo-cache/zephyrproject)
          west forall -c 'git reset --hard HEAD'

          echo "ZEPHYR_SDK_INSTALL_DIR=/opt/toolchains/zephyr-sdk-$( cat SDK_VERSION )" >> $GITHUB_ENV

      - name: Install Python packages
        run: |
          pip install -r scripts/requirements-actions.txt --require-hashes
          pip install -r doc/requirements.txt --require-hashes

      - name: Generate PR branch coverage JSON
        run: |
          make -C doc doxygen-coverage-json
          mv doc/_build/doc-coverage.json pr-coverage.json

      - name: Generate Base branch coverage JSON
        run: |
          git worktree add --detach ../base-branch origin/${BASE_REF}
          echo "BASE_ROOT=$(readlink -f ../base-branch)" >> $GITHUB_ENV
          cd ../base-branch
          west update
          # Use the PR branch's doc build configuration to ensure consistent
          # coverage generation between branches (plus, the target may not exist in base)
          cp ${GITHUB_WORKSPACE}/doc/CMakeLists.txt ${GITHUB_WORKSPACE}/doc/Makefile doc/
          make -C doc doxygen-coverage-json
          cp doc/_build/doc-coverage.json ${GITHUB_WORKSPACE}/base-coverage.json

      - name: Check for undocumented new API
        run: |
          PR_ROOT=$(pwd)

          python3 scripts/ci/doxygen_coverage_diff.py \
            --reference base-coverage.json \
            --comparison pr-coverage.json \
            --strip-reference-prefix "$BASE_ROOT" \
            --strip-comparison-prefix "$PR_ROOT" \
            --warn-paths "include/zephyr/dt-bindings" \
            --warn-paths "include/zephyr/posix" \
            --summary-file "$GITHUB_STEP_SUMMARY"

      # Runs even when the coverage check above failed, so that a contributor sees every problem
      # in a single run. Reads the Doxygen XML produced for the PR branch further up.
      - name: Check for new top-level Doxygen groups
        if: ${{ !cancelled() }}
        run: |
          python3 scripts/ci/doxygen_toplevel_groups.py --xml-dir doc/_build/doxygen/xml
