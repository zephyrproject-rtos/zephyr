name: Error numbers
on:
  pull_request:
    paths:
      - '.github/workflows/errno.yml'
      - 'lib/libc/minimal/include/errno.h'
      - 'scripts/ci/errno.py'
      - 'SDK_VERSION'

permissions:
  contents: read

jobs:
  check-errno:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: zephyr

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28 # v1.0.14
        with:
          app-path: zephyr
          toolchains: 'arm-zephyr-eabi'
          west-group-filter: -hal,-tools,-bootloader,-babblesim
          west-project-filter: -nrf_hw_models
          enable-ccache: false

      - name: Run errno.py
        working-directory: zephyr
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=${{ github.workspace }}/zephyr-sdk
          export ZEPHYR_BASE=${PWD}
          ./scripts/ci/errno.py
