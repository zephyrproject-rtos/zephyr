name: PR Metadata Check

on:
  pull_request:
    types:
      - synchronize
      - opened
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Key on the PR number: it is globally unique, while github.head_ref is only a
  # branch name and collides between forks (two PRs from a branch named 'main'
  # would cancel each other).
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  do-not-merge:
    name: Prevent Merging
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            scripts/ci/do_not_merge.py
            scripts/requirements-actions-basic.txt
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.12
          cache: pip
          cache-dependency-path: scripts/requirements-actions-basic.txt


      - name: Install Python dependencies
        run: |
          pip install -r scripts/requirements-actions-basic.txt --require-hashes

      - name: Run the check script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -u scripts/ci/do_not_merge.py \
          -p "${{ github.event.pull_request.number }}" \
          -o "${{ github.event.repository.owner.login }}" \
          -r "${{ github.event.repository.name }}" \
          -a "${{ github.event.action }}"
